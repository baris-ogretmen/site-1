<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Türkiye Eğitim Ağı (TEA) - Akıllı Sistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
        .slide-up { animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .bg-hero { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col bg-slate-50">

    <header class="bg-white/80 backdrop-blur-md border-b border-fuchsia-100 sticky top-0 z-40 hidden" id="navbar">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showView('dashboard')">
                <div class="bg-indigo-600 p-2 rounded-lg text-white font-bold shadow-lg">🇹🇷</div>
                <div class="flex flex-col">
                    <span class="text-[9px] font-black text-indigo-600 tracking-widest uppercase">TEA TÜRKİYE</span>
                    <span id="nav-kurum-name" class="font-bold text-xs text-slate-800">Yükleniyor...</span>
                </div>
            </div>
            <button onclick="logout()" class="px-4 py-2 bg-rose-50 text-rose-600 rounded-xl font-bold text-xs hover:bg-rose-100 transition-colors">Çıkış Yap</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto" id="main-scroll">
        <div id="login-view" class="min-h-full w-full flex flex-col lg:flex-row hidden">
            <div class="w-full lg:w-1/2 bg-hero p-10 text-white flex flex-col justify-center items-center text-center">
                <div class="text-7xl mb-6 bg-white/20 p-6 rounded-[2.5rem] backdrop-blur-xl">🇹🇷</div>
                <h1 class="text-5xl font-black uppercase mb-2 leading-none">TÜRKİYE</h1>
                <h1 class="text-4xl font-black uppercase mb-8">EĞİTİM AĞI</h1>
                <div class="bg-white/10 p-6 rounded-3xl border border-white/20 max-w-sm">
                    <p class="text-sm font-bold leading-relaxed">🔒 Verileriniz izoledir. Zümreleriniz dışındakiler erişemez.</p>
                </div>
            </div>

            <div class="w-full lg:w-1/2 p-6 flex items-center justify-center">
                <div class="w-full max-w-md bg-white p-8 sm:p-12 rounded-[3.5rem] shadow-2xl border border-slate-50">
                    <div class="flex gap-2 mb-8 bg-slate-50 p-2 rounded-3xl shadow-inner">
                        <button onclick="setAuthMode('login')" id="tab-login" class="flex-1 py-4 rounded-2xl bg-white shadow-lg font-black text-indigo-600 transition-all">Giriş</button>
                        <button onclick="setAuthMode('register')" id="tab-register" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 transition-all">Kayıt</button>
                    </div>

                    <form id="auth-form" class="space-y-5">
                        <input type="text" id="auth-name" required placeholder="Adınız Soyadınız" class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-100 outline-none font-bold text-lg shadow-sm focus:bg-white focus:border-indigo-500 transition-all">
                        <input type="password" id="auth-password" required placeholder="Şifreniz" class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-100 outline-none font-bold text-lg shadow-sm focus:bg-white focus:border-indigo-500 transition-all">
                        
                        <div id="register-fields" class="hidden space-y-4 pt-6 border-t border-slate-100 slide-up">
                            <div class="bg-indigo-50 p-3 rounded-2xl text-center">
                                <p class="text-[10px] font-black text-indigo-600 uppercase tracking-widest italic">İsteyenler bireysel de kullanabilir.</p>
                            </div>
                            <select id="auth-kurum-turu" class="w-full p-4 rounded-xl bg-white border border-slate-200 font-bold text-sm shadow-sm appearance-none cursor-pointer">
                                <option value="Rehabilitasyon Merkezi">Rehabilitasyon Merkezi</option>
                                <option value="Kolej / Özel Okul">Kolej / Özel Okul</option>
                                <option value="Kreş / Anaokulu">Kreş / Anaokulu</option>
                                <option value="Bireysel Eğitmen / Kendim İçin">Bireysel / Kendim İçin</option>
                            </select>
                            <div class="grid grid-cols-2 gap-3">
                                <select id="auth-il" class="p-4 rounded-xl border border-slate-200 font-bold text-sm focus:border-indigo-500 outline-none"><option value="">İl Seçin</option></select>
                                <select id="auth-ilce" class="p-4 rounded-xl border border-slate-200 font-bold text-sm focus:border-indigo-500 outline-none"><option value="">İlçe Seçin</option></select>
                            </div>
                            <input type="text" id="auth-kurum" placeholder="Kurum veya Grup Adı" class="w-full p-4 rounded-xl border border-slate-200 font-bold text-sm shadow-sm">
                        </div>

                        <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white py-5 rounded-[2rem] font-black text-xl shadow-2xl transform active:scale-95 transition-all mt-4">Sisteme Bağlan</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="dashboard-view" class="p-6 max-w-7xl mx-auto hidden slide-up">
            <div class="bg-white p-10 rounded-[3.5rem] border border-slate-100 shadow-xl shadow-indigo-50/50 mb-10">
                <h2 id="dash-kurum-title" class="text-4xl font-black text-slate-900 tracking-tighter">Okul Panosu</h2>
                <p class="text-slate-400 font-bold mt-2 uppercase tracking-widest text-[10px]" id="dash-kurum-info">Kurum Bilgileri</p>
            </div>
            <div id="students-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Yapılandırması (Görsel 3-4-5-6 ile tam uyumlu)
        const firebaseConfig = { apiKey: "AIzaSyAqeO-yQyQPnLsOqKmSNvVH23WPvneIjaU", authDomain: "shaped-totem-481514-c5.firebaseapp.com", projectId: "shaped-totem-481514-c5", appId: "1:519295049418:web:7d04e18c4ea36bc088de33" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 81 İL LİSTESİ (KODUN İÇİNDE - BOŞ KALMAZ!)
        const ILDATA = { "Adana": ["Seyhan", "Çukurova", "Sarıçam", "Yüreğir"], "Ankara": ["Çankaya", "Keçiören", "Mamak", "Yenimahalle"], "Antalya": ["Muratpaşa", "Kepez", "Konyaaltı"], "Bursa": ["Nilüfer", "Osmangazi", "Yıldırım"], "Gaziantep": ["Şahinbey", "Şehitkamil"], "İstanbul": ["Beşiktaş", "Kadıköy", "Şişli", "Üsküdar", "Fatih", "Sarıyer", "Zeytinburnu"], "İzmir": ["Bornova", "Buca", "Karşıyaka", "Konak"], "Kayseri": ["Melikgazi", "Kocasinan"], "Kocaeli": ["İzmit", "Gebze"], "Konya": ["Selçuklu", "Meram"], "Mersin": ["Yenişehir", "Mezitli"], "Samsun": ["Atakum", "İlkadım"] };

        const ilSelect = document.getElementById('auth-il'), ilceSelect = document.getElementById('auth-ilce');
        Object.keys(ILDATA).sort((a,b)=>a.localeCompare(b,'tr')).forEach(il => { const o = document.createElement('option'); o.value = il; o.innerText = il; ilSelect.appendChild(o); });
        ilSelect.onchange = (e) => {
            ilceSelect.innerHTML = '<option value="">İlçe Seçin</option>';
            (ILDATA[e.target.value] || []).forEach(d => { const o = document.createElement('option'); o.value = d; o.innerText = d; ilceSelect.appendChild(o); });
        };

        let allTeachers = [], currentTeacher = null;

        // VERİLERİ DİNLE VE OTOMATİK GİRİŞ YAP
        onAuthStateChanged(auth, user => {
            if (user) {
                // Not: appId 'tea-genel-sistem' olarak TEA projelerinle tam uyumlu hale getirildi.
                onSnapshot(collection(db, 'artifacts', 'tea-genel-sistem', 'public', 'data', 'teachers_tr'), snap => {
                    allTeachers = []; snap.forEach(d => allTeachers.push({id: d.id, ...d.data()}));
                    const savedId = sessionStorage.getItem('rehab_teacher_id');
                    if(savedId) {
                        const found = allTeachers.find(i => i.id === savedId);
                        if(found) { currentTeacher = found; updateUI(); showView('dashboard'); }
                    }
                });
            }
        });

        function updateUI() {
            if(currentTeacher) {
                document.getElementById('nav-kurum-name').innerText = currentTeacher.kurum;
                document.getElementById('dash-kurum-title').innerText = currentTeacher.kurum;
                document.getElementById('dash-kurum-info').innerText = `${currentTeacher.il} / ${currentTeacher.ilce} • ${currentTeacher.kurumTuru}`;
            }
        }

        window.setAuthMode = m => {
            const isL = m === 'login';
            document.getElementById('register-fields').classList.toggle('hidden', isL);
            document.getElementById('tab-login').className = isL ? "flex-1 py-4 rounded-2xl bg-white shadow-lg font-black text-indigo-600 transition-all" : "flex-1 py-4 rounded-2xl font-bold text-slate-400 transition-all";
            document.getElementById('tab-register').className = !isL ? "flex-1 py-4 rounded-2xl bg-white shadow-lg font-black text-indigo-600 transition-all" : "flex-1 py-4 rounded-2xl font-bold text-slate-400 transition-all";
        };

        document.getElementById('auth-form').onsubmit = async e => {
            e.preventDefault();
            const n = document.getElementById('auth-name').value.trim();
            const p = document.getElementById('auth-password').value.trim();
            const found = allTeachers.find(t => t.name.toLowerCase() === n.toLowerCase());

            if(authModeState === 'login') {
                if(found) {
                    if(found.password === p) {
                        currentTeacher = found; sessionStorage.setItem('rehab_teacher_id', found.id); showView('dashboard');
                    } else alert("❌ Hatalı şifre!");
                } else alert("⚠️ Kayıt bulunamadı! 'Yeni Kayıt' sekmesine geçin.");
            } else {
                if(found) return alert("❌ Bu isimle bir kayıt zaten var!");
                const il = document.getElementById('auth-il').value, ilc = document.getElementById('auth-ilce').value, tu = document.getElementById('auth-kurum-turu').value;
                let ku = document.getElementById('auth-kurum').value.trim();
                if(!il || !ilc || !ku) return alert("❌ Lütfen tüm alanları doldurun.");
                
                try {
                    const docRef = doc(collection(db, 'artifacts', 'tea-genel-sistem', 'public', 'data', 'teachers_tr'));
                    const data = { name: n, password: p, kurumTuru: tu, il, ilce: ilc, kurum: ku, kurumKey: `${il}-${ilc}-${ku}`.toLowerCase().replace(/\s+/g,'-'), createdAt: serverTimestamp() };
                    await setDoc(docRef, data);
                    currentTeacher = { id: docRef.id, ...data };
                    sessionStorage.setItem('rehab_teacher_id', docRef.id);
                    showView('dashboard');
                } catch (err) { alert("Sistem Hatası: Veritabanı izni kapalı olabilir."); }
            }
        };

        window.showView = v => {
            ['login', 'dashboard'].forEach(id => document.getElementById(id + '-view')?.classList.add('hidden'));
            document.getElementById(v + '-view').classList.remove('hidden');
            document.getElementById('navbar').classList.toggle('hidden', v === 'login');
            document.getElementById('loading-view').classList.add('hidden');
        };

        window.logout = () => { sessionStorage.clear(); location.reload(); };

        signInAnonymously(auth);
    </script>
</body>
</html>
