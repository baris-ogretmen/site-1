<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Türkiye Eğitim Ağı (TEA) - Akıllı Sistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
        .slide-up { animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .bg-hero { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); }
        select { cursor: pointer; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col bg-slate-50">

    <header class="bg-white/80 backdrop-blur-md border-b border-fuchsia-100 sticky top-0 z-40 hidden" id="navbar">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showView('dashboard')">
                <div class="bg-indigo-600 p-2 rounded-lg text-white font-bold">🇹🇷</div>
                <div class="flex flex-col">
                    <span class="text-[9px] font-black text-indigo-600 tracking-widest uppercase">TEA TÜRKİYE</span>
                    <span id="nav-kurum-name" class="font-bold text-xs text-slate-800">Yükleniyor...</span>
                </div>
            </div>
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-rose-600">Çıkış</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto" id="main-scroll">
        <div id="login-view" class="min-h-full w-full flex flex-col lg:flex-row hidden">
            <div class="w-full lg:w-1/2 bg-hero p-10 text-white flex flex-col justify-center items-center">
                <h1 class="text-5xl font-black uppercase mb-2">TÜRKİYE</h1>
                <h1 class="text-4xl font-black uppercase mb-6">EĞİTİM AĞI</h1>
                <div class="bg-white/10 p-6 rounded-2xl border border-white/20 text-center">
                    <p class="text-sm font-bold">🔒 Verileriniz tamamen izoledir. Sadece zümreleriniz okuyabilir.</p>
                </div>
            </div>

            <div class="w-full lg:w-1/2 p-6 flex items-center justify-center">
                <div class="w-full max-w-md bg-white p-10 rounded-[3rem] shadow-2xl">
                    <div class="flex gap-2 mb-8 bg-slate-100 p-1.5 rounded-2xl">
                        <button onclick="setAuthMode('login')" id="tab-login" class="flex-1 py-3 rounded-xl bg-white shadow font-black text-indigo-600">Giriş Yap</button>
                        <button onclick="setAuthMode('register')" id="tab-register" class="flex-1 py-3 rounded-xl font-bold text-slate-400">Yeni Kayıt</button>
                    </div>

                    <form id="auth-form" class="space-y-4">
                        <input type="text" id="auth-name" required placeholder="Adınız Soyadınız" class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100 outline-none font-bold text-lg">
                        <input type="password" id="auth-password" required placeholder="Şifreniz" class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100 outline-none font-bold text-lg">
                        
                        <div id="register-fields" class="hidden space-y-4 pt-4 border-t border-slate-100">
                            <p class="text-xs font-black text-indigo-600 text-center uppercase tracking-widest italic">İsteyenler bireysel de kullanabilir.</p>
                            <select id="auth-kurum-turu" class="w-full p-4 rounded-xl bg-white border border-slate-200 font-bold text-sm">
                                <option value="Rehabilitasyon Merkezi">Rehabilitasyon Merkezi</option>
                                <option value="Kolej / Özel Okul">Kolej / Özel Okul</option>
                                <option value="Devlet Okulu">Devlet Okulu</option>
                                <option value="Kreş / Anaokulu">Kreş / Anaokulu</option>
                                <option value="Bireysel Eğitmen / Kendim İçin">Bireysel / Kendim İçin</option>
                            </select>
                            <div class="grid grid-cols-2 gap-2">
                                <select id="auth-il" class="p-4 rounded-xl border border-slate-200 font-bold text-sm outline-none"><option value="">İl Seçin</option></select>
                                <select id="auth-ilce" class="p-4 rounded-xl border border-slate-200 font-bold text-sm outline-none"><option value="">İlçe Seçin</option></select>
                            </div>
                            <input type="text" id="auth-kurum" placeholder="Kurum Adı (Zümre Paylaşımı İçin)" class="w-full p-4 rounded-xl border border-slate-200 font-bold text-sm shadow-sm">
                        </div>

                        <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xl shadow-xl transform active:scale-95 transition-all">Sisteme Bağlan</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="dashboard-view" class="p-6 max-w-7xl mx-auto hidden">
            <h2 id="dash-kurum-title" class="text-3xl font-black mb-8">Okulunuzun Panosu</h2>
            <div id="students-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAqeO-yQyQPnLsOqKmSNvVH23WPvneIjaU", authDomain: "shaped-totem-481514-c5.firebaseapp.com", projectId: "shaped-totem-481514-c5", appId: "1:519295049418:web:7d04e18c4ea36bc088de33" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ŞEHİR DATASI (KODUN İÇİNDE - BOŞ KALMAZ!)
        const ILDATA = {
            "İstanbul": ["Adalar", "Beşiktaş", "Kadıköy", "Şişli", "Üsküdar", "Fatih", "Zeytinburnu"],
            "Ankara": ["Çankaya", "Keçiören", "Mamak", "Yenimahalle", "Etimesgut"],
            "İzmir": ["Bornova", "Buca", "Karşıyaka", "Konak"],
            "Bursa": ["Nilüfer", "Osmangazi", "Yıldırım"],
            "Adana": ["Seyhan", "Çukurova", "Yüreğir"]
            // Not: Diğer iller de eklenebilir, bu liste kutuların dolduğunu kanıtlar.
        };

        const ilSelect = document.getElementById('auth-il');
        const ilceSelect = document.getElementById('auth-ilce');
        
        Object.keys(ILDATA).forEach(il => { const o = document.createElement('option'); o.value = il; o.innerText = il; ilSelect.appendChild(o); });
        ilSelect.onchange = (e) => {
            ilceSelect.innerHTML = '<option value="">İlçe Seçin</option>';
            (ILDATA[e.target.value] || []).forEach(d => { const o = document.createElement('option'); o.value = d; o.innerText = d; ilceSelect.appendChild(o); });
        };

        let allTeachers = [], currentTeacher = null;

        // VERİLERİ DİNLE VE GİRİŞ YAP
        onAuthStateChanged(auth, user => {
            if (user) {
                // Not: appId'yi senin TEA sistemine sabitledim.
                onSnapshot(collection(db, 'artifacts', 'tea-genel-sistem', 'public', 'data', 'teachers_tr'), snap => {
                    allTeachers = []; snap.forEach(d => allTeachers.push({id: d.id, ...d.data()}));
                    const savedId = sessionStorage.getItem('rehab_teacher_id');
                    if(savedId) {
                        const found = allTeachers.find(i => i.id === savedId);
                        if(found) { currentTeacher = found; updateUI(); showView('dashboard'); }
                    }
                });
            }
        });

        function updateUI() {
            if(currentTeacher) {
                document.getElementById('nav-kurum-name').innerText = currentTeacher.kurum;
                document.getElementById('dash-kurum-title').innerText = currentTeacher.kurum;
            }
        }

        window.setAuthMode = m => {
            const isL = m === 'login';
            document.getElementById('register-fields').classList.toggle('hidden', isL);
            document.getElementById('tab-login').className = isL ? "flex-1 py-3 rounded-xl bg-white shadow font-black text-indigo-600" : "flex-1 py-3 rounded-xl font-bold text-slate-400";
            document.getElementById('tab-register').className = !isL ? "flex-1 py-3 rounded-xl bg-white shadow font-black text-indigo-600" : "flex-1 py-3 rounded-xl font-bold text-slate-400";
        };

        document.getElementById('auth-form').onsubmit = async e => {
            e.preventDefault();
            const n = document.getElementById('auth-name').value.trim();
            const p = document.getElementById('auth-password').value.trim();
            const found = allTeachers.find(t => t.name.toLowerCase() === n.toLowerCase());

            if(found) {
                if(found.password === p) {
                    currentTeacher = found; sessionStorage.setItem('rehab_teacher_id', found.id); updateUI(); showView('dashboard');
                } else alert("Hatalı şifre!");
            } else {
                alert("Kayıt bulunamadı! Lütfen 'Yeni Kayıt' sekmesinden bir defaya mahsus hesap açın.");
            }
        };

        window.showView = v => {
            ['login', 'dashboard'].forEach(id => document.getElementById(id + '-view')?.classList.add('hidden'));
            document.getElementById(v + '-view').classList.remove('hidden');
            document.getElementById('navbar').classList.toggle('hidden', v === 'login');
            document.getElementById('loading-view').classList.add('hidden');
        };

        signInAnonymously(auth);
    </script>
</body>
</html>
