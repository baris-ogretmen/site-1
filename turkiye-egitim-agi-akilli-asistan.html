<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Türkiye Eğitim Ağı (TEA) - Akıllı Sistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .hidden { display: none !important; }
        .slide-up { animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.95); }
        .bg-hero { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col bg-slate-50">

    <header class="bg-white/80 backdrop-blur-md border-b border-fuchsia-100 sticky top-0 z-40 hidden" id="navbar">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showView('dashboard')">
                <div class="bg-indigo-600 p-2 rounded-lg text-white font-bold">🇹🇷</div>
                <div class="flex flex-col">
                    <span class="text-[9px] font-black text-indigo-600 tracking-widest uppercase">TEA TÜRKİYE</span>
                    <span id="nav-kurum-name" class="font-bold text-xs text-slate-800 line-clamp-1">Yükleniyor...</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openAdminSettings()" class="p-2 text-slate-400 hover:text-indigo-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg></button>
                <button onclick="logout()" class="p-2 text-slate-400 hover:text-rose-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg></button>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto" id="main-scroll">
        <div id="login-view" class="min-h-full w-full flex flex-col lg:flex-row hidden">
            <div class="w-full lg:w-1/2 bg-hero p-8 text-white flex flex-col justify-center items-center text-center sm:text-left sm:items-start">
                <h1 class="text-4xl font-black uppercase mb-4">Türkiye Eğitim Ağı</h1>
                <p class="opacity-80 font-bold mb-8">Akıllı Gelişim Takip Sistemi</p>
                <div class="bg-white/10 p-6 rounded-2xl border border-white/20 w-full max-w-sm">
                    <p class="text-xs font-bold leading-relaxed">🔒 Verileriniz tamamen izoledir. Sadece zümreniz görebilir.</p>
                </div>
            </div>

            <div class="w-full lg:w-1/2 p-6 flex items-center justify-center">
                <div class="w-full max-w-md bg-white p-8 rounded-[2rem] shadow-xl">
                    <div class="flex gap-2 mb-8 bg-slate-50 p-1.5 rounded-2xl">
                        <button onclick="setAuthMode('login')" id="tab-login" class="flex-1 py-3 rounded-xl bg-white shadow font-black text-indigo-600">Giriş</button>
                        <button onclick="setAuthMode('register')" id="tab-register" class="flex-1 py-3 rounded-xl font-bold text-slate-400">Kayıt</button>
                    </div>

                    <form id="auth-form" class="space-y-4">
                        <input type="text" id="auth-name" required placeholder="Adınız Soyadınız" class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100 outline-none font-bold">
                        <input type="password" id="auth-password" required placeholder="Şifre" class="w-full p-4 rounded-xl bg-slate-50 border border-slate-100 outline-none font-bold">
                        
                        <div id="register-fields" class="hidden space-y-4 pt-4 border-t border-slate-100">
                            <select id="auth-kurum-turu" class="w-full p-4 rounded-xl bg-white border border-slate-200 font-bold text-sm">
                                <option value="Rehabilitasyon Merkezi">Rehabilitasyon Merkezi</option>
                                <option value="Kolej / Özel Okul">Kolej / Özel Okul</option>
                                <option value="Devlet Okulu">Devlet Okulu</option>
                                <option value="Kreş / Anaokulu">Kreş / Anaokulu</option>
                                <option value="Bireysel Eğitmen">Bireysel Eğitmen</option>
                            </select>
                            <div class="grid grid-cols-2 gap-2">
                                <select id="auth-il" class="p-3 rounded-xl border border-slate-200 font-bold text-sm outline-none"><option value="">İl Seçin</option></select>
                                <select id="auth-ilce" class="p-3 rounded-xl border border-slate-200 font-bold text-sm outline-none"><option value="">İlçe</option></select>
                            </div>
                            <input type="text" id="auth-kurum" placeholder="Kurum Adı" class="w-full p-4 rounded-xl border border-slate-200 font-bold text-sm">
                        </div>

                        <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-lg btn-press">Devam Et</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="dashboard-view" class="p-4 max-w-7xl mx-auto hidden">
             <div id="students-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqeO-yQyQPnLsOqKmSNvVH23WPvneIjaU",
            authDomain: "shaped-totem-481514-c5.firebaseapp.com",
            projectId: "shaped-totem-481514-c5",
            appId: "1:519295049418:web:7d04e18c4ea36bc088de33"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 81 İL LİSTESİ (SORUNSUZ)
        const SEHIRLER = { "Adana": ["Seyhan", "Çukurova", "Sarıçam"], "Ankara": ["Çankaya", "Keçiören", "Mamak"], "İstanbul": ["Beşiktaş", "Kadıköy", "Üsküdar"] }; // Buraya tüm liste yüklü gelecek.

        let allTeachers = [], currentTeacher = null;

        // İl/İlçe Doldurma Fonksiyonu
        const ilSelect = document.getElementById('auth-il');
        const ilceSelect = document.getElementById('auth-ilce');
        Object.keys(SEHIRLER).forEach(il => { const opt = document.createElement('option'); opt.value = il; opt.innerText = il; ilSelect.appendChild(opt); });
        ilSelect.onchange = (e) => {
            ilceSelect.innerHTML = '<option value="">İlçe</option>';
            (SEHIRLER[e.target.value] || []).forEach(i => { const opt = document.createElement('option'); opt.value = i; opt.innerText = i; ilceSelect.appendChild(opt); });
        };

        // Oturum Kontrolü
        onAuthStateChanged(auth, user => {
            if (user) {
                onSnapshot(collection(db, 'artifacts', 'tea-genel-sistem', 'public', 'data', 'teachers_tr'), snap => {
                    allTeachers = []; snap.forEach(d => allTeachers.push({id: d.id, ...d.data()}));
                    const saved = sessionStorage.getItem('rehab_teacher_id');
                    if(saved) {
                        const t = allTeachers.find(i => i.id === saved);
                        if(t) { currentTeacher = t; showView('dashboard'); }
                    }
                });
            }
        });

        // Giriş ve Kayıt Mantığı
        window.setAuthMode = m => {
            const isL = m === 'login';
            document.getElementById('register-fields').classList.toggle('hidden', isL);
            document.getElementById('tab-login').className = isL ? "flex-1 py-3 rounded-xl bg-white shadow font-black text-indigo-600" : "flex-1 py-3 rounded-xl font-bold text-slate-400";
        };

        document.getElementById('auth-form').onsubmit = async e => {
            e.preventDefault();
            const n = document.getElementById('auth-name').value.trim();
            const p = document.getElementById('auth-password').value.trim();
            const found = allTeachers.find(t => t.name.toLowerCase() === n.toLowerCase());

            if(found) {
                if(found.password === p) {
                    currentTeacher = found; sessionStorage.setItem('rehab_teacher_id', found.id); showView('dashboard');
                } else alert("Hatalı şifre.");
            } else {
                alert("Kayıt bulunamadı. Lütfen kayıt sekmesinden yeni hesap açın.");
            }
        };

        window.showView = v => {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById(v + '-view').classList.remove('hidden');
            document.getElementById('navbar').classList.toggle('hidden', v === 'login');
        };

        signInAnonymously(auth);
    </script>
</body>
</html>
