<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sihirli Yollar: Bilye Macerası - Akıl ve Zeka Sürümü</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b1120;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            touch-action: none; /* Mobilde ve akıllı tahtada sayfayı kaydırmayı tamamen engeller */
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 800px; /* PC/Akıllı tahtada ekranın ortasında dikey form faktörünü korur */
            display: flex;
            flex-direction: column;
            background-color: #0f172a;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.1);
        }

        /* Glassmorphism Üst UI Paneli */
        #header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 5px;
        }

        .hud-box { display: flex; flex-direction: column; align-items: center; }
        .hud-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 900; }
        .hud-value { font-family: 'Fredoka One', cursive; font-size: 20px; color: #f8fafc; }

        #combo-display {
            color: #fbbf24; display: none; text-shadow: 0 0 10px #d97706;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Dinamik Mürekkep Barı */
        #ink-container {
            flex-grow: 1; margin: 0 10px; height: 20px;
            background-color: #0f172a; border-radius: 10px;
            border: 2px solid #64748b; overflow: hidden; position: relative;
        }
        #ink-bar {
            height: 100%; width: 100%; background: linear-gradient(90deg, #3b82f6, #00f0ff);
            transition: width 0.1s linear;
        }
        .rainbow-bg {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 200% 200%; animation: rainbowMove 2s linear infinite;
        }
        @keyframes rainbowMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        #ink-text {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            text-align: center; line-height: 20px; font-size: 12px; font-weight: 900; color: white; text-shadow: 1px 1px 2px black;
        }

        /* Araç Butonları */
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;}
        .btn {
            font-family: 'Fredoka One', cursive; color: white; border: none;
            padding: 8px 12px; font-size: 14px; border-radius: 8px; cursor: pointer;
            transition: all 0.1s ease; opacity: 0.7; filter: grayscale(50%);
        }
        .btn.active { opacity: 1; filter: grayscale(0%); transform: scale(1.05); }
        .btn:active { transform: translateY(4px); }

        .tool-kaygan { background-color: #a855f7; box-shadow: 0 4px 0 #7e22ce; }
        .tool-zipzip { background-color: #22c55e; box-shadow: 0 4px 0 #15803d; }
        .tool-roket { background-color: #f97316; box-shadow: 0 4px 0 #c2410c; }
        .tool-silgi { background-color: #ef4444; box-shadow: 0 4px 0 #b91c1c; }

        .action-btn { background-color: #475569; box-shadow: 0 4px 0 #334155; opacity: 1; filter: none;}
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #334155; }
        
        .menu-btn { background-color: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; opacity: 1; filter: none; padding: 5px 10px;}

        /* Canvas ve Grid */
        #canvas-container {
            flex-grow: 1; position: relative; overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        .grid-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 1;
        }

        /* Ana Menü */
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 17, 32, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        #main-menu h1 {
            font-family: 'Fredoka One', cursive; font-size: 58px; color: #ffffff;
            margin: 0 0 5px 0; text-shadow: 0 0 20px rgba(0, 240, 255, 0.8); text-align: center; line-height: 1.1;
        }
        #main-menu p { font-size: 20px; color: #94a3b8; font-weight: bold; margin-bottom: 30px; }
        
        .kademe-btn {
            font-family: 'Fredoka One', cursive; width: 85%; max-width: 360px; padding: 18px; margin-bottom: 15px;
            font-size: 22px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.1); color: white;
            cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden;
        }
        .kademe-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-anaokulu { background: linear-gradient(135deg, #f43f5e, #fb923c); }
        .btn-ilkokul { background: linear-gradient(135deg, #3b82f6, #2dd4bf); }
        .btn-ortaokul { background: linear-gradient(135deg, #8b5cf6, #c026d3); }
        .kademe-desc { font-family: 'Nunito', sans-serif; font-size: 13px; display: block; font-weight: normal; color: rgba(255,255,255,0.8); }

        .bucket-label {
            position: absolute; bottom: 15px; font-family: 'Fredoka One', cursive; font-size: 30px;
            color: white; pointer-events: none; transform: translateX(-50%);
            filter: drop-shadow(0px 0px 10px rgba(255,255,255,0.4)); z-index: 5;
        }
        
        #speed-slider { width: 80px; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Akıllı Arayüz -->
        <div id="header">
            <div class="header-top-row">
                <div class="hud-box">
                    <span class="hud-label">Puan</span>
                    <span class="hud-value" id="score">0 <span id="combo-display">x2</span></span>
                </div>
                
                <div id="ink-container">
                    <div id="ink-bar"></div>
                    <div id="ink-text" id="ink-label">Mürekkep</div>
                </div>

                <div class="hud-box" style="flex-direction: row; gap: 5px;">
                    <span class="hud-label">Hız</span>
                    <input type="range" id="speed-slider" min="0.5" max="2.5" step="0.1" value="1">
                    <button class="btn menu-btn" onclick="openMenu()">🏠</button>
                </div>
            </div>

            <!-- Akıllı Çizim Araçları -->
            <div class="header-bottom-row">
                <div class="btn-group">
                    <button class="btn tool-kaygan active" id="btn-tool-0" onclick="setTool(0)">🧊 Kaygan</button>
                    <button class="btn tool-zipzip" id="btn-tool-1" onclick="setTool(1)">🐸 Zıpzıp</button>
                    <button class="btn tool-roket" id="btn-tool-2" onclick="setTool(2)">🚀 Roket</button>
                    <button class="btn tool-silgi" id="btn-tool-3" onclick="setTool(3)">🧽 Silgi</button>
                </div>
                <div class="btn-group">
                    <button class="btn action-btn" onclick="undoStroke()">↩️ Geri Al</button>
                    <button class="btn action-btn" onclick="clearAllLines()">🗑️ Temizle</button>
                </div>
            </div>
        </div>
        
        <div id="canvas-container">
            <div class="grid-bg"></div>
            <canvas id="gameCanvas"></canvas>
            
            <div class="bucket-label" style="left: 12.5%;">❤️</div>
            <div class="bucket-label" style="left: 37.5%;">💙</div>
            <div class="bucket-label" style="left: 62.5%;">💚</div>
            <div class="bucket-label" style="left: 87.5%;">💛</div>

            <div id="main-menu">
                <h1>SİHİRLİ<br>YOLLAR</h1>
                <p>Eğitim Kademesini Seçiniz:</p>
                
                <button class="kademe-btn btn-anaokulu" onclick="startGame('ANAOKULU')">
                    👶 ANAOKULU
                    <span class="kademe-desc">Sınırsız Mürekkep, Yavaş Hız, Sadece Eğlence</span>
                </button>
                
                <button class="kademe-btn btn-ilkokul" onclick="startGame('İLKOKUL')">
                    🎒 İLKOKUL
                    <span class="kademe-desc">Sınırlı Mürekkep, Planlama ve Zeka</span>
                </button>
                
                <button class="kademe-btn btn-ortaokul" onclick="startGame('ORTAOKUL')">
                    🎓 ORTAOKUL
                    <span class="kademe-desc">Işınlanma Portalları ve Hareketli Engeller!</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const scoreEl = document.getElementById('score');
        const comboDisplayEl = document.getElementById('combo-display');
        const inkBarEl = document.getElementById('ink-bar');
        const inkTextEl = document.getElementById('ink-text');
        const speedSlider = document.getElementById('speed-slider');
        const mainMenu = document.getElementById('main-menu');

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 1200;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        const COLORS = [
            { main: '#ff3333', drop: '#990000', glow: 'rgba(255, 51, 51, 0.6)' },
            { main: '#3399ff', drop: '#004080', glow: 'rgba(51, 153, 255, 0.6)' },
            { main: '#33cc33', drop: '#006600', glow: 'rgba(51, 204, 51, 0.6)' },
            { main: '#ffcc00', drop: '#997a00', glow: 'rgba(255, 204, 0, 0.6)' }
        ];

        // Seviye Konfigürasyonları (Akıl Zeka Elementleri Eklendi)
        const KADEMELER = {
            'ANAOKULU': { 
                maxInk: Infinity, spawnerSpeed: 1.5, spawnRate: 150, gravityMod: 0.4, 
                obstacles: [], portals: [] 
            },
            'İLKOKUL': { 
                maxInk: 2500, spawnerSpeed: 2.5, spawnRate: 110, gravityMod: 0.6, 
                obstacles: [], portals: [] 
            },
            'ORTAOKUL': { 
                maxInk: 2000, spawnerSpeed: 4.0, spawnRate: 85, gravityMod: 0.8, 
                obstacles: [{x: 400, y: 450, r: 50, moveSpeed: 4, dir: 1}],
                portals: [
                    { in: {x: 150, y: 350}, out: {x: 650, y: 700}, r: 35, color: '#c026d3' },
                    { in: {x: 650, y: 350}, out: {x: 150, y: 700}, r: 35, color: '#f59e0b' }
                ] 
            }
        };

        let currentKademe = 'ANAOKULU';
        let gameState = 'MENU'; 
        let score = 0, maxInk = Infinity, currentInk = maxInk, combo = 0;
        let globalSpeedMultiplier = 1.0; 
        
        let currentTool = 0; // 0:Kaygan, 1:Zıpzıp, 2:Roket, 3:Silgi
        let currentStrokeId = 0; // Geri al fonksiyonu için grup kimliği

        let particles = [], userLines = [], confettis = [], floatingTexts = [];
        let activeObstacles = [], activePortals = [], drawSparks = [];
        
        const SUBSTEPS = 3; 
        let currentGravity = 0.6 / SUBSTEPS;
        let particleIdCounter = 0, frameCount = 0;

        const BUCKETS = [
            { x: 0, width: 200, color: 0 }, { x: 200, width: 200, color: 1 },
            { x: 400, width: 200, color: 2 }, { x: 600, width: 200, color: 3 }
        ];

        let spawner = { x: 400, y: 50, direction: 1, baseSpeed: 2, baseInterval: 120, nextSpawnTime: 0, currentColor: 0 };

        // --- ARAÇ VE AKSİYON YÖNETİMİ ---
        window.setTool = function(toolId) {
            currentTool = toolId;
            for(let i=0; i<=3; i++) {
                let btn = document.getElementById(`btn-tool-${i}`);
                if(i === toolId) btn.classList.add('active');
                else btn.classList.remove('active');
            }
        };

        window.undoStroke = function() {
            if(userLines.length === 0 || gameState !== 'PLAYING') return;
            // En yüksek strokeId'yi bul
            let lastStrokeId = Math.max(...userLines.map(l => l.strokeId));
            
            // O ID'ye ait çizgileri sil ve mürekkebi iade et
            let keptLines = [];
            let refundedInk = 0;
            for(let l of userLines) {
                if(l.strokeId === lastStrokeId) {
                    refundedInk += l.length;
                    createSparks(l.x2, l.y2, '#ffffff', 1); // Silinme efekti
                } else {
                    keptLines.push(l);
                }
            }
            userLines = keptLines;
            if(currentInk !== Infinity) {
                currentInk = Math.min(maxInk, currentInk + refundedInk);
            }
            updateInkBar();
        };

        window.clearAllLines = function() {
            if(gameState !== 'PLAYING') return;
            userLines = [];
            if(currentInk !== Infinity) currentInk = maxInk;
            updateInkBar();
        };

        window.openMenu = function() {
            gameState = 'MENU';
            mainMenu.style.display = 'flex';
        };

        speedSlider.addEventListener('input', (e) => { globalSpeedMultiplier = parseFloat(e.target.value); });

        // --- GELİŞMİŞ POINTER (DOKUNMATİK/KALEM/FARE) ETKİLEŞİMİ ---
        let isDrawing = false;
        let lastDrawPoint = null;
        let pointerPos = {x: -100, y: -100}; // Silgi dairesini çizmek için

        function getPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = GAME_WIDTH / rect.width;
            const scaleY = GAME_HEIGHT / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        // Noktanın çizgi segmentine olan uzaklığını hesaplar (Silgi mekaniği için)
        function pointToSegmentDist(px, py, x1, y1, x2, y2) {
            let l2 = (x2-x1)*(x2-x1) + (y2-y1)*(y2-y1);
            if (l2 == 0) return Math.sqrt((px-x1)*(px-x1) + (py-y1)*(py-y1));
            let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
            t = Math.max(0, Math.min(1, t));
            let projX = x1 + t * (x2 - x1);
            let projY = y1 + t * (y2 - y1);
            return Math.sqrt((px - projX)*(px - projX) + (py - projY)*(py - projY));
        }

        // Akıllı Silgi Fonksiyonu: Belirli bir yarıçaptaki çizgileri keser/siler
        function eraseLinesAt(x, y) {
            let eraserRadius = 25;
            let keptLines = [];
            let erasedAny = false;
            
            for (let line of userLines) {
                let d = pointToSegmentDist(x, y, line.x1, line.y1, line.x2, line.y2);
                if (d > eraserRadius) {
                    keptLines.push(line);
                } else {
                    erasedAny = true;
                    // Mürekkep iadesi
                    if (currentInk !== Infinity) currentInk = Math.min(maxInk, currentInk + line.length);
                    // Silinen yerde kıvılcım çıkar
                    createSparks(line.x1 + (line.x2-line.x1)/2, line.y1 + (line.y2-line.y1)/2, '#ef4444', 1);
                }
            }
            if (erasedAny) {
                userLines = keptLines;
                updateInkBar();
            }
        }

        function handlePointerDown(e) {
            if (gameState !== 'PLAYING') return;
            canvas.setPointerCapture(e.pointerId);
            isDrawing = true;
            pointerPos = getPos(e);
            
            if (currentTool === 3) {
                eraseLinesAt(pointerPos.x, pointerPos.y);
            } else {
                if (currentInk <= 0) return;
                currentStrokeId++; // Yeni bir çizgi grubuna başla
                lastDrawPoint = pointerPos;
            }
        }

        function handlePointerMove(e) {
            if (gameState !== 'PLAYING') return;
            pointerPos = getPos(e);

            if (!isDrawing) return;

            if (currentTool === 3) {
                // Silgi modu sürükleme
                eraseLinesAt(pointerPos.x, pointerPos.y);
            } else {
                // Çizim Modu
                if (currentInk <= 0 || !lastDrawPoint) return;
                
                let currentPoint = pointerPos;
                let dx = currentPoint.x - lastDrawPoint.x;
                let dy = currentPoint.y - lastDrawPoint.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                // Çok sık ve hassas noktalar al (Hemen etkileşime girmesi için dist > 8 yapıldı)
                if (dist > 8) {
                    if (currentInk !== Infinity) {
                        if (currentInk - dist < 0) {
                            isDrawing = false; lastDrawPoint = null; return;
                        }
                        currentInk -= dist;
                    }

                    userLines.push({ 
                        x1: lastDrawPoint.x, y1: lastDrawPoint.y, 
                        x2: currentPoint.x, y2: currentPoint.y, 
                        length: dist, type: currentTool, strokeId: currentStrokeId 
                    });
                    
                    updateInkBar();
                    
                    // Görsel Kıvılcım
                    let sparkColor = currentTool === 1 ? '#22c55e' : (currentTool === 2 ? '#f97316' : '#00f0ff');
                    createSparks(currentPoint.x, currentPoint.y, sparkColor, 2);

                    lastDrawPoint = currentPoint;
                }
            }
        }

        function handlePointerUp(e) {
            isDrawing = false;
            lastDrawPoint = null;
            canvas.releasePointerCapture(e.pointerId);
        }

        // Event Dinleyicilerini Eklem (Pointer Eventleri tüm cihazları kapsar)
        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);

        // --- OYUN MANTIĞI VE BAŞLATMA ---
        window.startGame = function(kademeKey) {
            currentKademe = kademeKey;
            let cfg = KADEMELER[kademeKey];
            
            score = 0; maxInk = cfg.maxInk; currentInk = maxInk;
            spawner.baseSpeed = cfg.spawnerSpeed; spawner.baseInterval = cfg.spawnRate;
            currentGravity = cfg.gravityMod / SUBSTEPS;
            activeObstacles = JSON.parse(JSON.stringify(cfg.obstacles));
            activePortals = JSON.parse(JSON.stringify(cfg.portals));
            
            userLines = []; particles = []; confettis = [];
            floatingTexts = []; drawSparks = []; combo = 0; currentStrokeId = 0;
            
            speedSlider.value = 1.0; globalSpeedMultiplier = 1.0;
            setTool(0); // Varsayılan kalem
            
            updateUI();
            gameState = 'PLAYING';
            mainMenu.style.display = 'none';
        }

        function updateUI() {
            let baseScoreText = `${score}`;
            if (combo > 1) {
                comboDisplayEl.style.display = 'inline-block'; comboDisplayEl.innerText = `x${combo} KOMBO!`;
            } else {
                comboDisplayEl.style.display = 'none';
            }
            scoreEl.innerHTML = `${baseScoreText} <span id="combo-display" style="${combo > 1 ? 'display:inline-block;' : 'display:none;'}">x${combo} KOMBO!</span>`;
            updateInkBar();
        }

        function updateInkBar() {
            if (currentInk === Infinity) {
                inkBarEl.style.width = '100%'; inkBarEl.className = 'rainbow-bg'; inkTextEl.innerText = "Sınırsız Çizim";
            } else {
                inkBarEl.className = '';
                const percentage = Math.max(0, (currentInk / maxInk) * 100);
                inkBarEl.style.width = percentage + '%';
                inkTextEl.innerText = "Mürekkep";
                if(percentage < 25) inkBarEl.style.background = '#ef4444';
                else inkBarEl.style.background = 'linear-gradient(90deg, #3b82f6, #00f0ff)';
            }
        }

        function addFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, life: 1.0, vy: -2 });
        }

        function createSparks(x, y, color, count) {
            for(let i=0; i<count; i++) {
                drawSparks.push({
                    x: x + (Math.random()-0.5)*10, y: y + (Math.random()-0.5)*10,
                    vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
                    life: 1.0, size: Math.random()*3 + 1, color: color
                });
            }
        }

        function createConfetti(x, y, colorIndex, count = 15, customColor=null) {
            for(let i = 0; i < count; i++) {
                confettis.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 12 * globalSpeedMultiplier, 
                    vy: (Math.random() - 1) * 12 * globalSpeedMultiplier,
                    size: Math.random() * 8 + 4, 
                    color: customColor || COLORS[colorIndex].main, 
                    life: 1.0
                });
            }
        }

        // --- FİZİK MOTORU ---
        function spawnMarble() {
            let colorType = Math.floor(Math.random() * 4);
            let speedMod = globalSpeedMultiplier;
            let p = {
                id: particleIdCounter++, x: spawner.x, y: spawner.y + 20,
                oldX: spawner.x + (Math.random() - 0.5) * 4 * speedMod, oldY: spawner.y + 20,
                radius: 18, color: colorType, trail: [], portalCooldown: 0 
            };
            particles.push(p);
            spawner.currentColor = Math.floor(Math.random() * 4);
        }

        function resolveLineCollision(p, line) {
            let dx = line.x2 - line.x1; let dy = line.y2 - line.y1;
            let len2 = dx * dx + dy * dy; if (len2 === 0) return;
            let t = Math.max(0, Math.min(1, ((p.x - line.x1) * dx + (p.y - line.y1) * dy) / len2));
            let closestX = line.x1 + t * dx; let closestY = line.y1 + t * dy;
            let distX = p.x - closestX; let distY = p.y - closestY;
            let dist2 = distX * distX + distY * distY;
            let collisionRadius = p.radius + 4; 

            if (dist2 < collisionRadius * collisionRadius) {
                let dist = Math.sqrt(dist2);
                let nx = distX / dist; let ny = distY / dist;
                if (dist === 0) { nx = -dy / Math.sqrt(len2); ny = dx / Math.sqrt(len2); }
                p.x += nx * (collisionRadius - dist); p.y += ny * (collisionRadius - dist);
                let vx = p.x - p.oldX; let vy = p.y - p.oldY;
                let dot = vx * nx + vy * ny;
                
                if (line.type === 1) { // Zıpzıp
                    p.oldX = p.x - (vx - 2.8 * dot * nx); p.oldY = p.y - (vy - 2.8 * dot * ny);
                } else if (line.type === 2) { // Roket
                    let len = Math.sqrt(len2); let tx = dx / len; let ty = dy / len;
                    let pushDir = (vx * tx + vy * ty) > 0 ? 1 : -1; 
                    p.oldX = p.x - (vx - 2 * dot * nx) * 0.99 - (tx * pushDir * 3);
                    p.oldY = p.y - (vy - 2 * dot * ny) * 0.99 - (ty * pushDir * 3);
                } else { // Kaygan (Sürtünme sıfıra yakın)
                    p.oldX = p.x - (vx - 2 * dot * nx) * 0.995; p.oldY = p.y - (vy - 2 * dot * ny) * 0.995;
                }
            }
        }

        function updateLogic() {
            if(gameState !== 'PLAYING') return;
            frameCount++;

            let activeSpeed = spawner.baseSpeed * globalSpeedMultiplier;
            let activeInterval = Math.max(20, spawner.baseInterval / globalSpeedMultiplier);
            let activeGravity = currentGravity * globalSpeedMultiplier;

            spawner.x += activeSpeed * spawner.direction;
            if (spawner.x > GAME_WIDTH - 50 || spawner.x < 50) spawner.direction *= -1;

            if (frameCount >= spawner.nextSpawnTime) {
                spawnMarble(); spawner.nextSpawnTime = frameCount + activeInterval;
            }

            for (let obs of activeObstacles) {
                if (obs.moveSpeed) {
                    obs.x += obs.moveSpeed * globalSpeedMultiplier * obs.dir;
                    if(obs.x > GAME_WIDTH - 150 || obs.x < 150) obs.dir *= -1;
                }
            }

            for (let s = 0; s < SUBSTEPS; s++) {
                for (let p of particles) {
                    let vx = (p.x - p.oldX) * 0.99; let vy = (p.y - p.oldY) * 0.99;
                    p.oldX = p.x; p.oldY = p.y;
                    p.x += vx; p.y += vy + activeGravity;

                    if (p.x < p.radius) { p.x = p.radius; p.oldX = p.x + vx * 0.5; }
                    if (p.x > GAME_WIDTH - p.radius) { p.x = GAME_WIDTH - p.radius; p.oldX = p.x + vx * 0.5; }
                    
                    if (p.portalCooldown > 0) p.portalCooldown--;
                }

                // Portallar ile Etkileşim (Sadece Ortaokul modunda var)
                for (let p of particles) {
                    if (p.portalCooldown <= 0) {
                        for (let pt of activePortals) {
                            let dist2 = (p.x - pt.in.x)*(p.x - pt.in.x) + (p.y - pt.in.y)*(p.y - pt.in.y);
                            if (dist2 < pt.r * pt.r) {
                                // İçeri Girdi! Diğerinden Çıkar
                                let vx = p.x - p.oldX; let vy = p.y - p.oldY;
                                p.x = pt.out.x; p.y = pt.out.y;
                                p.oldX = p.x - vx; p.oldY = p.y - vy; // Hızı koru
                                p.portalCooldown = 30 * SUBSTEPS; // Hemen geri girmesin
                                
                                createConfetti(pt.in.x, pt.in.y, 0, 15, pt.color);
                                createConfetti(pt.out.x, pt.out.y, 0, 15, pt.color);
                                addFloatingText(pt.in.x, pt.in.y - 30, "ZAP!", pt.color);
                                break; 
                            }
                        }
                    }
                }

                for (let p of particles) {
                    for (let line of userLines) resolveLineCollision(p, line);
                    for (let obs of activeObstacles) {
                        let dx = p.x - obs.x; let dy = p.y - obs.y;
                        let dist2 = dx*dx + dy*dy; let minDist = p.radius + obs.r;
                        if (dist2 < minDist*minDist) {
                            let dist = Math.sqrt(dist2); let nx = dx/dist; let ny = dy/dist;
                            p.x += nx*(minDist-dist); p.y += ny*(minDist-dist);
                            let vx = p.x - p.oldX; let vy = p.y - p.oldY;
                            let dot = vx*nx + vy*ny;
                            p.oldX = p.x - (vx - 2*dot*nx)*1.5; p.oldY = p.y - (vy - 2*dot*ny)*1.5;
                        }
                    }
                }
            }

            if(frameCount % Math.max(1, Math.floor(3 / globalSpeedMultiplier)) === 0) {
                for (let p of particles) {
                    p.trail.push({x: p.x, y: p.y});
                    if(p.trail.length > 6) p.trail.shift();
                }
            }

            for (let i = drawSparks.length - 1; i >= 0; i--) {
                let s = drawSparks[i]; s.x += s.vx; s.y += s.vy; s.life -= 0.05;
                if(s.life <= 0) drawSparks.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                if (p.y > GAME_HEIGHT - 60) {
                    let bucketIndex = Math.floor(p.x / 200);
                    if(bucketIndex >= 0 && bucketIndex < 4) {
                        if (p.color === BUCKETS[bucketIndex].color) {
                            combo++; let points = 10 * combo; score += points;
                            if(currentInk !== Infinity) currentInk = Math.min(maxInk, currentInk + 200);
                            addFloatingText(p.x, p.y - 40, `+${points}`, "#22c55e");
                            if(combo >= 3) addFloatingText(p.x, p.y - 70, `Harika!`, "#fbbf24");
                            createConfetti(p.x, p.y, p.color, currentKademe === 'ANAOKULU' ? 30 : (15 + combo * 5));
                        } else {
                            combo = 0; addFloatingText(p.x, p.y - 40, "Yanlış Kutu!", "#94a3b8");
                        }
                    }
                    particles.splice(i, 1); updateUI();
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; ft.y += ft.vy; ft.life -= 0.015;
                if(ft.life <= 0) floatingTexts.splice(i, 1);
            }
            for (let i = confettis.length - 1; i >= 0; i--) {
                let c = confettis[i]; c.x += c.vx; c.y += c.vy; c.vy += 0.2 * globalSpeedMultiplier; c.life -= 0.02 * globalSpeedMultiplier;
                if (c.life <= 0) confettis.splice(i, 1);
            }
        }

        // --- RENDER ---
        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Alt Kutular
            for (let b of BUCKETS) {
                ctx.fillStyle = COLORS[b.color].drop; ctx.fillRect(b.x, GAME_HEIGHT - 80, b.width, 80);
                ctx.shadowColor = COLORS[b.color].glow; ctx.shadowBlur = 15;
                ctx.fillStyle = COLORS[b.color].main; ctx.fillRect(b.x, GAME_HEIGHT - 80, b.width, 10);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#0b1120'; ctx.lineWidth = 4; ctx.strokeRect(b.x, GAME_HEIGHT - 80, b.width, 80);
            }

            // Portallar
            for (let pt of activePortals) {
                let angle = frameCount * 0.05;
                // Giriş Portalı
                ctx.save(); ctx.translate(pt.in.x, pt.in.y); ctx.rotate(angle);
                ctx.beginPath(); ctx.arc(0, 0, pt.r, 0, Math.PI*2);
                ctx.strokeStyle = pt.color; ctx.lineWidth = 6; ctx.setLineDash([15, 10]);
                ctx.shadowColor = pt.color; ctx.shadowBlur = 20; ctx.stroke(); ctx.restore();
                
                // Çıkış Portalı
                ctx.save(); ctx.translate(pt.out.x, pt.out.y); ctx.rotate(-angle);
                ctx.beginPath(); ctx.arc(0, 0, pt.r, 0, Math.PI*2);
                ctx.strokeStyle = pt.color; ctx.lineWidth = 6; ctx.setLineDash([15, 10]);
                ctx.shadowColor = pt.color; ctx.shadowBlur = 20; ctx.stroke(); ctx.restore();
                
                // Orta kara delik efekti
                ctx.beginPath(); ctx.arc(pt.in.x, pt.in.y, pt.r*0.6, 0, Math.PI*2); ctx.fillStyle = '#000'; ctx.fill();
                ctx.beginPath(); ctx.arc(pt.out.x, pt.out.y, pt.r*0.6, 0, Math.PI*2); ctx.fillStyle = '#000'; ctx.fill();
            }

            // Hareketli Engeller
            for (let obs of activeObstacles) {
                let pulse = Math.sin(frameCount * 0.1) * 5;
                ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.r + pulse, 0, Math.PI * 2);
                ctx.fillStyle = '#c026d3'; ctx.shadowColor = '#d946ef'; ctx.shadowBlur = 25; ctx.fill();
                ctx.shadowBlur = 0; ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.r * 0.7, 0, Math.PI * 2);
                ctx.fillStyle = '#fdf4ff'; ctx.fill();
            }

            // Çizgiler
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            for (let line of userLines) {
                let lineColor = '#00f0ff'; 
                if (line.type === 1) lineColor = '#22c55e';
                if (line.type === 2) lineColor = '#f97316';

                ctx.strokeStyle = lineColor; ctx.shadowColor = lineColor; ctx.shadowBlur = 20; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(line.x1, line.y1); ctx.lineTo(line.x2, line.y2); ctx.stroke();
                ctx.shadowBlur = 0; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; ctx.stroke();
            }

            for (let s of drawSparks) {
                ctx.fillStyle = s.color; ctx.globalAlpha = s.life;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            // Silgi Cursor Efekti
            if (currentTool === 3 && pointerPos.x > 0) {
                ctx.beginPath(); ctx.arc(pointerPos.x, pointerPos.y, 25, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(239, 68, 68, 0.3)'; ctx.fill();
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.stroke();
            } else if (isDrawing && lastDrawPoint) {
                ctx.fillStyle = '#ffffff'; ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 10;
                ctx.beginPath(); ctx.arc(lastDrawPoint.x, lastDrawPoint.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Bilyeler
            for (let p of particles) {
                if(p.trail.length > 1) {
                    ctx.beginPath(); ctx.moveTo(p.trail[0].x, p.trail[0].y);
                    for(let i=1; i<p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
                    ctx.lineTo(p.x, p.y); ctx.strokeStyle = COLORS[p.color].glow;
                    ctx.lineWidth = p.radius * 1.8; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
                }
                let grad = ctx.createRadialGradient(p.x - p.radius*0.3, p.y - p.radius*0.3, p.radius*0.1, p.x, p.y, p.radius);
                grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.3, COLORS[p.color].main); grad.addColorStop(1, COLORS[p.color].drop);
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1; ctx.stroke();
            }

            // Spawner
            ctx.fillStyle = '#334155'; ctx.fillRect(spawner.x - 35, 0, 70, 45);
            ctx.fillStyle = '#94a3b8'; ctx.fillRect(spawner.x - 40, 35, 80, 15);
            let ngrad = ctx.createRadialGradient(spawner.x-3, 20-3, 1.5, spawner.x, 20, 12);
            ngrad.addColorStop(0, '#ffffff'); ngrad.addColorStop(0.3, COLORS[spawner.currentColor].main); ngrad.addColorStop(1, COLORS[spawner.currentColor].drop);
            ctx.fillStyle = ngrad; ctx.beginPath(); ctx.arc(spawner.x, 20, 12, 0, Math.PI*2); ctx.fill();

            for (let c of confettis) { ctx.fillStyle = c.color; ctx.globalAlpha = c.life; ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI*2); ctx.fill(); }
            ctx.globalAlpha = 1.0;

            ctx.font = "bold 28px 'Fredoka One'"; ctx.textAlign = "center";
            for (let ft of floatingTexts) {
                ctx.fillStyle = ft.color; ctx.globalAlpha = ft.life; ctx.lineWidth = 4;
                ctx.strokeStyle = 'rgba(0,0,0,' + ft.life + ')'; ctx.strokeText(ft.text, ft.x, ft.y); ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1.0;
        }

        function gameLoop() { updateLogic(); draw(); requestAnimationFrame(gameLoop); }

        updateInkBar();
        requestAnimationFrame(gameLoop);

    </script>
</body>
