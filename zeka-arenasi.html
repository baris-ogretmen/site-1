<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Değişim Zeka Arenası v16 - MEGA</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wood: { 800: '#5c3a21', 900: '#3e2514' },
                        neon: { cyan: '#06b6d4', amber: '#f59e0b', rose: '#e11d48', green: '#10b981', purple: '#8b5cf6' }
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 15px rgba(6, 182, 212, 0.6)',
                        'neon-amber': '0 0 15px rgba(245, 158, 11, 0.6)',
                        'neon-rose': '0 0 15px rgba(225, 29, 72, 0.6)',

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.15), transparent 25%);
            background-attachment: fixed; color: #f8fafc; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; touch-action: manipulation;
        }
        .glass-panel { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .wood-board { background-color: #5c3a21; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 8px); border: 6px solid #3e2514; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(6, 182, 212, 0.8); }
        
        @keyframes drop-stone { 0% { transform: translateY(-30px) scale(1.3); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        .stone-drop { animation: drop-stone 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes modal-fade-in { from { opacity: 0; transform: scale(0.9) translateY(-30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-animate { animation: modal-fade-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes pulse-border { 0% { border-color: rgba(6, 182, 212, 0.4); } 50% { border-color: rgba(6, 182, 212, 1); box-shadow: 0 0 20px rgba(6, 182, 212, 0.6); } 100% { border-color: rgba(6, 182, 212, 0.4); } }
        .my-turn-anim { animation: pulse-border 2s infinite; }

        .particle { position: absolute; pointer-events: none; border-radius: 50%; animation: explode 0.8s ease-out forwards; z-index: 9999; }
        @keyframes explode { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
    </style>
    
    <!-- Sayfa Çökme Yakalayıcı -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error(msg, lineNo, error);
            if(!document.getElementById('root').innerHTML) {
                document.body.innerHTML = '<div style="color:#ef4444; padding:20px; background:#0f172a; text-align:center; font-family:sans-serif;"><h3>Kritik Hata Oluştu!</h3><p>Lütfen sayfayı yenileyin.</p><p style="font-size:10px; color:#64748b;">Hata: ' + msg + ' (Satır: ' + lineNo + ')</p></div>';
            }
        };
    </script>
</head>
<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyAqeO-yQyQPnLsOqKmSNvVH23WPvneIjaU",
                authDomain: "shaped-totem-481514-c5.firebaseapp.com",
                projectId: "shaped-totem-481514-c5",
                storageBucket: "shaped-totem-481514-c5.firebasestorage.app",
                messagingSenderId: "519295049418",

            };
            const app = initializeApp(firebaseConfig);

            const db = getFirestore(app);
            
            // Tüm yetkileri ve veritabanını React'ın anlayacağı yere koyuyoruz

            window.dispatchEvent(new Event('firebase-modules-ready'));

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const playTone = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if(type === 'move') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if(type === 'win') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                } else if(type === 'error') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.2);
                }
            } catch(e) {}
        };

        const spawnParticles = (e) => {
            const colors = ['#06b6d4', '#f59e0b', '#e11d48', '#10b981', '#ffffff'];
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.width = Math.random() * 8 + 4 + 'px'; p.style.height = p.style.width;
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                const angle = Math.random() * Math.PI * 2; const dist = Math.random() * 60 + 20;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorMsg: error.message }; }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-panel p-8 rounded-3xl max-w-lg text-center border-rose-500 shadow-neon-rose modal-animate">
                            <i className="fa-solid fa-triangle-exclamation text-7xl text-rose-500 mb-6 animate-bounce"></i>
                            <h1 className="text-3xl font-black mb-4">Görsel İşleme Hatası!</h1>
                            <p className="mb-6 text-gray-300 font-mono text-sm bg-black/50 p-4 rounded-xl">{this.state.errorMsg}</p>
                            <button onClick={() => window.location.reload()} className="bg-gradient-to-r from-rose-600 to-rose-800 px-8 py-3 rounded-xl font-bold shadow-lg hover:scale-105">Arenayı Yeniden Başlat</button>
                        </div>
                    </div>
                );
                return this.props.children; 
            }
        }

        const GAMES = [
            { id: 'satranc', name: 'Satranç', icon: 'fa-chess', color: 'neon-rose', rules: "Stratejinin şahı! Sınıf içi eğitici mod aktif: Taşlarınızı satranç kurallarına göre özgürce hareket ettirebilir ve rakip taşları yiyebilirsiniz." },
            { id: 'mangala', name: 'Mangala', icon: 'fa-seedling', color: 'neon-cyan', rules: "Kendi kuyunuzdan taşları alıp saat yönünün tersine dağıtın. Son taş hazinenize gelirse sıra yine sizde olur." },
            { id: 'abluka', name: 'Abluka', icon: 'fa-cubes', color: 'neon-amber', rules: "Rakibi köşeye sıkıştırma sanatı! Önce karakterinizi taşıyın, ardından bir kareye duvar koyun." },
            { id: 'pentagon', name: 'Pentagon', icon: 'fa-dharmachakra', color: 'neon-rose', rules: "Bilye koyun ve tablayı çevirin. 5 bilyeyi yan yana getiren kazanır." },
            { id: 'kure', name: 'Küre', icon: 'fa-globe', color: 'neon-cyan', rules: "Kürelerinizi kullanarak rakibin kürelerini dışarı itmeye çalışın. Serbest modda taş ekleyebilirsiniz." },
            { id: 'kulami', name: 'Kulami', icon: 'fa-border-none', color: 'neon-amber', rules: "Ahşap karolar üzerinde alan kapmaca. Taş yerleştirerek bölgeleri ele geçirin." },
            { id: 'motif', name: 'Motif', icon: 'fa-shapes', color: 'neon-green', rules: "Hedef Motifi kendi panelinizde en hızlı şekilde kopyalayın ve zile basın!" },
            { id: 'equilibrio', name: 'Equilibrio', icon: 'fa-scale-balanced', color: 'neon-purple', rules: "Denge ustası! Blokları seçerek kulenizi devirmeden inşa etmeye çalışın." }
        ];

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [appId] = useState('zeka-arenasi-v16');
            const [view, setView] = useState('home'); 
            const [roomData, setRoomData] = useState({ code: '', role: '', name: '' });

            useEffect(() => {
                const initFb = () => {
                    if(window.FirebaseError) {
                        alert("Firebase Hatası: " + window.FirebaseError);
                        return;
                    }
                    const { auth, db, signInAnonymously, onAuthStateChanged } = window.FirebaseModules;
                    setDb(db);
                    
                    signInAnonymously(auth).catch(e => alert("Sisteme bağlanırken hata oluştu. Github Pages üzerinden açtığınıza emin olun."));
                    
                    onAuthStateChanged(auth, (u) => { 
                        if(u) { setUser(u); setFbReady(true); } 
                    });
                };

                if (window.FirebaseModules || window.FirebaseError) initFb();
                else window.addEventListener('firebase-modules-ready', initFb);
            }, []);

            if (!fbReady || !user || !db) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center text-neon-cyan">
                        <i className="fa-solid fa-brain fa-beat-fade text-7xl mb-6 drop-shadow-[0_0_20px_#06b6d4]"></i>
                        <h2 className="text-2xl font-black tracking-widest uppercase">Arena Kuruluyor...</h2>
                    </div>
                );
            }

            return (
                <div className="min-h-screen w-full font-sans relative flex flex-col">
                    <header className="w-full p-4 flex justify-between items-center z-50 shrink-0 border-b border-white/10 bg-black/40 backdrop-blur-md shadow-lg">
                        <div className="flex items-center gap-3 text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]">
                            <i className="fa-solid fa-cube text-3xl text-neon-cyan"></i>
                            <h1 className="text-2xl font-black tracking-widest uppercase bg-gradient-to-r from-neon-cyan to-white text-transparent bg-clip-text hidden sm:block">Zeka Arenası</h1>
                        </div>
                        {view !== 'home' && (
                            <button onClick={() => { setView('home'); setRoomData({code:'', role:'', name:''}); }} className="text-gray-300 hover:text-white glass-panel px-6 py-2 rounded-xl text-sm font-bold shadow-md transition-all hover:bg-white/10 hover:scale-105 active:scale-95">
                                <i className="fa-solid fa-door-open mr-2"></i> Lobiden Ayrıl
                            </button>
                        )}
                    </header>

                    <main className="flex-1 flex items-center justify-center p-2 sm:p-6 h-full w-full overflow-hidden">
                        {view === 'home' && <Home setView={setView} />}
                        {view === 'teacher' && <TeacherDashboard db={db} appId={appId} user={user} setView={setView} setRoomData={setRoomData} roomData={roomData} />}
                        {view === 'student_login' && <StudentLogin setView={setView} setRoomData={setRoomData} />}
                        {view === 'lobby' && <StudentLobby db={db} appId={appId} user={user} roomData={roomData} setView={setView} setRoomData={setRoomData} />}
                        {view === 'arena' && <Arena db={db} appId={appId} user={user} roomData={roomData} setView={setView} />}
                    </main>
                </div>
            );
        }

        function RulesModal({ game, onClose }) {
            if (!game) return null;
            return (
                <div className="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
                    <div className="glass-panel w-full max-w-md rounded-[2rem] overflow-hidden modal-animate border border-slate-500 shadow-2xl relative">
                        <div className={`h-3 w-full bg-${game.color.replace('neon-','')} shadow-[0_0_20px_currentColor]`}></div>
                        <div className="p-8">
                            <button onClick={onClose} className="absolute top-6 right-6 text-gray-400 hover:text-white bg-white/10 w-8 h-8 rounded-full flex items-center justify-center transition-all hover:bg-white/20"><i className="fa-solid fa-xmark"></i></button>
                            <div className="flex flex-col items-center gap-4 mb-6 text-center">
                                <div className={`w-20 h-20 rounded-2xl flex items-center justify-center bg-black/60 text-${game.color.replace('neon-','')} shadow-[0_0_25px_currentColor] border border-white/10`}>
                                    <i className={`fa-solid ${game.icon} text-4xl`}></i>
                                </div>
                                <h2 className={`text-3xl font-black uppercase tracking-wider text-${game.color.replace('neon-','')}`}>{game.name}</h2>
                            </div>
                            <div className="bg-black/40 p-5 rounded-2xl text-gray-200 leading-relaxed border border-white/5 font-medium text-center shadow-inner">
                                {game.rules}
                            </div>
                            <button onClick={onClose} className={`w-full mt-8 py-4 rounded-xl font-black tracking-widest uppercase bg-${game.color.replace('neon-','')} text-slate-900 shadow-[0_0_20px_currentColor] hover:scale-105 transition-transform active:scale-95`}>
                                Oyuna Dön
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Home({ setView }) {
            return (
                <div className="glass-panel p-8 sm:p-16 rounded-[3rem] w-full max-w-3xl text-center shadow-2xl relative overflow-hidden border border-white/10">
                    <div className="absolute top-[-80px] right-[-80px] text-[15rem] text-white opacity-5 pointer-events-none"><i className="fa-solid fa-chess-knight"></i></div>
                    <div className="absolute bottom-[-80px] left-[-80px] text-[15rem] text-white opacity-5 pointer-events-none"><i className="fa-solid fa-cubes"></i></div>
                    
                    <h1 className="text-4xl sm:text-6xl font-black mb-4 bg-gradient-to-r from-neon-cyan via-white to-neon-amber text-transparent bg-clip-text drop-shadow-2xl">Değişim Zeka Arenası</h1>
                    <p className="text-sm sm:text-xl text-gray-300 mb-10 sm:mb-14 tracking-[0.3em] uppercase font-bold bg-black/30 inline-block px-6 py-2 rounded-full border border-white/10">Sınıf İçi Dijital Ekosistem</p>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 sm:gap-8">
                        <button onClick={() => setView('teacher')} className="group p-8 sm:p-10 rounded-[2rem] bg-gradient-to-br from-indigo-900/90 to-slate-900 border border-indigo-500/50 hover:border-indigo-400 shadow-[0_10px_30px_rgba(0,0,0,0.5)] hover:shadow-[0_0_30px_rgba(99,102,241,0.6)] transition-all">
                            <i className="fa-solid fa-chalkboard-user text-6xl text-indigo-400 mb-6 group-hover:scale-110 group-hover:-translate-y-2 transition-transform drop-shadow-[0_0_15px_rgba(99,102,241,0.8)]"></i>
                            <h2 className="text-2xl font-black text-white mb-2 uppercase tracking-wide">Öğretmen</h2>
                            <p className="text-sm text-indigo-200 font-medium">Sınıf odası kur ve radarı aç.</p>
                        </button>
                        <button onClick={() => setView('student_login')} className="group p-8 sm:p-10 rounded-[2rem] bg-gradient-to-br from-emerald-900/90 to-slate-900 border border-emerald-500/50 hover:border-emerald-400 shadow-[0_10px_30px_rgba(0,0,0,0.5)] hover:shadow-[0_0_30px_rgba(16,185,129,0.6)] transition-all">
                            <i className="fa-solid fa-gamepad text-6xl text-emerald-400 mb-6 group-hover:scale-110 group-hover:-translate-y-2 transition-transform drop-shadow-[0_0_15px_rgba(16,185,129,0.8)]"></i>
                            <h2 className="text-2xl font-black text-white mb-2 uppercase tracking-wide">Öğrenci</h2>
                            <p className="text-sm text-emerald-200 font-medium">PIN ile katıl ve eşleş.</p>
                        </button>
                    </div>
                </div>
            );
        }

        function TeacherDashboard({ db, appId, user, roomData, setRoomData }) {
            const { collection, onSnapshot } = window.FirebaseModules;
            const [players, setPlayers] = useState([]);
            const [matches, setMatches] = useState([]);
            
            useEffect(() => {
                if (!roomData.code) setRoomData({ code: Math.floor(1000 + Math.random() * 9000).toString(), role: 'teacher', name: 'Öğretmen' });
            }, []);

            useEffect(() => {
                if (!user || !roomData.code) return;
                const unsubP = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'zeka_players'), (snap) => setPlayers(snap.docs.map(d=>d.data()).filter(p=>p.roomCode===roomData.code)));
                const unsubM = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'zeka_matches'), (snap) => setMatches(snap.docs.map(d=>({id:d.id, ...d.data()})).filter(m=>m.roomCode===roomData.code)));
                return () => { unsubP(); unsubM(); };
            }, [user, roomData.code]);

            if (!roomData.code) return <div className="text-white text-xl animate-pulse font-bold">Oda Kuruluyor...</div>;
            
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${roomData.code}&color=0f172a&bgcolor=f8fafc`;
            const activeMatches = matches.filter(m => m.status === 'active');

            return (
                <div className="w-full h-full flex flex-col md:flex-row gap-6 p-2 pb-8">
                    <div className="w-full md:w-1/4 lg:w-1/5 flex flex-col gap-6">
                        <div className="glass-panel p-6 rounded-[2rem] text-center shadow-[0_0_30px_rgba(6,182,212,0.2)] border-t-4 border-neon-cyan shrink-0">
                            <h2 className="text-gray-300 text-sm font-bold tracking-[0.2em] uppercase mb-2">Katılım PIN'i</h2>
                            <div className="text-6xl md:text-7xl font-black text-neon-cyan tracking-widest mb-6 drop-shadow-[0_0_15px_rgba(6,182,212,0.8)]">{roomData.code}</div>
                            <div className="bg-white p-3 rounded-2xl inline-block mx-auto shadow-xl"><img src={qrUrl} alt="QR Code" className="w-32 h-32 md:w-40 md:h-40 object-contain" /></div>
                        </div>
                        <div className="glass-panel p-6 rounded-[2rem] flex-1 flex flex-col overflow-hidden border border-white/10 min-h-[250px] shadow-lg">
                            <h3 className="text-lg font-black mb-4 flex items-center text-neon-amber shrink-0 uppercase tracking-wide border-b border-white/10 pb-3"><i className="fa-solid fa-users mr-3"></i> Lobi ({players.length})</h3>
                            <ul className="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-2">
                                {players.length === 0 && <div className="text-center mt-10"><i className="fa-solid fa-satellite-dish fa-spin text-3xl text-gray-500 mb-2"></i><p className="text-gray-500 text-xs font-bold uppercase">Öğrenci Bekleniyor</p></div>}
                                {players.map((p, i) => (
                                    <li key={i} className="flex justify-between items-center bg-black/40 border border-white/5 p-3 rounded-xl text-sm shadow-inner">
                                        <span className="font-bold text-white truncate max-w-[60%] flex items-center"><i className="fa-solid fa-user text-gray-500 mr-2 text-xs"></i>{p.name}</span>
                                        <span className={`text-[10px] font-black uppercase tracking-wider px-3 py-1.5 rounded-full ${p.status === 'playing' ? 'bg-rose-500/20 text-rose-400 border border-rose-500/50' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50'}`}>{p.status === 'playing' ? 'Oyunda' : 'Hazır'}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    <div className="w-full md:w-3/4 lg:w-4/5 glass-panel p-6 sm:p-8 rounded-[2rem] border-t-4 border-neon-rose shadow-[0_0_30px_rgba(225,29,72,0.15)] flex flex-col h-full">
                        <div className="flex justify-between items-center mb-6 shrink-0 border-b border-white/10 pb-4">
                            <h2 className="text-2xl sm:text-3xl font-black flex items-center text-white tracking-wide"><i className="fa-solid fa-satellite-dish animate-pulse mr-4 text-neon-rose drop-shadow-[0_0_10px_rose]"></i> CANLI MAÇ RADARI</h2>
                            <div className="bg-rose-900/80 text-rose-200 px-5 py-2 rounded-full text-sm font-black tracking-widest border border-rose-500 shadow-[0_0_15px_rgba(225,29,72,0.4)]">{activeMatches.length} AKTİF</div>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                            {activeMatches.length === 0 ? (
                                <div className="h-full w-full flex flex-col items-center justify-center text-gray-500 border-4 border-dashed border-gray-700/50 rounded-3xl p-10 bg-black/20">

        function StudentLobby({ db, appId, user, roomData, setView, setRoomData }) {
            const { collection, setDoc, doc, onSnapshot, updateDoc, deleteDoc } = window.FirebaseModules;
            const [players, setPlayers] = useState([]); const [matches, setMatches] = useState([]);
            const [selectedGame, setSelectedGame] = useState('satranc');
            const [rulesModalGame, setRulesModalGame] = useState(null);

            const botPlayers = [{ id: 'bot_1', name: 'Zeka Botu', status: 'idle', isBot: true, roomCode: roomData.code }];

            useEffect(() => {
                if (!user) return;

            }, [user]);

            useEffect(() => {
                if (!user) return;
                const unsubP = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'zeka_players'), snap => {
                    const realPlayers = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(p=>p.roomCode===roomData.code && p.id!==user.uid);
                    setPlayers([...realPlayers, ...botPlayers]);

                const unsubM = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'zeka_matches'), snap => {

                    setMatches(allM);
                    const myMatch = allM.find(m => (m.p1Id === user.uid || m.p2Id === user.uid) && m.status === 'active');
                    if (myMatch) {

                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_players', user.uid), { status: 'playing' });
                        setView('arena');

            const handleChallenge = async (opponent) => {

                else if (selectedGame === 'pentagon') initialState = { b: Array(36).fill(0), quads: [0,0,0,0] }; 
                else if (selectedGame === 'kure') initialState = { b: Array(49).fill(0) };

                else if (selectedGame === 'motif') initialState = { p1: Array(9).fill(0), p2: Array(9).fill(0), target: Array.from({length:9}, ()=>Math.floor(Math.random()*4)+1) };
                else if (selectedGame === 'equilibrio') initialState = { b: [] }; 

                const matchId = `match_${Date.now()}_${user.uid.slice(0,5)}`;
                const status = opponent.isBot ? 'active' : 'pending';
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', matchId), { roomCode: roomData.code, game: selectedGame, p1Id: user.uid, p1Name: roomData.name, p2Id: opponent.id, p2Name: opponent.name, status: status, turn: user.uid, gameState: initialState, timestamp: Date.now() });
            };

            const incoming = matches.filter(m => m.p2Id === user.uid && m.status === 'pending');
            const outgoing = matches.filter(m => m.p1Id === user.uid && m.status === 'pending');

            return (
                <div className="w-full h-full max-w-7xl flex flex-col md:flex-row gap-6 p-2">

                            {GAMES.map(g => (
                                <div key={g.id} onClick={() => setSelectedGame(g.id)} className={`w-full flex items-center p-3 sm:p-4 rounded-2xl border-2 transition-all cursor-pointer ${selectedGame === g.id ? `bg-slate-800/90 border-${g.color.replace('neon-','')} shadow-[0_0_20px_currentColor] scale-[1.02]` : 'bg-black/30 border-transparent hover:bg-white/10'}`}>
                                    <div className={`w-12 h-12 rounded-full flex items-center justify-center bg-black/60 text-${g.color.replace('neon-','')} shrink-0 shadow-inner border border-white/5`}><i className={`fa-solid ${g.icon} text-xl`}></i></div>
                                    <div className="ml-4 text-left flex-1 min-w-0"><div className="font-black text-white text-base truncate tracking-wide">{g.name}</div></div>
                                    <button onClick={(e) => { e.stopPropagation(); setRulesModalGame(g); }} className="p-2 w-10 h-10 rounded-full text-gray-400 hover:text-white hover:bg-white/10 transition-colors" title="Kuralları Oku"><i className="fa-solid fa-circle-info text-xl"></i></button>
                                </div>

                        </div>
                    </div>

                    <div className="w-full md:w-2/3 flex flex-col gap-6 h-[45vh] md:h-full">
                        {incoming.length > 0 && (
                            <div className="bg-gradient-to-r from-rose-900 to-slate-900 p-5 rounded-[2rem] border-2 border-rose-500 shadow-[0_0_30px_rgba(225,29,72,0.4)] flex flex-col sm:flex-row items-center justify-between gap-4 animate-pulse shrink-0">
                                <div className="text-center sm:text-left flex items-center gap-4"><div className="w-14 h-14 bg-rose-600 rounded-full flex items-center justify-center text-white text-2xl shadow-inner border-2 border-white/20"><i className="fa-solid fa-khanda"></i></div><div><h3 className="font-black text-white text-lg tracking-widest uppercase">Meydan Okuma!</h3><p className="text-sm text-gray-200 mt-1"><strong className="text-rose-400 text-base">{incoming[0].p1Name}</strong> seni maça çağırıyor!</p></div></div>
                                <div className="flex gap-3 w-full sm:w-auto mt-2 sm:mt-0"><button onClick={() => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', incoming[0].id), { status: 'active' })} className="flex-1 sm:flex-none bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl text-white font-black text-sm shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all hover:scale-105"><i className="fa-solid fa-check mr-2"></i> KABUL</button><button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', incoming[0].id))} className="flex-1 sm:flex-none bg-rose-600 hover:bg-rose-500 px-6 py-3 rounded-xl text-white font-black text-sm shadow-[0_0_15px_rgba(225,29,72,0.5)] transition-all hover:scale-105"><i className="fa-solid fa-xmark mr-2"></i> RET</button></div>
                            </div>
                        )}
                        {outgoing.length > 0 && <div className="bg-slate-800/90 p-5 rounded-[2rem] border-2 border-amber-500 text-amber-400 text-base font-bold text-center shrink-0 shadow-[0_0_20px_rgba(245,158,11,0.2)]"><i className="fa-solid fa-hourglass-half fa-spin mr-3 text-xl"></i> <span className="text-white">{outgoing[0].p2Name}</span> kişisinden yanıt bekleniyor...</div>}

                        <div className="glass-panel p-6 sm:p-8 rounded-[2rem] flex-1 flex flex-col min-h-[250px] border border-white/10 shadow-2xl">
                            <h2 className="text-xl sm:text-2xl font-black mb-6 text-white border-b border-white/10 pb-4 tracking-wider"><span className="text-neon-amber mr-2">2.</span> RAKİP SEÇ</h2>
                            <div className="flex-1 overflow-y-auto pr-2 grid grid-cols-1 sm:grid-cols-2 gap-4 content-start custom-scrollbar">
                                {players.length === 0 ? (
                                    <div className="col-span-full flex flex-col items-center justify-center text-gray-500 py-12 bg-black/20 rounded-3xl border-2 border-dashed border-gray-700 h-full"><i className="fa-solid fa-satellite-dish fa-spin text-5xl mb-4 opacity-50"></i><p className="text-lg font-bold tracking-widest uppercase">Odada kimse yok</p><p className="text-sm mt-2">Arkadaşlarının girmesi bekleniyor...</p></div>
                                ) : (
                                    players.map(p => (
                                        <div key={p.id} className="bg-slate-800/80 p-4 rounded-2xl border border-slate-600 flex justify-between items-center group hover:bg-slate-700 hover:border-slate-500 transition-all shadow-md">
                                            <div className="flex items-center gap-4 overflow-hidden">
                                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 border shadow-inner ${p.isBot ? 'bg-indigo-900 text-indigo-400 border-indigo-500/50' : 'bg-slate-900 text-gray-400 border-slate-700'}`}><i className={`fa-solid ${p.isBot ? 'fa-robot' : 'fa-user'} text-xl`}></i></div>
                                                <div className="min-w-0"><div className="font-black text-white text-base truncate tracking-wide">{p.name}</div><div className={`text-xs font-bold uppercase tracking-widest mt-1 ${p.status === 'playing' ? 'text-rose-500' : 'text-emerald-500'}`}>{p.isBot ? 'ANTRENMAN' : (p.status === 'playing' ? 'OYUNDA' : 'MÜSAİT')}</div></div>
                                            </div>
                                            <button onClick={() => handleChallenge(p)} disabled={p.status === 'playing' || outgoing.length > 0} className="bg-gradient-to-br from-indigo-500 to-indigo-700 hover:from-indigo-400 hover:to-indigo-600 disabled:opacity-20 disabled:grayscale text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(99,102,241,0.5)] shrink-0 active:scale-90 transition-all"><i className="fa-solid fa-swords text-lg"></i></button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Arena({ db, appId, user, roomData, setView }) {
            const { doc, onSnapshot, updateDoc, deleteDoc } = window.FirebaseModules;
            const [matchData, setMatchData] = useState(null);
            const [showRules, setShowRules] = useState(false);

            useEffect(() => {
                if (!user || !roomData.matchId) return;
                const matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', roomData.matchId);
                const unsub = onSnapshot(matchRef, (docSnap) => {
                    if (docSnap.exists()) setMatchData({ id: docSnap.id, ...docSnap.data() });
                    else leaveArena();
                });
                return () => unsub();
            }, [user, roomData.matchId]);

            const leaveArena = async () => { if (user) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_players', user.uid), { status: 'idle' }).catch(()=>{}); setView('lobby'); };
            const handleSurrender = async () => { if (confirm("Pes etmek istediğine emin misin?")) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', roomData.matchId)); } };
            const updateGameState = async (newState, nextTurn) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', roomData.matchId), { gameState: newState, turn: nextTurn }); };

            if (!matchData) return <div className="text-neon-cyan text-3xl font-black animate-pulse tracking-widest"><i className="fa-solid fa-meteor mr-4"></i>ARENA YÜKLENİYOR...</div>;

            const amIP1 = matchData.p1Id === user.uid;
            const isOpponentBot = amIP1 ? matchData.p2Id.startsWith('bot_') : matchData.p1Id.startsWith('bot_');
            const myTurn = isOpponentBot ? true : matchData.turn === user.uid; 
            const opponentName = amIP1 ? matchData.p2Name : matchData.p1Name;
            const gameInfo = GAMES.find(g => g.id === matchData.game);

            return (
                <div className="w-full max-w-6xl h-full flex flex-col p-2 sm:p-4">
                    {showRules && <RulesModal game={gameInfo} onClose={() => setShowRules(false)} />}
                    <div className="glass-panel px-6 py-4 rounded-[2rem] border-b-4 border-slate-700 flex justify-between items-center bg-black/60 shrink-0 shadow-2xl mb-4 z-10 relative">
                        <div className="flex items-center gap-4">
                            <div className={`w-14 h-14 rounded-xl flex items-center justify-center bg-slate-900 border border-white/10 shadow-[0_0_15px_currentColor] text-${gameInfo.color.replace('neon-','')}`}><i className={`fa-solid ${gameInfo.icon} text-3xl`}></i></div>
                            <span className="text-2xl sm:text-3xl font-black uppercase tracking-widest text-white drop-shadow-md hidden sm:block">{gameInfo.name}</span>
                            <button onClick={() => setShowRules(true)} className="ml-2 w-10 h-10 rounded-full bg-white/10 text-gray-300 hover:text-white hover:bg-white/20 transition-all flex items-center justify-center shadow-inner" title="Kuralları Göster"><i className="fa-solid fa-circle-info text-xl"></i></button>
                        </div>
                        <div className="flex items-center gap-4 sm:gap-6">
                            <div className={`px-6 py-3 rounded-xl font-black text-sm tracking-widest transition-all ${myTurn ? 'bg-emerald-500/20 text-emerald-400 border-2 border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.5)] my-turn-anim' : 'bg-slate-900 text-gray-500 border-2 border-slate-700'}`}>
                                {isOpponentBot ? 'EĞİTİCİ SERBEST MOD' : (myTurn ? 'SIRA SENDE' : 'RAKİBİ BEKLE')}
                            </div>
                            <button onClick={handleSurrender} className="text-rose-500 hover:text-white bg-rose-500/10 hover:bg-rose-600 text-sm font-bold border-2 border-rose-500/50 px-5 py-3 rounded-xl transition-all shadow-md">ÇEKİL</button>
                        </div>
                    </div>

                    <div className="flex-1 glass-panel rounded-[3rem] relative flex flex-col items-center justify-center p-4 sm:p-8 overflow-y-auto overflow-x-hidden bg-gradient-to-b from-slate-900/50 to-black/80 shadow-2xl custom-scrollbar border border-white/5">
                        {matchData.winner && (
                            <div className="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center backdrop-blur-md p-6 text-center rounded-[3rem]">
                                <i className="fa-solid fa-trophy text-8xl text-yellow-400 mb-8 drop-shadow-[0_0_30px_#facc15] animate-bounce"></i>
                                <h2 className="text-5xl sm:text-7xl font-black text-white drop-shadow-[0_0_20px_#ffffff] mb-4 tracking-widest uppercase">OYUN BİTTİ</h2>
                                <p className="text-2xl sm:text-3xl text-gray-300 mb-10 font-bold">Kazanan: <span className="text-yellow-400">{matchData.winner === user.uid ? 'SENSİN!' : opponentName}</span></p>
                                <button onClick={handleSurrender} className="bg-gradient-to-r from-yellow-500 to-amber-600 text-slate-900 px-12 py-5 rounded-full font-black text-xl hover:scale-105 active:scale-95 transition-all shadow-[0_0_30px_rgba(245,158,11,0.6)]">LOBİYE DÖN <i className="fa-solid fa-arrow-right ml-2"></i></button>
                            </div>
                        )}
                        
                        {/* Oyun Bileşenleri İçin Boşluk - Bölüm 2'de gelecek */}
                        

{matchData.game === 'satranc' && <BoardSatranc s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} isBot={isOpponentBot} />}
                        {matchData.game === 'mangala' && <BoardMangala s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} isBot={isOpponentBot} />}
                        {matchData.game === 'abluka' && <BoardAbluka s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'pentagon' && <BoardPentagon s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'kure' && <BoardKure s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'kulami' && <BoardKulami s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'motif' && <BoardMotif s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'equilibrio' && <BoardEquilibrio s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                    </div>
                </div>
            );
        }

        const trnNext = (p1, t1, t2) => p1 ? t2 : t1;

        function BoardSatranc({ s, up, p1, trn, t1, t2, isBot }) {
            const icons = {
                'r': 'fa-chess-rook text-slate-900', 'n': 'fa-chess-knight text-slate-900', 'b': 'fa-chess-bishop text-slate-900', 'q': 'fa-chess-queen text-slate-900', 'k': 'fa-chess-king text-slate-900', 'p': 'fa-chess-pawn text-slate-900',
                'R': 'fa-chess-rook text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]', 'N': 'fa-chess-knight text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]', 'B': 'fa-chess-bishop text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]', 'Q': 'fa-chess-queen text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]', 'K': 'fa-chess-king text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]', 'P': 'fa-chess-pawn text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]'
            };
            const handleSquare = (r, c, e) => {
                if (!trn) return;
                const piece = s.board[r][c];
                const isMyPiece = isBot ? !!piece : (piece && (p1 ? piece === piece.toUpperCase() : piece === piece.toLowerCase()));
                
                if (s.sel) {
                    const [sr, sc] = s.sel;
                    if (sr === r && sc === c) { playTone('error'); up({ ...s, sel: null }, trn ? (p1 ? t1 : t2) : null); return; }
                    if (isMyPiece && !isBot) { playTone('move'); up({ ...s, sel: [r, c] }, trn ? (p1 ? t1 : t2) : null); return; }
                    
                    let nb = s.board.map(row => [...row]);
                    if(nb[r][c]) { spawnParticles(e); playTone('win'); } else { playTone('move'); }
                    nb[r][c] = nb[sr][sc];
                    nb[sr][sc] = null;
                    up({ board: nb, sel: null }, isBot ? t1 : trnNext(p1, t1, t2));
                } else {
                    if (isMyPiece) { playTone('move'); up({ ...s, sel: [r, c] }, trn ? (p1 ? t1 : t2) : null); }
                }
            };
            const displayBoard = (p1 || isBot) ? s.board : [...s.board].reverse().map(row => [...row].reverse());
            return (
                <div className="wood-board p-3 sm:p-6 rounded-[2rem] shadow-[0_30px_60px_rgba(0,0,0,0.8)] min-w-max scale-90 sm:scale-100 bg-wood-800 relative">
                    <div className="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent pointer-events-none rounded-[2rem]"></div>
                    <div className="grid grid-cols-8 border-4 border-black/60 shadow-wood-inset rounded-lg overflow-hidden">
                        {displayBoard.map((row, rIdx) => row.map((cell, cIdx) => {
                            const realR = (p1 || isBot) ? rIdx : 7 - rIdx;
                            const realC = (p1 || isBot) ? cIdx : 7 - cIdx;
                            const hl = s.sel && s.sel[0] === realR && s.sel[1] === realC;
                            return (
                                <div key={`${realR}-${realC}`} onClick={(e) => handleSquare(realR, realC, e)} className={`w-10 h-10 sm:w-16 sm:h-16 md:w-20 md:h-20 flex items-center justify-center text-3xl sm:text-5xl cursor-pointer ${(realR + realC) % 2 === 0 ? 'bg-[#f0d9b5]' : 'bg-[#b58863]'} ${hl ? 'ring-inset ring-4 ring-rose-500 bg-rose-500/50 shadow-[inset_0_0_20px_rgba(225,29,72,0.8)] z-10' : 'hover:brightness-110'} transition-all`}>
                                    {cell && <i className={`fa-solid ${icons[cell]} ${hl ? 'animate-bounce drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)]' : 'stone-drop drop-shadow-md'}`}></i>}
                                </div>
                            );
                        }))}
                    </div>
                </div>
            );
        }

        function BoardMangala({ s, up, p1, trn, t1, t2, isBot }) {
            const sow = (i, e) => {
                if (!trn || s.board[i] === 0) return;
                if (!isBot) { if (p1 && (i < 0 || i > 5)) return; if (!p1 && (i < 7 || i > 12)) return; }
                playTone('move');
                let nb = [...s.board]; let st = nb[i]; nb[i] = 0; let curr = i;
                if (st > 1) { nb[curr] = 1; st--; }
                while (st > 0) {
                    curr = (curr + 1) % 14;
                    const mySide = isBot ? (i <= 5) : p1;
                    if ((mySide && curr === 13) || (!mySide && curr === 6)) continue;
                    nb[curr]++; st--;
                    if(st===0 && ((mySide && curr===6) || (!mySide && curr===13))) { spawnParticles(e); playTone('win'); }
                }
                up({ board: nb }, isBot ? t1 : trnNext(p1, t1, t2));
            };
            const pit = (i, isT = false) => (
                <div onClick={(e) => sow(i, e)} className={`relative flex flex-wrap justify-center items-center gap-1 bg-wood-900 shadow-wood-inset border-4 cursor-pointer ${isT ? 'w-20 h-48 sm:w-28 sm:h-72 rounded-[40px]' : 'w-14 h-14 sm:w-24 sm:h-24 rounded-full'} border-[#2a170b] hover:border-cyan-400 transition-all hover:shadow-[0_0_20px_rgba(6,182,212,0.5)]`}>
                    <div className="absolute -top-3 -right-3 bg-black/90 text-white text-xs sm:text-sm font-black w-8 h-8 rounded-full flex items-center justify-center border-2 border-gray-600 z-20 shadow-lg">{s.board[i]}</div>
                    {Array.from({ length: Math.min(s.board[i], 12) }).map((_, idx) => <div key={idx} className="w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-gradient-to-br from-gray-100 to-gray-500 shadow-md stone-drop border border-black/20"></div>)}
                </div>
            );
            const top = p1 ? [12, 11, 10, 9, 8, 7] : [5, 4, 3, 2, 1, 0];
            const bot = p1 ? [0, 1, 2, 3, 4, 5] : [7, 8, 9, 10, 11, 12];
            return (
                <div className="wood-board p-6 sm:p-12 rounded-[5rem] flex items-center gap-6 sm:gap-12 shadow-[0_30px_60px_rgba(0,0,0,0.8)] min-w-max scale-90 sm:scale-100 relative">
                    <div className="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent pointer-events-none rounded-[5rem]"></div>
                    {pit(p1 ? 13 : 6, true)}
                    <div className="flex flex-col gap-8 sm:gap-14 relative z-10">
                        <div className="flex gap-4 sm:gap-6">{top.map(i => <div key={i}>{pit(i)}</div>)}</div>
                        <div className="h-2 bg-black/40 rounded-full w-full shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)] border-b border-white/5"></div>
                        <div className="flex gap-4 sm:gap-6">{bot.map(i => <div key={i}>{pit(i)}</div>)}</div>
                    </div>
                    {pit(p1 ? 6 : 13, true)}
                </div>
            );
        }

        function BoardAbluka({ s, up, p1, trn, t1, t2 }) {
            const clk = (i, e) => {
                if (!trn || s.grid[i] === 'block' || i === s.p1Pos || i === s.p2Pos) { if(trn) playTone('error'); return; }
                const pos = p1 ? s.p1Pos : s.p2Pos;
                const isAdj = Math.abs(Math.floor(pos / 5) - Math.floor(i / 5)) <= 1 && Math.abs((pos % 5) - (i % 5)) <= 1;
                
                if (s.phase === 'move' && isAdj) { playTone('move'); up({ ...s, [p1 ? 'p1Pos' : 'p2Pos']: i, phase: 'wall' }, p1 ? t1 : t2); }
                else if (s.phase === 'wall') { playTone('thud'); spawnParticles(e); let ng = [...s.grid]; ng[i] = 'block'; up({ ...s, grid: ng, phase: 'move' }, trnNext(p1, t1, t2)); }
                else { playTone('error'); }
            };
            return (
                <div className="flex flex-col items-center gap-8 w-full max-w-lg">
                    <div className={`text-center px-8 py-3 rounded-full border-4 font-black tracking-widest text-lg sm:text-xl shadow-2xl transition-all ${trn ? 'border-neon-amber text-neon-amber bg-black/60 shadow-[0_0_20px_rgba(245,158,11,0.4)] my-turn-anim' : 'border-slate-700 text-slate-600 bg-slate-900/50'}`}>
                        {trn ? (s.phase === 'move' ? '1. ADIM: KARAKTERİ TAŞI' : '2. ADIM: DUVAR ÖR (ABLUKA)') : 'RAKİBİN HAMLESİ BEKLENİYOR...'}
                    </div>
                    <div className="grid grid-cols-5 gap-2 sm:gap-3 p-4 sm:p-6 bg-slate-900 border-8 border-slate-800 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.8)] w-full">
                        {s.grid.map((c, i) => (
                            <div key={i} onClick={(e) => clk(i, e)} className={`aspect-square flex justify-center items-center text-4xl sm:text-6xl cursor-pointer rounded-2xl border-2 transition-all ${c === 'block' ? 'bg-amber-600/30 border-amber-500/50 shadow-[inset_0_0_20px_rgba(245,158,11,0.4)]' : 'bg-slate-800/80 border-slate-700 hover:bg-slate-700 hover:border-white/30'}`}>
                                {i === s.p1Pos && <i className="fa-solid fa-user-ninja text-neon-cyan drop-shadow-[0_0_15px_cyan] animate-bounce"></i>}
                                {i === s.p2Pos && <i className="fa-solid fa-user-astronaut text-neon-rose drop-shadow-[0_0_15px_rose] animate-bounce"></i>}
                                {c === 'block' && <div className="w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-30 rounded-xl"></div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function BoardPentagon({ s, up, p1, trn, t1, t2 }) {
            const place = (i, e) => { if (!trn || s.b[i] !== 0) { if(trn)playTone('error'); return; } playTone('move'); spawnParticles(e); let nb = [...s.b]; nb[i] = p1 ? 1 : 2; up({ ...s, b: nb }, p1 ? t1 : t2); };
            const rot = (q) => { if (!trn) return; playTone('thud'); let nq = [...s.quads]; nq[q] = (nq[q] + 90) % 360; up({ ...s, quads: nq }, trnNext(p1, t1, t2)); };
            const qs = [[0, 1, 2, 6, 7, 8, 12, 13, 14], [3, 4, 5, 9, 10, 11, 15, 16, 17], [18, 19, 20, 24, 25, 26, 30, 31, 32], [21, 22, 23, 27, 28, 29, 33, 34, 35]];
            return (
                <div className="bg-rose-950 p-6 rounded-[3rem] border-8 border-rose-900 grid grid-cols-2 gap-4 shadow-[0_0_40px_rgba(225,29,72,0.4)] scale-90 sm:scale-100">
                    {[0, 1, 2, 3].map(q => (
                        <div key={q} className="relative p-3 bg-black/50 rounded-3xl border border-rose-900/50 shadow-inner">
                            <div className="grid grid-cols-3 gap-2 transition-transform duration-700 ease-out" style={{ transform: `rotate(${s.quads[q]}deg)` }}>
                                {qs[q].map(c => (
                                    <div key={c} onClick={(e) => place(c, e)} className="w-12 h-12 sm:w-20 sm:h-20 bg-rose-900 rounded-full border-2 border-rose-800/50 flex items-center justify-center cursor-pointer hover:bg-rose-800 shadow-[inset_0_4px_8px_rgba(0,0,0,0.6)] transition-colors">
                                        {s.b[c] !== 0 && <div className={`w-10 h-10 sm:w-16 sm:h-16 rounded-full shadow-lg stone-drop ${s.b[c] === 1 ? 'bg-gradient-to-br from-cyan-400 to-cyan-600 shadow-[0_0_20px_#06b6d4]' : 'bg-gradient-to-br from-amber-400 to-amber-600 shadow-[0_0_20px_#f59e0b]'}`}></div>}
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => rot(q)} className="absolute -bottom-3 -right-3 bg-white text-rose-900 rounded-full w-12 h-12 flex items-center justify-center shadow-xl active:rotate-90 transition-transform z-10 border-4 border-rose-950 hover:bg-gray-200"><i className="fa-solid fa-rotate-right text-xl"></i></button>
                        </div>
                    ))}
                </div>
            );
        }

        function BoardKure({ s, up, p1, trn, t1, t2 }) {
            const clk = (i, e) => { if (!trn) return; playTone('move'); spawnParticles(e); let nb = [...s.b]; nb[i] = nb[i] === (p1 ? 1 : 2) ? 0 : (p1 ? 1 : 2); up({ ...s, b: nb }, trnNext(p1, t1, t2)); };
            return (
                <div className="bg-slate-800 p-6 sm:p-12 rounded-full border-[12px] border-slate-900 shadow-[0_0_50px_rgba(6,182,212,0.3)] scale-90 sm:scale-100">
                    <div className="grid grid-cols-7 gap-3 sm:gap-4">
                        {s.b.map((c, i) => (
                            <div key={i} onClick={(e) => clk(i, e)} className="w-12 h-12 sm:w-16 sm:h-16 bg-slate-700/80 rounded-full shadow-[inset_0_6px_12px_rgba(0,0,0,0.8)] flex items-center justify-center cursor-pointer hover:bg-slate-600 transition-colors border border-slate-600/50">
                                {c !== 0 && <div className={`w-10 h-10 sm:w-14 sm:h-14 rounded-full shadow-2xl stone-drop bg-gradient-to-br ${c === 1 ? 'from-cyan-300 to-cyan-600 shadow-[0_0_20px_#06b6d4]' : 'from-rose-400 to-rose-700 shadow-[0_0_20px_#e11d48]'}`}></div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function BoardKulami({ s, up, p1, trn, t1, t2 }) {
            const clk = (i, e) => { if (!trn || s.b[i] !== 0) { if(trn)playTone('error'); return; } playTone('move'); spawnParticles(e); let nb = [...s.b]; nb[i] = p1 ? 1 : 2; up({ ...s, b: nb }, trnNext(p1, t1, t2)); };
            return (
                <div className="wood-board p-4 sm:p-8 rounded-[2rem] shadow-[0_30px_60px_rgba(0,0,0,0.8)] bg-wood-800 border-8 border-wood-900 scale-90 sm:scale-100 relative">
                    <div className="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none rounded-[2rem]"></div>
                    <div className="grid grid-cols-8 gap-2 bg-black/60 p-3 rounded-xl border border-black/50 shadow-inner">
                        {s.b.map((c, i) => (
                            <div key={i} onClick={(e) => clk(i, e)} className="w-10 h-10 sm:w-16 sm:h-16 bg-wood-800 border-b-4 border-r-4 border-wood-900 flex items-center justify-center cursor-pointer hover:brightness-125 transition-all active:border-0 active:translate-y-1 active:translate-x-1 rounded-lg">
                                {c !== 0 && <div className={`w-8 h-8 sm:w-12 sm:h-12 rounded-full shadow-[0_5px_10px_rgba(0,0,0,0.6)] stone-drop border-2 border-white/10 ${c === 1 ? 'bg-gradient-to-br from-rose-500 to-rose-700' : 'bg-gradient-to-br from-slate-700 to-slate-900'}`}></div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function BoardMotif({ s, up, p1, trn, t1, t2 }) {
            const colors = ['bg-slate-800', 'bg-rose-500 shadow-[inset_0_0_20px_rgba(0,0,0,0.4)]', 'bg-cyan-500 shadow-[inset_0_0_20px_rgba(0,0,0,0.4)]', 'bg-emerald-500 shadow-[inset_0_0_20px_rgba(0,0,0,0.4)]', 'bg-amber-400 shadow-[inset_0_0_20px_rgba(0,0,0,0.4)]'];
            const clk = (i) => { if (!trn) return; playTone('move'); let key = p1 ? 'p1' : 'p2'; let ng = [...s[key]]; ng[i] = (ng[i] + 1) % 5; up({ ...s, [key]: ng }, p1 ? t1 : t2); };
            const finish = (e) => { playTone('win'); spawnParticles(e); up(s, trnNext(p1, t1, t2)); };
            const Grid = ({ arr, canClick }) => (
                <div className="grid grid-cols-3 gap-3 p-4 bg-black/50 rounded-[2rem] border-2 border-white/10 shadow-2xl">
                    {arr.map((c, i) => <div key={i} onClick={() => canClick && clk(i)} className={`w-16 h-16 sm:w-24 sm:h-24 ${colors[c]} rounded-2xl cursor-pointer border border-white/20 transition-transform active:scale-90 shadow-lg`}></div>)}
                </div>
            );
            return (
                <div className="flex flex-col items-center gap-10 w-full overflow-y-auto pb-10">
                    <div className="text-center bg-black/30 p-6 rounded-[3rem] border border-green-500/20 shadow-[0_0_30px_rgba(16,185,129,0.15)]"><h3 className="text-neon-green font-black mb-6 text-2xl tracking-[0.3em] uppercase drop-shadow-[0_0_10px_green]">HEDEF MOTİF</h3><Grid arr={s.target} canClick={false} /></div>
                    <div className="w-full flex flex-col sm:flex-row justify-center items-end gap-10 px-4">
                        <div className={`text-center w-full max-w-sm transition-opacity ${p1 ? 'opacity-100 scale-105' : 'opacity-50 blur-[2px]'}`}><p className="text-sm text-cyan-400 mb-4 font-black uppercase tracking-widest bg-cyan-900/40 inline-block px-4 py-1 rounded-full border border-cyan-500/30">SİZİN PANELİNİZ</p><Grid arr={p1 ? s.p1 : s.p2} canClick={true} /></div>
                        <div className={`text-center w-full max-w-sm hidden sm:block transition-opacity ${!p1 ? 'opacity-100' : 'opacity-50 blur-[2px]'}`}><p className="text-sm text-rose-400 mb-4 font-black uppercase tracking-widest bg-rose-900/40 inline-block px-4 py-1 rounded-full border border-rose-500/30">RAKİP</p><Grid arr={!p1 ? s.p1 : s.p2} canClick={false} /></div>
                    </div>
                    <button onClick={finish} className="bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-400 hover:to-green-500 px-16 py-6 rounded-full text-white font-black text-2xl shadow-[0_0_30px_rgba(16,185,129,0.6)] transition-all hover:scale-110 active:scale-95 border-2 border-white/20 tracking-widest mt-4">ZİLE BAS 🔔</button>
                </div>
            );
        }

        function BoardEquilibrio({ s, up, p1, trn, t1, t2 }) {
            const shps = ['w-16 h-16 bg-gradient-to-br from-cyan-400 to-cyan-600 rounded-lg shadow-[0_0_15px_cyan] border border-white/30', 'w-0 h-0 border-l-[32px] border-r-[32px] border-b-[64px] border-b-rose-500 drop-shadow-[0_0_15px_rose]', 'w-16 h-16 rounded-full bg-gradient-to-br from-amber-400 to-amber-600 shadow-[0_0_15px_amber] border border-white/30'];
            const add = (t, e) => { if (!trn) return; playTone('move'); spawnParticles(e); up({ ...s, b: [...s.b, { t, x: Math.random() * 140 - 70, y: Math.random() * -80, r: Math.random() * 90 - 45 }] }, trnNext(p1, t1, t2)); };
            return (
                <div className="flex flex-col items-center w-full max-w-3xl">
                    <div className="w-full h-[500px] border-b-[20px] border-slate-700 relative bg-slate-900/80 rounded-t-[50px] overflow-hidden flex flex-col-reverse items-center pb-2 border-x-4 border-t-4 border-white/10 shadow-[inset_0_20px_50px_rgba(0,0,0,0.8)]">
                        {s.b.map((bl, i) => <div key={i} className={`absolute transition-all duration-1000 cubic-bezier(0.68, -0.55, 0.265, 1.55) ${shps[bl.t]}`} style={{ transform: `translate(${bl.x}px, ${bl.y}px) rotate(${bl.r}deg)`, bottom: `${i * 60 + 20}px` }}></div>)}
                        {s.b.length === 0 && <div className="text-gray-500 text-3xl font-black mb-40 animate-pulse tracking-widest uppercase">KULEYİ BAŞLATIN</div>}
                    </div>
                    <div className="flex gap-8 mt-10 p-6 glass-panel rounded-[40px] border border-white/20 shadow-[0_20px_50px_rgba(0,0,0,0.5)] bg-white/5">
                        {shps.map((_, i) => <button key={i} onClick={(e) => add(i, e)} className={`w-16 h-16 border-2 border-white/30 rounded-2xl shadow-2xl transition-all hover:scale-110 active:rotate-12 ${i === 0 ? 'bg-cyan-500' : (i === 1 ? 'bg-rose-500' : 'bg-amber-500')}`}></button>)}
                    </div>
                    <button onClick={() => { playTone('thud'); up({ ...s, b: [] }, p1 ? t1 : t2); }} className="mt-10 text-rose-400 text-sm font-black border-2 border-rose-500/30 px-12 py-4 rounded-full uppercase tracking-widest bg-rose-500/10 hover:bg-rose-500/30 transition-all hover:shadow-[0_0_20px_rgba(225,29,72,0.4)]">TAHTAYI SIFIRLA</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
