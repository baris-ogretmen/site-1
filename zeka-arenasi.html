<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akıl ve Zeka Oyunları Çok Oyunculu Arenası</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wood: { 800: '#5c3a21', 900: '#3e2514' },
                        neon: { cyan: '#06b6d4', amber: '#f59e0b', rose: '#e11d48', green: '#10b981', purple: '#8b5cf6' }
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 15px rgba(6, 182, 212, 0.6)',
                        'neon-amber': '0 0 15px rgba(245, 158, 11, 0.6)',
                        'neon-rose': '0 0 15px rgba(225, 29, 72, 0.6)',
                        'wood-inset': 'inset 0 4px 10px rgba(0,0,0,0.6)'
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.15), transparent 25%);
            background-attachment: fixed; color: #f8fafc; font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .wood-board { background-color: #5c3a21; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 8px); border: 4px solid #3e2514; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(6, 182, 212, 0.8); }
        @keyframes drop-stone { 0% { transform: translateY(-20px) scale(1.2); opacity: 0.5; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        .stone-drop { animation: drop-stone 0.3s ease-out forwards; }
        @keyframes modal-fade-in { from { opacity: 0; transform: scale(0.95) translateY(-20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-animate { animation: modal-fade-in 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FirebaseModules = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc };
        window.dispatchEvent(new Event('firebase-modules-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorMsg: error.message }; }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-panel p-8 rounded-2xl max-w-lg text-center border-rose-500 shadow-neon-rose">
                            <i className="fa-solid fa-triangle-exclamation text-6xl text-rose-500 mb-4 animate-bounce"></i>
                            <h1 className="text-2xl font-bold mb-2">Eyvah, Arıza!</h1><p className="mb-4">{this.state.errorMsg}</p>
                            <button onClick={() => window.location.reload()} className="bg-rose-600 px-6 py-2 rounded-full font-bold">Yeniden Başlat</button>
                        </div>
                    </div>
                );
                return this.props.children; 
            }
        }

        const GAMES = [
            { id: 'satranc', name: 'Satranç', icon: 'fa-chess', color: 'neon-rose', isReady: true, rules: "Sınıf içi serbest mod. Taşları seçin ve hedef kareye tıklayın." },
            { id: 'mangala', name: 'Mangala', icon: 'fa-seedling', color: 'neon-cyan', isReady: true, rules: "Kuyunu seç, taşları dağıt. Son taş hazineye gelirse tekrar oyna." },
            { id: 'abluka', name: 'Abluka', icon: 'fa-cubes', color: 'neon-amber', isReady: true, rules: "Karakterini taşı ve bir duvar ör. Rakibi kilitleyen kazanır." },
            { id: 'pentagon', name: 'Pentagon', icon: 'fa-dharmachakra', color: 'neon-rose', isReady: true, rules: "Serbest Eğitici Mod: Tahtaya kendi bilyeni yerleştir. Ardından çark butonlarıyla 3x3'lük alanları 90 derece döndür. 5'li yapan kazanır." },
            { id: 'kure', name: 'Küre', icon: 'fa-globe', color: 'neon-cyan', isReady: true, rules: "Serbest Eğitici Mod: Kendi küreni seç ve boş alana veya rakip kürenin üzerine (itmek için) tıkla. Rakibi dışarı it!" },
            { id: 'kulami', name: 'Kulami', icon: 'fa-border-none', color: 'neon-amber', isReady: true, rules: "Serbest Eğitici Mod: Ahşap paneller üzerinde alan kapmaca. İstediğin kareye tıkla, kendi rengini yerleştir." },
            { id: 'motif', name: 'Motif', icon: 'fa-shapes', color: 'neon-green', isReady: true, rules: "Hız ve Görsel Zeka: Ortadaki 'Hedef Motif' kartına bak, kendi 3x3 paneline tıklayarak renkleri değiştirip hedefi tuttur!" },
            { id: 'equilibrio', name: 'Equilibrio', icon: 'fa-scale-balanced', color: 'neon-purple', isReady: true, rules: "Serbest Eğitici Mod: Blok inşaatı. Sırayla farklı şekillerdeki (Kare, Üçgen, Daire) blokları yerleştirerek denge kulesi yapın." },
        ];

        // --- LOCAL STORAGE FIREBASE SIMULATOR (MAGIC FOR TABS) ---
        const LocalDB = {
            write: (path, data) => {
                const db = JSON.parse(localStorage.getItem('zeka_local_db') || '{"players":{}, "matches":{}}');
                if(path.includes('zeka_players')) db.players[data.id] = data;
                if(path.includes('zeka_matches')) {
                    if(data === null) delete db.matches[data.id];
                    else db.matches[data.id] = {...(db.matches[data.id]||{}), ...data};
                }
                localStorage.setItem('zeka_local_db', JSON.stringify(db));
                window.dispatchEvent(new Event('local-db-update')); // Sync current tab
            },
            delete: (path, id) => {
                const db = JSON.parse(localStorage.getItem('zeka_local_db') || '{"players":{}, "matches":{}}');
                if(path.includes('zeka_players')) delete db.players[id];
                if(path.includes('zeka_matches')) delete db.matches[id];
                localStorage.setItem('zeka_local_db', JSON.stringify(db));
                window.dispatchEvent(new Event('local-db-update'));
            },
            listen: (type, callback) => {
                const getItems = () => {
                    const db = JSON.parse(localStorage.getItem('zeka_local_db') || '{"players":{}, "matches":{}}');
                    return Object.values(db[type] || {});
                };
                callback(getItems()); // Initial call
                const handler = () => callback(getItems());
                window.addEventListener('storage', handler); // Cross-tab sync
                window.addEventListener('local-db-update', handler); // Same-tab sync
                return () => { window.removeEventListener('storage', handler); window.removeEventListener('local-db-update', handler); };
            }
        };

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [isLocal, setIsLocal] = useState(false);
            const [user, setUser] = useState(null);
            const [appId] = useState('default-zeka');
            const [view, setView] = useState('home'); 
            const [roomData, setRoomData] = useState({ code: '', role: '', name: '' });
            
            useEffect(() => {
                const initFb = async () => {
                    if (!window.FirebaseModules) return;
                    const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                    const firebaseConfig = JSON.parse(configStr);

                    if (Object.keys(firebaseConfig).length === 0) {
                        // Activate Magic Local Simulator
                        setIsLocal(true);
                        setUser({ uid: 'local_user_' + Math.floor(Math.random()*1000), displayName: 'Oyuncu' });
                        setFbReady(true);
                        return;
                    }
                    
                    try {
                        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseModules;
                        let app; try { app = initializeApp(firebaseConfig); } catch (e) { app = getApp(); }
                        const fbAuth = getAuth(app);
                        await signInAnonymously(fbAuth);
                        onAuthStateChanged(fbAuth, (u) => { if (u) { setUser(u); setFbReady(true); } });
                    } catch (err) { console.error(err); }
                };

                if (window.FirebaseModules) initFb();
                else window.addEventListener('firebase-modules-ready', initFb);
            }, []);

            if (!fbReady || !user) return <div className="min-h-screen flex items-center justify-center text-neon-cyan"><i className="fa-solid fa-spinner fa-spin text-5xl"></i></div>;

            return (
                <div className="min-h-screen w-full font-sans relative flex flex-col">
                    <header className="w-full p-4 flex justify-between items-center z-50 shrink-0">
                        <div className="flex items-center gap-2 text-neon-cyan drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                            <i className="fa-solid fa-brain text-2xl"></i>
                            <h1 className="text-xl font-bold tracking-wider hidden sm:block">ZekaArenası {isLocal && <span className="text-xs bg-rose-600 text-white px-2 rounded-full ml-2">Çevrimdışı Mod</span>}</h1>
                        </div>
                        {view !== 'home' && (
                            <button onClick={() => { setView('home'); setRoomData({code:'', role:'', name:''}); }} className="text-gray-400 hover:text-white glass-panel px-4 py-2 rounded-full text-sm">
                                <i className="fa-solid fa-sign-out-alt md:mr-2"></i> <span className="hidden md:inline">Çıkış</span>
                            </button>
                        )}
                    </header>
                    <main className="flex-1 flex items-center justify-center p-2 sm:p-4 h-full w-full overflow-hidden">
                        {view === 'home' && <Home setView={setView} />}
                        {view === 'teacher' && <TeacherDashboard isLocal={isLocal} user={user} setView={setView} setRoomData={setRoomData} roomData={roomData} />}
                        {view === 'student_login' && <StudentLogin setView={setView} setRoomData={setRoomData} />}
                        {view === 'lobby' && <StudentLobby isLocal={isLocal} user={user} roomData={roomData} setView={setView} setRoomData={setRoomData} />}
                        {view === 'arena' && <Arena isLocal={isLocal} user={user} roomData={roomData} setView={setView} />}
                    </main>
                </div>
            );
        }

        // --- WRAPPERS FOR DB CALLS ---
        const callDB = {
            listenPlayers: (isLocal, code, cb) => isLocal ? LocalDB.listen('players', pts => cb(pts.filter(p=>p.roomCode===code))) : window.FirebaseModules.onSnapshot(window.FirebaseModules.collection(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_players'), s=>cb(s.docs.map(d=>d.data()).filter(p=>p.roomCode===code))),
            listenMatches: (isLocal, code, cb) => isLocal ? LocalDB.listen('matches', mts => cb(mts.filter(m=>m.roomCode===code))) : window.FirebaseModules.onSnapshot(window.FirebaseModules.collection(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_matches'), s=>cb(s.docs.map(d=>({id:d.id,...d.data()})).filter(m=>m.roomCode===code))),
            listenMatch: (isLocal, matchId, cb) => isLocal ? LocalDB.listen('matches', mts => { const m = mts.find(x=>x.id===matchId); if(m) cb(m); else cb(null); }) : window.FirebaseModules.onSnapshot(window.FirebaseModules.doc(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_matches', matchId), s=>s.exists() ? cb({id:s.id,...s.data()}) : cb(null)),
            setPlayer: async (isLocal, data) => isLocal ? LocalDB.write('zeka_players', data) : window.FirebaseModules.setDoc(window.FirebaseModules.doc(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_players', data.id), data),
            updatePlayer: async (isLocal, id, data) => isLocal ? LocalDB.write('zeka_players', {id, ...data}) : window.FirebaseModules.updateDoc(window.FirebaseModules.doc(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_players', id), data),
            deletePlayer: async (isLocal, id) => isLocal ? LocalDB.delete('zeka_players', id) : window.FirebaseModules.deleteDoc(window.FirebaseModules.doc(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_players', id)),
            setMatch: async (isLocal, data) => isLocal ? LocalDB.write('zeka_matches', data) : window.FirebaseModules.setDoc(window.FirebaseModules.doc(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_matches', data.id), data),
            updateMatch: async (isLocal, id, data) => isLocal ? LocalDB.write('zeka_matches', {id, ...data}) : window.FirebaseModules.updateDoc(window.FirebaseModules.doc(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_matches', id), data),
            deleteMatch: async (isLocal, id) => isLocal ? LocalDB.delete('zeka_matches', id) : window.FirebaseModules.deleteDoc(window.FirebaseModules.doc(window.FirebaseModules.getFirestore(), 'artifacts','a','public','data','zeka_matches', id))
        };

        function Home({ setView }) {
            return (
                <div className="glass-panel p-6 sm:p-12 rounded-3xl w-full max-w-2xl text-center shadow-2xl relative overflow-hidden">
                    <h1 className="text-3xl sm:text-5xl font-extrabold mb-2 bg-gradient-to-r from-neon-cyan to-neon-amber text-transparent bg-clip-text drop-shadow-lg">Akıl ve Zeka Oyunları</h1>
                    <p className="text-sm sm:text-xl text-gray-300 mb-8 sm:mb-10 tracking-widest uppercase font-light">Sınıf İçi Dijital Arena</p>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button onClick={() => setView('teacher')} className="group p-6 rounded-2xl bg-indigo-900/50 border border-indigo-500/30 hover:border-indigo-400 shadow-lg transition-all">
                            <i className="fa-solid fa-chalkboard-user text-4xl text-indigo-400 mb-4 group-hover:scale-110"></i><h2 className="text-xl font-bold text-white">Öğretmen Tahtası</h2><p className="text-xs text-indigo-200">Oda kur, 100+ maçı izle.</p>
                        </button>
                        <button onClick={() => setView('student_login')} className="group p-6 rounded-2xl bg-emerald-900/50 border border-emerald-500/30 hover:border-emerald-400 shadow-lg transition-all">
                            <i className="fa-solid fa-gamepad text-4xl text-emerald-400 mb-4 group-hover:scale-110"></i><h2 className="text-xl font-bold text-white">Öğrenci Girişi</h2><p className="text-xs text-emerald-200">PIN kodu ile oyna.</p>
                        </button>
                    </div>
                </div>
            );
        }

        function TeacherDashboard({ isLocal, user, roomData, setRoomData }) {
            const [players, setPlayers] = useState([]);
            const [matches, setMatches] = useState([]);
            
            useEffect(() => {
                if (!roomData.code) setRoomData({ code: Math.floor(1000 + Math.random() * 9000).toString(), role: 'teacher', name: 'Öğretmen' });
            }, []);

            useEffect(() => {
                if (!roomData.code) return;
                const unsubP = callDB.listenPlayers(isLocal, roomData.code, setPlayers);
                const unsubM = callDB.listenMatches(isLocal, roomData.code, setMatches);
                return () => { unsubP(); unsubM(); };
            }, [roomData.code]);

            if (!roomData.code) return <div>Yükleniyor...</div>;
            const activeMatches = matches.filter(m => m.status === 'active');

            return (
                <div className="w-full h-full flex flex-col md:flex-row gap-4 p-2 pb-8">
                    <div className="w-full md:w-1/4 lg:w-1/5 flex flex-col gap-4">
                        <div className="glass-panel p-4 rounded-3xl text-center shadow-[0_0_20px_rgba(6,182,212,0.3)] border-t border-neon-cyan shrink-0">
                            <h2 className="text-gray-300 text-xs tracking-widest uppercase mb-1">Katılım PIN'i</h2>
                            <div className="text-5xl font-black text-neon-cyan tracking-widest mb-4 drop-shadow-[0_0_10px_rgba(6,182,212,0.8)]">{roomData.code}</div>
                        </div>
                        <div className="glass-panel p-4 rounded-3xl flex-1 flex flex-col overflow-hidden border-t border-white/10">
                            <h3 className="text-lg font-bold mb-3 flex items-center text-neon-amber shrink-0"><i className="fa-solid fa-users mr-2"></i> Lobi ({players.length})</h3>
                            <ul className="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-1">
                                {players.map((p, i) => (
                                    <li key={i} className="flex justify-between items-center bg-white/5 p-2 rounded-lg text-sm">
                                        <span className="font-semibold text-white truncate max-w-[60%]">{p.name}</span>
                                        <span className={`text-[10px] px-2 py-1 rounded-full ${p.status === 'playing' ? 'bg-rose-500/20 text-rose-400' : 'bg-emerald-500/20 text-emerald-400'}`}>{p.status === 'playing' ? 'Oyunda' : 'Hazır'}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                    <div className="w-full md:w-3/4 lg:w-4/5 glass-panel p-4 rounded-3xl border-t border-neon-rose shadow-[0_0_20px_rgba(225,29,72,0.2)] flex flex-col h-full">
                        <div className="flex justify-between items-center mb-4 shrink-0">
                            <h2 className="text-xl sm:text-2xl font-bold flex items-center text-neon-rose"><i className="fa-solid fa-satellite-dish animate-pulse mr-3"></i> Canlı Maç Radarı</h2>
                            <div className="bg-rose-900/50 text-rose-300 px-3 py-1 rounded-full text-xs font-bold border border-rose-500/30">{activeMatches.length} Aktif Maç</div>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                            {activeMatches.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-gray-500 border-2 border-dashed border-gray-700 rounded-2xl"><i className="fa-solid fa-ghost text-5xl mb-4 opacity-50"></i><p>Maç Yok.</p></div>
                            ) : (
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
                                    {activeMatches.map(m => {
                                        const g = GAMES.find(x => x.id === m.game);
                                        return (
                                            <div key={m.id} className="bg-slate-800/80 rounded-xl border border-slate-600 overflow-hidden flex flex-col shadow-lg">
                                                <div className={`px-2 py-1 bg-black/40 border-b border-slate-700 flex justify-between items-center`}><span className={`text-[10px] font-bold text-${g.color} truncate`}><i className={`fa-solid ${g.icon} mr-1`}></i>{g.name}</span><div className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></div></div>
                                                <div className="p-2 flex-1 flex flex-col justify-center gap-1">
                                                    <div className={`text-xs p-1 rounded ${m.turn === m.p1Id ? 'bg-white/10 text-white font-bold' : 'text-gray-400'}`}>{m.p1Name}</div>
                                                    <div className="text-center text-[10px] text-neon-rose font-black italic opacity-50">VS</div>
                                                    <div className={`text-xs p-1 rounded ${m.turn === m.p2Id ? 'bg-white/10 text-white font-bold' : 'text-gray-400'}`}>{m.p2Name}</div>
                                                </div>
                                                <div className={`h-1 w-full bg-${g.color} opacity-50`}></div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function StudentLogin({ setView, setRoomData }) {
            const [pin, setPin] = useState(''); const [name, setName] = useState('');
            const handleJoin = (e) => { e.preventDefault(); if(pin.trim() && name.trim()){ setRoomData({ code: pin.trim(), role: 'student', name: name.trim() }); setView('lobby'); } };
            return (
                <div className="glass-panel p-8 rounded-3xl w-full max-w-md text-center">
                    <h2 className="text-3xl font-bold mb-6">Arenaya Katıl</h2>
                    <form onSubmit={handleJoin} className="space-y-4">
                        <input type="text" required maxLength="4" className="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3 text-white text-center tracking-widest text-2xl" value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g, ''))} placeholder="PIN Kodu"/>
                        <input type="text" required maxLength="15" className="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3 text-white" value={name} onChange={e=>setName(e.target.value)} placeholder="Savaşçı Adın"/>
                        <button type="submit" className="w-full bg-cyan-600 text-white font-bold py-3 rounded-xl shadow-neon-cyan hover:bg-cyan-500 transition-all">Kapıları Aç</button>
                    </form>
                </div>
            );
        }

        function StudentLobby({ isLocal, user, roomData, setView, setRoomData }) {
            const [players, setPlayers] = useState([]); const [matches, setMatches] = useState([]); const [selGame, setSelGame] = useState('satranc');
            
            useEffect(() => {
                callDB.setPlayer(isLocal, { id: user.uid, roomCode: roomData.code, name: roomData.name, status: 'idle', timestamp: Date.now() });
                return () => { callDB.deletePlayer(isLocal, user.uid); };
            }, [user]);

            useEffect(() => {
                const unsubP = callDB.listenPlayers(isLocal, roomData.code, pts => setPlayers(pts.filter(p=>p.id!==user.uid)));
                const unsubM = callDB.listenMatches(isLocal, roomData.code, mts => {
                    setMatches(mts);
                    const myMatch = mts.find(m => (m.p1Id===user.uid || m.p2Id===user.uid) && m.status==='active');
                    if(myMatch) {
                        setRoomData(p => ({...p, matchId: myMatch.id, gameId: myMatch.game}));
                        callDB.updatePlayer(isLocal, user.uid, { status: 'playing' });
                        setView('arena');
                    }
                });
                return () => { unsubP(); unsubM(); };
            }, [user]);

            const handleChallenge = async (opponent) => {
                let init = {};
                if(selGame==='mangala') init = { board: [4,4,4,4,4,4, 0, 4,4,4,4,4,4, 0] };
                else if(selGame==='abluka') init = { grid: Array(25).fill(null), p1Pos: 2, p2Pos: 22, phase: 'move' };
                else if(selGame==='satranc') init = { board: [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],Array(8).fill(null),Array(8).fill(null),Array(8).fill(null),Array(8).fill(null),['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']], sel: null };
                else if(selGame==='pentagon') init = { b: Array(36).fill(0), quads: [0,0,0,0] }; // 0:empty, 1:p1, 2:p2
                else if(selGame==='kure') init = { b: Array(49).fill(0) }; // Setup later
                else if(selGame==='kulami') init = { b: Array(64).fill(0) }; 
                else if(selGame==='motif') init = { p1: Array(9).fill(0), p2: Array(9).fill(0), target: Array.from({length:9}, ()=>Math.floor(Math.random()*4)+1) };
                else if(selGame==='equilibrio') init = { b: [] }; // physics blocks

                const mId = `match_${Date.now()}`;
                callDB.setMatch(isLocal, { id: mId, roomCode: roomData.code, game: selGame, p1Id: user.uid, p1Name: roomData.name, p2Id: opponent.id, p2Name: opponent.name, status: 'pending', turn: user.uid, gameState: init });
            };

            const incoming = matches.filter(m => m.p2Id === user.uid && m.status === 'pending');
            const outgoing = matches.filter(m => m.p1Id === user.uid && m.status === 'pending');

            return (
                <div className="w-full h-full max-w-5xl flex flex-col md:flex-row gap-4 p-2">
                    <div className="w-full md:w-1/3 glass-panel p-4 rounded-3xl flex flex-col h-[40vh] md:h-full">
                        <h2 className="font-bold mb-2 border-b border-gray-600 pb-2">1. Oyun Seç</h2>
                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2">
                            {GAMES.map(g => (
                                <div key={g.id} onClick={()=>setSelGame(g.id)} className={`flex items-center p-2 rounded-xl border cursor-pointer ${selGame===g.id ? `bg-slate-800 border-${g.color.replace('neon-','')} shadow-[0_0_10px_currentColor]` : 'border-transparent'}`}>
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center bg-black/50 text-${g.color.replace('neon-','')} shrink-0`}><i className={`fa-solid ${g.icon}`}></i></div>
                                    <div className="ml-3 text-sm font-bold flex-1">{g.name}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="w-full md:w-2/3 flex flex-col gap-4 h-[40vh] md:h-full">
                        {incoming.length > 0 && (
                            <div className="bg-rose-900 p-3 rounded-2xl flex justify-between items-center animate-pulse">
                                <div><b>{incoming[0].p1Name}</b> sana meydan okudu! ({GAMES.find(g=>g.id===incoming[0].game).name})</div>
                                <div className="flex gap-2">
                                    <button onClick={()=>callDB.updateMatch(isLocal, incoming[0].id, {status:'active'})} className="bg-emerald-600 px-3 py-1 rounded">Kabul</button>
                                    <button onClick={()=>callDB.deleteMatch(isLocal, incoming[0].id)} className="bg-rose-600 px-3 py-1 rounded">Ret</button>
                                </div>
                            </div>
                        )}
                        <div className="glass-panel p-4 rounded-3xl flex-1 flex flex-col">
                            <h2 className="font-bold mb-2 border-b border-gray-600 pb-2">2. Rakip Seç</h2>
                            <div className="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 gap-2 content-start">
                                {players.length===0 ? <p className="text-gray-500">Kimse yok...</p> : players.map(p=>(
                                    <div key={p.id} className="bg-slate-800/50 p-2 rounded-xl flex justify-between items-center">
                                        <div className="truncate pr-2"><b>{p.name}</b> <span className="text-[10px] text-emerald-400">{p.status}</span></div>
                                        <button onClick={()=>handleChallenge(p)} disabled={p.status==='playing'||outgoing.length>0} className="bg-indigo-600 px-3 py-1 rounded shadow"><i className="fa-solid fa-swords"></i></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ARENA WRAPPER ---
        function Arena({ isLocal, user, roomData, setView }) {
            const [match, setMatch] = useState(null);
            useEffect(() => {
                const unsub = callDB.listenMatch(isLocal, roomData.matchId, (m) => { if(m) setMatch(m); else setView('lobby'); });
                return () => unsub();
            }, [roomData.matchId]);

            const handleSurrender = () => { if(confirm("Bitir?")) callDB.deleteMatch(isLocal, roomData.matchId); };
            const upState = (newState, nextTurn) => callDB.updateMatch(isLocal, roomData.matchId, { gameState: newState, turn: nextTurn });

            if(!match) return <div>Arena Yükleniyor...</div>;
            const amIP1 = match.p1Id === user.uid;
            const myTurn = match.turn === user.uid;
            const GInfo = GAMES.find(g => g.id === match.game);

            return (
                <div className="w-full max-w-5xl h-full flex flex-col">
                    <div className="glass-panel p-3 rounded-t-2xl flex justify-between items-center">
                        <div className={`text-${GInfo.color} font-bold text-lg`}><i className={`fa-solid ${GInfo.icon} mr-2`}></i>{GInfo.name}</div>
                        <div className="flex gap-4 items-center">
                            <div className={`px-3 py-1 rounded text-xs ${myTurn?'bg-emerald-500/20 text-emerald-400 animate-pulse':'bg-gray-800'}`}>{myTurn?'SIRA SENDE':'BEKLE'}</div>
                            <button onClick={handleSurrender} className="text-rose-500 border border-rose-500 px-2 rounded">Çık</button>
                        </div>
                    </div>
                    <div className="flex-1 glass-panel rounded-b-2xl p-2 sm:p-4 flex flex-col items-center justify-center overflow-auto">
                        <div className="bg-black/30 p-2 rounded mb-4 text-xs text-center max-w-2xl border border-white/10 text-gray-300">
                            <i className="fa-solid fa-circle-info mr-1 text-blue-400"></i> {GInfo.rules}
                        </div>
                        
                        {match.game === 'satranc' && <BoardSatranc s={match.gameState} up={upState} p1={amIP1} trn={myTurn} t1={match.p1Id} t2={match.p2Id} />}
                        {match.game === 'mangala' && <BoardMangala s={match.gameState} up={upState} p1={amIP1} trn={myTurn} t1={match.p1Id} t2={match.p2Id} />}
                        {match.game === 'abluka' && <BoardAbluka s={match.gameState} up={upState} p1={amIP1} trn={myTurn} t1={match.p1Id} t2={match.p2Id} />}
                        {match.game === 'pentagon' && <BoardPentagon s={match.gameState} up={upState} p1={amIP1} trn={myTurn} t1={match.p1Id} t2={match.p2Id} />}
                        {match.game === 'kure' && <BoardKure s={match.gameState} up={upState} p1={amIP1} trn={myTurn} t1={match.p1Id} t2={match.p2Id} />}
                        {match.game === 'kulami' && <BoardKulami s={match.gameState} up={upState} p1={amIP1} trn={myTurn} t1={match.p1Id} t2={match.p2Id} />}
                        {match.game === 'motif' && <BoardMotif s={match.gameState} up={upState} p1={amIP1} trn={myTurn} t1={match.p1Id} t2={match.p2Id} />}
                        {match.game === 'equilibrio' && <BoardEquilibrio s={match.gameState} up={upState} p1={amIP1} trn={myTurn} t1={match.p1Id} t2={match.p2Id} />}
                    </div>
                </div>
            );
        }

        // --- GAME BOARDS ---
        const btnClass = "bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-white mt-4 font-bold shadow-lg text-sm";
        const trnNext = (p1, t1, t2) => p1 ? t2 : t1;

        function BoardSatranc({s, up, p1, trn, t1, t2}) {
            const icons = {'r':'fa-chess-rook','n':'fa-chess-knight','b':'fa-chess-bishop','q':'fa-chess-queen','k':'fa-chess-king','p':'fa-chess-pawn','R':'fa-chess-rook text-white drop-shadow','N':'fa-chess-knight text-white','B':'fa-chess-bishop text-white','Q':'fa-chess-queen text-white','K':'fa-chess-king text-white','P':'fa-chess-pawn text-white'};
            const clk = (r,c) => {
                if(!trn) return;
                if(s.sel) {
                    if(s.sel[0]===r && s.sel[1]===c) { up({...s, sel:null}, trn?t1:t2); return; } // cancel / same turn logic bypass
                    let nb = s.board.map(x=>[...x]); nb[r][c] = nb[s.sel[0]][s.sel[1]]; nb[s.sel[0]][s.sel[1]] = null;
                    up({board: nb, sel:null}, trnNext(p1, t1, t2));
                } else { if(s.board[r][c]) up({...s, sel:[r,c]}, trn?(p1?t1:t2):t2); } // maintain turn if just selecting
            };
            return (
                <div className="wood-board p-2 rounded-xl grid grid-cols-8 border-4 border-[#2a170b] min-w-max">
                    {s.board.map((row,r) => row.map((cell,c) => {
                        const hl = s.sel && s.sel[0]===r && s.sel[1]===c;
                        return <div key={`${r}-${c}`} onClick={()=>clk(r,c)} className={`w-10 h-10 sm:w-14 sm:h-14 flex items-center justify-center text-xl sm:text-3xl cursor-pointer ${(r+c)%2===0?'bg-[#f0d9b5]':'bg-[#b58863]'} ${hl?'ring-4 ring-inset ring-rose-500':''}`}>{cell && <i className={`fa-solid ${icons[cell]} text-slate-900`}></i>}</div>
                    }))}
                </div>
            )
        }

        function BoardMangala({s, up, p1, trn, t1, t2}) {
            const clk = (i) => {
                if(!trn || s.board[i]===0 || i===6 || i===13) return; // Freeplay limits slightly enforced
                let nb = [...s.board]; let st = nb[i]; nb[i]=0; let curr=i;
                if(st>1) { nb[curr]=1; st--; }
                while(st>0) { curr=(curr+1)%14; if(curr===(p1?13:6)) continue; nb[curr]++; st--; }
                up({board: nb}, trnNext(p1, t1, t2));
            };
            const pit = (i, isT=false) => <div onClick={()=>clk(i)} className={`relative flex flex-wrap justify-center items-center gap-1 bg-wood-900 shadow-wood-inset border-2 cursor-pointer ${isT?'w-12 h-32 sm:w-20 sm:h-48 rounded-full':'w-10 h-10 sm:w-16 sm:h-16 rounded-full'} border-[#2a170b]`}><div className="absolute -top-2 -right-2 bg-black text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{s.board[i]}</div></div>;
            return (
                <div className="wood-board p-4 sm:p-8 rounded-[40px] flex gap-2 sm:gap-6 bg-[#8b5a2b]">
                    {pit(13,true)}
                    <div className="flex flex-col gap-2 sm:gap-6 justify-center">
                        <div className="flex gap-2 sm:gap-4">{[12,11,10,9,8,7].map(i=>pit(i))}</div>
                        <div className="h-1 bg-black/30 rounded w-full"></div>
                        <div className="flex gap-2 sm:gap-4">{[0,1,2,3,4,5].map(i=>pit(i))}</div>
                    </div>
                    {pit(6,true)}
                </div>
            )
        }

        function BoardAbluka({s, up, p1, trn, t1, t2}) {
            const clk = (i) => {
                if(!trn || s.grid[i]==='block' || i===s.p1Pos || i===s.p2Pos) return;
                let nb = [...s.grid];
                if(s.phase==='move') { up({...s, [p1?'p1Pos':'p2Pos']: i, phase:'wall'}, p1?t1:t2); }
                else { nb[i]='block'; up({...s, grid: nb, phase:'move'}, trnNext(p1, t1, t2)); }
            };
            return (
                <div className="grid grid-cols-5 gap-1 p-2 bg-slate-900 border-4 border-slate-700 rounded-xl">
                    {s.grid.map((c,i) => (
                        <div key={i} onClick={()=>clk(i)} className={`w-12 h-12 sm:w-16 sm:h-16 flex justify-center items-center text-2xl cursor-pointer rounded border border-slate-700 ${c==='block'?'bg-amber-600/30':'bg-slate-800 hover:bg-slate-700'}`}>
                            {i===s.p1Pos && <i className="fa-solid fa-user-ninja text-cyan-400"></i>}
                            {i===s.p2Pos && <i className="fa-solid fa-user-astronaut text-rose-400"></i>}
                        </div>
                    ))}
                </div>
            )
        }

        function BoardPentagon({s, up, p1, trn, t1, t2}) {
            // s.b is 36 array. s.quads is 4 array of rotations (deg).
            const place = (i) => {
                if(!trn || s.b[i]!==0) return;
                let nb = [...s.b]; nb[i] = p1 ? 1 : 2;
                up({...s, b: nb}, p1?t1:t2); // Stay on same player to let them rotate
            };
            const rot = (qIdx) => {
                if(!trn) return;
                let nq = [...s.quads]; nq[qIdx] = (nq[qIdx] + 90) % 360;
                up({...s, quads: nq}, trnNext(p1, t1, t2));
            };
            
            // Map 36 cells into 4 quadrants
            const quadCells = [[0,1,2,6,7,8,12,13,14], [3,4,5,9,10,11,15,16,17], [18,19,20,24,25,26,30,31,32], [21,22,23,27,28,29,33,34,35]];
            
            return (
                <div className="flex flex-col items-center">
                    <div className="bg-rose-900 p-2 sm:p-4 rounded-xl border-4 border-rose-700 grid grid-cols-2 gap-2 shadow-neon-rose">
                        {[0,1,2,3].map(qId => (
                            <div key={qId} className="relative p-1 bg-black/30 rounded">
                                <div className="grid grid-cols-3 gap-1 transition-transform duration-500" style={{transform:`rotate(${s.quads[qId]}deg)`}}>
                                    {quadCells[qId].map(cId => (
                                        <div key={cId} onClick={()=>place(cId)} className="w-8 h-8 sm:w-12 sm:h-12 bg-rose-800 rounded-full shadow-wood-inset border border-rose-900 flex justify-center items-center cursor-pointer">
                                            {s.b[cId]===1 && <div className="w-5 h-5 sm:w-8 sm:h-8 bg-cyan-400 rounded-full shadow-[0_0_10px_#0ff]"></div>}
                                            {s.b[cId]===2 && <div className="w-5 h-5 sm:w-8 sm:h-8 bg-amber-400 rounded-full shadow-[0_0_10px_#fbbf24]"></div>}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>rot(qId)} className="absolute -bottom-3 -right-3 bg-slate-800 text-white rounded-full w-8 h-8 z-10 hover:bg-slate-600 shadow"><i className="fa-solid fa-rotate-right"></i></button>
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function BoardKure({s, up, p1, trn, t1, t2}) {
            const clk = (i) => {
                if(!trn) return;
                let nb = [...s.b];
                // Simple freeplay: Click empty = place own. Click own = clear. Click enemy = replace with own (simulate push out)
                if(nb[i] === 0) nb[i] = p1 ? 1 : 2;
                else if(nb[i] === (p1?1:2)) nb[i] = 0;
                else nb[i] = p1 ? 1 : 2;
                up({...s, b: nb}, trnNext(p1, t1, t2));
            };
            return (
                <div className="bg-slate-800 p-2 sm:p-4 rounded-full border-8 border-slate-900 shadow-neon-cyan">
                    <div className="grid grid-cols-7 gap-1 sm:gap-2">
                        {s.b.map((c,i) => (
                            <div key={i} onClick={()=>clk(i)} className="w-8 h-8 sm:w-10 sm:h-10 bg-slate-700 rounded-full shadow-inner flex justify-center items-center cursor-pointer hover:bg-slate-600">
                                {c===1 && <div className="w-6 h-6 sm:w-8 sm:h-8 bg-gradient-to-br from-cyan-300 to-cyan-600 rounded-full shadow-[0_0_10px_#0ff]"></div>}
                                {c===2 && <div className="w-6 h-6 sm:w-8 sm:h-8 bg-gradient-to-br from-rose-300 to-rose-600 rounded-full shadow-[0_0_10px_#e11d48]"></div>}
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function BoardKulami({s, up, p1, trn, t1, t2}) {
            const clk = (i) => {
                if(!trn || s.b[i]!==0) return;
                let nb = [...s.b]; nb[i] = p1 ? 1 : 2;
                up({...s, b: nb}, trnNext(p1, t1, t2));
            };
            return (
                <div className="bg-amber-900 p-2 sm:p-4 rounded-xl shadow-neon-amber">
                    <div className="grid grid-cols-8 gap-1 bg-black/50 p-1 rounded">
                        {s.b.map((c,i) => (
                            <div key={i} onClick={()=>clk(i)} className="w-6 h-6 sm:w-10 sm:h-10 bg-amber-800 border-b-2 border-r-2 border-amber-950 flex justify-center items-center cursor-pointer hover:bg-amber-700">
                                {c===1 && <div className="w-4 h-4 sm:w-6 sm:h-6 bg-red-600 rounded-full shadow-md"></div>}
                                {c===2 && <div className="w-4 h-4 sm:w-6 sm:h-6 bg-black rounded-full shadow-md"></div>}
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function BoardMotif({s, up, p1, trn, t1, t2}) {
            const colors = ['bg-slate-800', 'bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-400'];
            const clk = (i) => {
                if(!trn) return;
                let key = p1 ? 'p1' : 'p2';
                let ng = [...s[key]]; ng[i] = (ng[i] + 1) % 5;
                up({...s, [key]: ng}, p1?t1:t2); // Motif is simultaneous speed logic usually, but here turn stays local to let them build
            };
            const finish = () => up(s, trnNext(p1, t1, t2)); // Pass turn to let other know
            
            const Grid3x3 = ({arr, onClick}) => (
                <div className="grid grid-cols-3 gap-1 p-2 bg-white/10 rounded">
                    {arr.map((c,i) => <div key={i} onClick={()=>onClick&&onClick(i)} className={`w-10 h-10 sm:w-14 sm:h-14 ${colors[c]} rounded cursor-pointer border border-white/20 transition-colors`}></div>)}
                </div>
            );

            return (
                <div className="flex flex-col items-center gap-6">
                    <div className="text-center">
                        <h3 className="text-neon-green font-bold mb-2 tracking-widest">HEDEF MOTİF</h3>
                        <Grid3x3 arr={s.target} />
                    </div>
                    <div className="flex gap-8 items-end">
                        <div className={`opacity-${p1?100:50} text-center`}><div className="mb-2 text-xs">Senin Panelin</div><Grid3x3 arr={p1?s.p1:s.p2} onClick={clk}/></div>
                        <div className={`opacity-${!p1?100:50} text-center`}><div className="mb-2 text-xs">Rakip</div><Grid3x3 arr={!p1?s.p1:s.p2} /></div>
                    </div>
                    <button onClick={finish} className={btnClass}>Hamlemi Tamamladım / Zile Bas</button>
                </div>
            )
        }

        function BoardEquilibrio({s, up, p1, trn, t1, t2}) {
            const shapes = ['w-12 h-12 bg-cyan-500', 'w-0 h-0 border-l-[24px] border-l-transparent border-r-[24px] border-r-transparent border-b-[48px] border-b-rose-500', 'w-12 h-12 rounded-full bg-amber-500'];
            const addShape = (shIdx) => {
                if(!trn) return;
                let nb = [...s.b, { t: shIdx, x: Math.random()*200 - 100, y: Math.random()*-50, rot: Math.random()*45 }];
                up({...s, b: nb}, trnNext(p1, t1, t2));
            };
            return (
                <div className="flex flex-col items-center w-full">
                    <div className="w-full max-w-sm h-64 border-b-8 border-slate-500 relative bg-slate-900/50 rounded-t-xl overflow-hidden flex flex-col-reverse items-center pb-2">
                        {s.b.map((bl, i) => (
                            <div key={i} className={`absolute transition-all duration-500 drop-shadow-xl ${shapes[bl.t]}`} style={{transform: `translate(${bl.x}px, ${bl.y}px) rotate(${bl.rot}deg)`, bottom: `${i*30}px`}}></div>
                        ))}
                        {s.b.length===0 && <div className="text-slate-600 self-center mb-10">Blokları yerleştirerek kule yapın</div>}
                    </div>
                    <div className="flex gap-4 mt-6">
                        <button onClick={()=>addShape(0)} className="w-10 h-10 bg-cyan-500 shadow-neon-cyan hover:scale-110 transition"></button>
                        <button onClick={()=>addShape(1)} className="w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-b-[40px] border-b-rose-500 drop-shadow-[0_0_10px_#e11d48] hover:scale-110 transition"></button>
                        <button onClick={()=>addShape(2)} className="w-10 h-10 bg-amber-500 rounded-full shadow-neon-amber hover:scale-110 transition"></button>
                    </div>
                    <button onClick={()=>up({...s, b:[]}, trnNext(p1, t1, t2))} className="mt-4 text-xs text-rose-400 border border-rose-500 px-3 py-1 rounded">Kuleyi Yık</button>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
