<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akıl ve Zeka Oyunları Çok Oyunculu Arenası</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wood: {
                            800: '#5c3a21',
                            900: '#3e2514',
                        },
                        neon: {
                            cyan: '#06b6d4',
                            amber: '#f59e0b',
                            rose: '#e11d48'
                        }
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 15px rgba(6, 182, 212, 0.6)',
                        'neon-amber': '0 0 15px rgba(245, 158, 11, 0.6)',
                        'neon-rose': '0 0 15px rgba(225, 29, 72, 0.6)',
                        'wood-inset': 'inset 0 4px 10px rgba(0,0,0,0.6)'
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.15), transparent 25%);
            background-attachment: fixed;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .wood-board {
            background-color: #5c3a21;
            background-image: repeating-linear-gradient(
                45deg,
                rgba(0,0,0,0.1) 0px,
                rgba(0,0,0,0.1) 2px,
                transparent 2px,
                transparent 8px
            );
            border: 4px solid #3e2514;
        }

        /* Custom Scrollbar for dense grids */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2); 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.5); 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.8); 
        }

        /* Particles Animation for turns */
        @keyframes pulse-neon {
            0% { box-shadow: 0 0 5px currentColor; }
            50% { box-shadow: 0 0 20px currentColor; }
            100% { box-shadow: 0 0 5px currentColor; }
        }
        .animate-neon-pulse {
            animation: pulse-neon 2s infinite;
        }

        /* Stone drop animation */
        @keyframes drop-stone {
            0% { transform: translateY(-20px) scale(1.2); opacity: 0.5; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .stone-drop {
            animation: drop-stone 0.3s ease-out forwards;
        }
        
        /* Modal Animation */
        @keyframes modal-fade-in {
            from { opacity: 0; transform: scale(0.95) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-animate {
            animation: modal-fade-in 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase Module Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseModules = { 
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, 
            getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc 
        };
        
        window.dispatchEvent(new Event('firebase-modules-ready'));
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorMsg: '' };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, errorMsg: error.message };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center p-4">
                            <div className="glass-panel p-8 rounded-2xl max-w-lg text-center shadow-neon-rose border-rose-500">
                                <i className="fa-solid fa-triangle-exclamation text-6xl text-rose-500 mb-4 animate-bounce"></i>
                                <h1 className="text-2xl font-bold mb-2">Eyvah, Bir Sistem Arızası!</h1>
                                <p className="text-gray-300 mb-4">{this.state.errorMsg}</p>
                                <button onClick={() => window.location.reload()} className="bg-rose-600 hover:bg-rose-700 text-white px-6 py-2 rounded-full font-bold transition-all shadow-lg">Arenayı Yeniden Başlat</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        // --- CONSTANTS & CONFIG (GAMES + RULES) ---
        const GAMES = [
            { id: 'satranc', name: 'Satranç', icon: 'fa-chess', color: 'neon-rose', isReady: true, rules: "Stratejinin şahı! Taşlarınızı satranç kurallarına göre hareket ettirip rakibin şahını mat etmeye çalışırsınız. Sınıf içi eğitici mod aktif: Taşlar serbestçe hareket ettirilebilir ve herhangi bir taş yenebilir." },
            { id: 'mangala', name: 'Mangala', icon: 'fa-seedling', color: 'neon-cyan', isReady: true, rules: "Türk zeka ve strateji oyunu. Her oyuncunun 6 kuyusu ve 1 hazinesi vardır. Kendi kuyunuzdan taşları alıp saat yönünün tersine birer birer dağıtırsınız. Son taş hazinenize gelirse sıra yine sizde olur. En çok taşı hazinesinde biriktiren kazanır." },
            { id: 'abluka', name: 'Abluka', icon: 'fa-cubes', color: 'neon-amber', isReady: true, rules: "Rakibi köşeye sıkıştırma sanatı! Her tur 2 aşamadan oluşur: Önce karakterinizi komşu bir kareye taşırsınız, ardından boş bir kareye 'duvar (blok)' koyarsınız. Hareket edecek yeri kalmayan oyuncu kaybeder." },
            { id: 'pentagon', name: 'Pentagon', icon: 'fa-dharmachakra', color: 'neon-rose', isReady: false, rules: "Sürekli değişen bir tahtada 5'li yapma mücadelesi. Sırası gelen oyuncu bir bilye koyar ve 4 tabladan birini 90 derece çevirir. Kendi renginden 5 bilyeyi yatay, dikey veya çapraz sıralayan ilk kişi kazanır." },
            { id: 'kure', name: 'Küre', icon: 'fa-globe', color: 'neon-cyan', isReady: false, rules: "Fizik ve zeka bir arada! Amacınız kendi kürelerinizi kullanarak rakibin kürelerini oyun alanının dışına itmektir. Çoğunluk gücü: 2 küre 1 küreyi, 3 küre 2 küreyi itebilir." },
            { id: 'kulami', name: 'Kulami', icon: 'fa-border-none', color: 'neon-amber', isReady: false, rules: "Ahşap karolar üzerinde alan kapmaca. Her elde farklı boyutta kurulan tahtada, rakibin koyduğu taşın yatay veya dikey doğrultusuna taş koyarak en geniş bölgeleri (karoları) ele geçirmeye çalışırsınız." },
            { id: 'motif', name: 'Motif', icon: 'fa-shapes', color: 'neon-rose', isReady: false, rules: "Görsel algı ve hız! Ortaya açılan görev kartındaki deseni, elinizdeki renkli küpleri çevirerek en hızlı şekilde oluşturmaya çalışırsınız. Deseni ilk tamamlayan zile basar." },
            { id: 'equilibrio', name: 'Equilibrio', icon: 'fa-scale-balanced', color: 'neon-cyan', isReady: false, rules: "Denge ustası olun! Verilen görev kitapçığındaki 2D ve 3D yapıları, hassas geometrik blokları devirmeden inşa etmeye çalışırsınız." },
        ];

        // --- MAIN APP COMPONENT ---
        function App() {
            const [fbReady, setFbReady] = useState(!!window.FirebaseModules);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [appId, setAppId] = useState('default-zeka-app');
            const [view, setView] = useState('home'); 
            const [roomData, setRoomData] = useState({ code: '', role: '', name: '' });
            
            useEffect(() => {
                const initFb = async () => {
                    if (!window.FirebaseModules) return;
                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseModules;
                        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                        const firebaseConfig = JSON.parse(configStr);

                        if (Object.keys(firebaseConfig).length === 0) {
                            console.warn("Yerel Mod Aktif.");
                            setUser({ uid: 'yerel-oyuncu-1', displayName: 'Masaüstü Oyuncu' });
                            setDb({ isLocal: true });
                            window.FirebaseModules.collection = () => ({});
                            window.FirebaseModules.onSnapshot = () => (() => {});
                            window.FirebaseModules.doc = () => ({});
                            window.FirebaseModules.setDoc = async () => {};
                            window.FirebaseModules.updateDoc = async () => {};
                            window.FirebaseModules.deleteDoc = async () => {};
                            return;
                        }
                        
                        let app;
                        try { app = initializeApp(firebaseConfig); } catch (e) { app = getApp(); }
                        const fbAuth = getAuth(app);
                        const fbDb = getFirestore(app);
                        setAuth(fbAuth);
                        setDb(fbDb);
                        setAppId(typeof __app_id !== 'undefined' ? __app_id : 'default-zeka-app');

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(fbAuth, __initial_auth_token);
                        } else {
                            await signInAnonymously(fbAuth);
                        }
                        onAuthStateChanged(fbAuth, (u) => { if (u) setUser(u); });
                    } catch (err) { console.error("Firebase Init Error:", err); }
                };

                if (fbReady) initFb();
                else {
                    const listener = () => { setFbReady(true); initFb(); };
                    window.addEventListener('firebase-modules-ready', listener);
                    return () => window.removeEventListener('firebase-modules-ready', listener);
                }
            }, [fbReady]);

            if (!fbReady || !user || !db) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center text-neon-cyan">
                        <i className="fa-solid fa-circle-notch fa-spin text-5xl mb-4"></i>
                        <h2 className="text-xl font-semibold tracking-widest uppercase">Arena Kuruluyor...</h2>
                    </div>
                );
            }

            return (
                <div className="min-h-screen w-full font-sans relative flex flex-col">
                    <header className="w-full p-4 flex justify-between items-center z-50 shrink-0">
                        <div className="flex items-center gap-2 text-neon-cyan drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                            <i className="fa-solid fa-brain text-2xl"></i>
                            <h1 className="text-xl font-bold tracking-wider hidden sm:block">ZekaArenası</h1>
                        </div>
                        {view !== 'home' && (
                            <button onClick={() => { setView('home'); setRoomData({code:'', role:'', name:''}); }} className="text-gray-400 hover:text-white glass-panel px-4 py-2 rounded-full text-sm transition-all shadow-md">
                                <i className="fa-solid fa-arrow-right-from-bracket md:mr-2"></i> <span className="hidden md:inline">Çıkış</span>
                            </button>
                        )}
                    </header>

                    <main className="flex-1 flex items-center justify-center p-2 sm:p-4 h-full w-full overflow-hidden">
                        {view === 'home' && <Home setView={setView} setRoomData={setRoomData} />}
                        {view === 'teacher' && <TeacherDashboard db={db} appId={appId} user={user} setView={setView} setRoomData={setRoomData} roomData={roomData} />}
                        {view === 'student_login' && <StudentLogin setView={setView} setRoomData={setRoomData} roomData={roomData} />}
                        {view === 'lobby' && <StudentLobby db={db} appId={appId} user={user} roomData={roomData} setView={setView} setRoomData={setRoomData} />}
                        {view === 'arena' && <Arena db={db} appId={appId} user={user} roomData={roomData} setView={setView} />}
                    </main>
                </div>
            );
        }

        // --- COMPONENTS ---

        function RulesModal({ game, onClose }) {
            if (!game) return null;
            return (
                <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="glass-panel w-full max-w-md rounded-3xl overflow-hidden modal-animate border border-slate-600 shadow-2xl relative">
                        <div className={`h-2 w-full bg-${game.color}`}></div>
                        <div className="p-6">
                            <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors">
                                <i className="fa-solid fa-xmark text-2xl"></i>
                            </button>
                            <div className="flex items-center gap-4 mb-4">
                                <div className={`w-14 h-14 rounded-full flex items-center justify-center bg-black/50 text-${game.color} shadow-[0_0_15px_currentColor]`}>
                                    <i className={`fa-solid ${game.icon} text-2xl`}></i>
                                </div>
                                <h2 className={`text-2xl font-bold text-${game.color}`}>{game.name}</h2>
                            </div>
                            <div className="bg-slate-900/60 p-4 rounded-xl text-gray-300 leading-relaxed border border-slate-700">
                                {game.rules}
                            </div>
                            <button onClick={onClose} className={`w-full mt-6 py-3 rounded-xl font-bold bg-slate-800 hover:bg-slate-700 text-white border border-${game.color}/50 transition-colors`}>
                                Anladım, Kuralları Kapat
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Home({ setView }) {
            return (
                <div className="glass-panel p-6 sm:p-12 rounded-3xl w-full max-w-2xl text-center shadow-2xl relative overflow-hidden">
                    <div className="absolute top-[-50px] right-[-50px] text-9xl text-white opacity-5"><i className="fa-solid fa-chess-knight"></i></div>
                    <h1 className="text-3xl sm:text-5xl font-extrabold mb-2 bg-gradient-to-r from-neon-cyan to-neon-amber text-transparent bg-clip-text drop-shadow-lg">
                        Akıl ve Zeka Oyunları
                    </h1>
                    <p className="text-sm sm:text-xl text-gray-300 mb-8 sm:mb-10 tracking-widest uppercase font-light">Çok Oyunculu Arena</p>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                        <button onClick={() => setView('teacher')} className="group p-6 sm:p-8 rounded-2xl bg-gradient-to-br from-indigo-900 to-slate-900 border border-indigo-500/30 hover:border-indigo-400 shadow-lg hover:shadow-[0_0_20px_rgba(99,102,241,0.5)] transition-all">
                            <i className="fa-solid fa-chalkboard-user text-4xl sm:text-5xl text-indigo-400 mb-4 group-hover:scale-110 transition-transform"></i>
                            <h2 className="text-xl sm:text-2xl font-bold text-white mb-2">Öğretmen Tahtası</h2>
                            <p className="text-xs sm:text-sm text-indigo-200">Sınıf odası kur ve 100+ maçı canlı izle.</p>
                        </button>
                        <button onClick={() => setView('student_login')} className="group p-6 sm:p-8 rounded-2xl bg-gradient-to-br from-emerald-900 to-slate-900 border border-emerald-500/30 hover:border-emerald-400 shadow-lg hover:shadow-[0_0_20px_rgba(16,185,129,0.5)] transition-all">
                            <i className="fa-solid fa-gamepad text-4xl sm:text-5xl text-emerald-400 mb-4 group-hover:scale-110 transition-transform"></i>
                            <h2 className="text-xl sm:text-2xl font-bold text-white mb-2">Öğrenci Cihazı</h2>
                            <p className="text-xs sm:text-sm text-emerald-200">PIN kodu ile katıl ve arkadaşlarınla eşleş.</p>
                        </button>
                    </div>
                </div>
            );
        }

        // --- TEACHER DASHBOARD (SMARTBOARD OPTIMIZED) ---
        function TeacherDashboard({ db, appId, user, roomData, setRoomData }) {
            const { collection, onSnapshot } = window.FirebaseModules;
            const [players, setPlayers] = useState([]);
            const [matches, setMatches] = useState([]);
            
            useEffect(() => {
                if (!roomData.code) {
                    const newCode = Math.floor(1000 + Math.random() * 9000).toString();
                    setRoomData({ code: newCode, role: 'teacher', name: 'Öğretmen' });
                }
            }, []);

            useEffect(() => {
                if (!user || !roomData.code || db.isLocal) return;
                const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'zeka_players');
                const matchesRef = collection(db, 'artifacts', appId, 'public', 'data', 'zeka_matches');

                const unsubP = onSnapshot(playersRef, (snap) => setPlayers(snap.docs.map(d=>d.data()).filter(p=>p.roomCode===roomData.code)));
                const unsubM = onSnapshot(matchesRef, (snap) => setMatches(snap.docs.map(d=>({id:d.id, ...d.data()})).filter(m=>m.roomCode===roomData.code)));
                return () => { unsubP(); unsubM(); };
            }, [user, roomData.code]);

            if (!roomData.code) return <div className="text-white text-xl animate-pulse">Oda Kuruluyor...</div>;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${roomData.code}&color=0f172a&bgcolor=f8fafc`;
            const activeMatches = matches.filter(m => m.status === 'active');

            return (
                <div className="w-full h-full max-h-screen flex flex-col md:flex-row gap-4 p-2 pb-8">
                    {/* LEFT PANEL (Code, QR, Stats) */}
                    <div className="w-full md:w-1/4 lg:w-1/5 flex flex-col gap-4">
                        <div className="glass-panel p-4 rounded-3xl text-center shadow-[0_0_20px_rgba(6,182,212,0.3)] border-t border-neon-cyan shrink-0">
                            <h2 className="text-gray-300 text-xs tracking-widest uppercase mb-1">Katılım PIN'i</h2>
                            <div className="text-5xl md:text-6xl font-black text-neon-cyan tracking-widest mb-4 drop-shadow-[0_0_10px_rgba(6,182,212,0.8)]">
                                {roomData.code}
                            </div>
                            <div className="bg-white p-2 rounded-xl inline-block mx-auto">
                                <img src={qrUrl} alt="QR Code" className="w-24 h-24 md:w-32 md:h-32 object-contain" />
                            </div>
                        </div>
                        
                        <div className="glass-panel p-4 rounded-3xl flex-1 flex flex-col overflow-hidden border-t border-white/10 min-h-[200px]">
                            <h3 className="text-lg font-bold mb-3 flex items-center text-neon-amber shrink-0"><i className="fa-solid fa-users mr-2"></i> Lobi ({players.length})</h3>
                            <ul className="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-1">
                                {players.length === 0 && <p className="text-gray-500 text-xs italic">Öğrenci bekleniyor...</p>}
                                {players.map((p, i) => (
                                    <li key={i} className="flex justify-between items-center bg-white/5 p-2 rounded-lg text-sm">
                                        <span className="font-semibold text-white truncate max-w-[60%]">{p.name}</span>
                                        <span className={`text-[10px] px-2 py-1 rounded-full ${p.status === 'playing' ? 'bg-rose-500/20 text-rose-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                                            {p.status === 'playing' ? 'Oyunda' : 'Hazır'}
                                        </span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    {/* RIGHT PANEL (Dense Grid Radar for 100+ Matches) */}
                    <div className="w-full md:w-3/4 lg:w-4/5 glass-panel p-4 sm:p-6 rounded-3xl border-t border-neon-rose shadow-[0_0_20px_rgba(225,29,72,0.2)] flex flex-col h-full">
                        <div className="flex justify-between items-center mb-4 shrink-0">
                            <h2 className="text-xl sm:text-2xl font-bold flex items-center text-neon-rose">
                                <i className="fa-solid fa-satellite-dish animate-pulse mr-3"></i> Canlı Maç Radarı
                            </h2>
                            <div className="bg-rose-900/50 text-rose-300 px-3 py-1 rounded-full text-xs font-bold border border-rose-500/30">
                                {activeMatches.length} Aktif Maç
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                            {activeMatches.length === 0 ? (
                                <div className="h-full w-full flex flex-col items-center justify-center text-gray-500 border-2 border-dashed border-gray-700 rounded-2xl p-8">
                                    <i className="fa-solid fa-ghost text-5xl mb-4 opacity-50"></i>
                                    <p className="text-lg">Şu an devam eden bir maç yok.</p>
                                    <p className="text-sm mt-2 text-gray-600">Öğrencilerin PIN kodunu girerek eşleşmesi bekleniyor...</p>
                                </div>
                            ) : (
                                /* CSS Grid Magic: Auto-fit makes it scale automatically. Dense packing fits 100+ gracefully. */
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
                                    {activeMatches.map(match => {
                                        const gameInfo = GAMES.find(g => g.id === match.game);
                                        return (
                                            <div key={match.id} className="bg-slate-800/80 rounded-xl border border-slate-600 relative overflow-hidden flex flex-col shadow-lg transform transition-all hover:scale-[1.02]">
                                                {/* Mini header */}
                                                <div className={`px-2 py-1 bg-black/40 border-b border-slate-700 flex justify-between items-center`}>
                                                    <span className={`text-[10px] font-bold uppercase text-${gameInfo.color} truncate`}>
                                                        <i className={`fa-solid ${gameInfo.icon} mr-1`}></i>{gameInfo.name}
                                                    </span>
                                                    <div className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></div>
                                                </div>
                                                {/* Players body */}
                                                <div className="p-2 flex-1 flex flex-col justify-center gap-1">
                                                    <div className={`text-xs p-1 rounded ${match.turn === match.p1Id ? 'bg-white/10 text-white font-bold border border-white/20' : 'text-gray-400'}`}>
                                                        <i className="fa-solid fa-caret-right text-[10px] mr-1 opacity-50"></i>{match.p1Name}
                                                    </div>
                                                    <div className="text-center text-[10px] text-neon-rose font-black italic opacity-50">VS</div>
                                                    <div className={`text-xs p-1 rounded ${match.turn === match.p2Id ? 'bg-white/10 text-white font-bold border border-white/20' : 'text-gray-400'}`}>
                                                        <i className="fa-solid fa-caret-right text-[10px] mr-1 opacity-50"></i>{match.p2Name}
                                                    </div>
                                                </div>
                                                {/* Bottom highlight bar */}
                                                <div className={`h-1 w-full bg-${gameInfo.color} opacity-50`}></div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // --- STUDENT LOGIN ---
        function StudentLogin({ setView, setRoomData }) {
            const [pin, setPin] = useState('');
            const [name, setName] = useState('');

            const handleJoin = (e) => {
                e.preventDefault();
                if(pin.trim() && name.trim()) {
                    setRoomData({ code: pin.trim(), role: 'student', name: name.trim() });
                    setView('lobby');
                }
            };

            return (
                <div className="glass-panel p-6 sm:p-8 rounded-3xl w-full max-w-md shadow-2xl relative">
                    <div className="absolute -top-10 left-1/2 transform -translate-x-1/2 w-20 h-20 bg-neon-cyan rounded-full blur-[40px] opacity-30"></div>

                            <input type="text" required maxLength="15" className="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-neon-amber outline-none" value={name} onChange={(e) => setName(e.target.value)} placeholder="Örn: KralAhmet"/>
                        </div>
                        <button type="submit" className="w-full bg-gradient-to-r from-neon-cyan to-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:scale-[1.02] active:scale-95 transition-all">
                            <i className="fa-solid fa-door-open mr-2"></i> Kapıları Aç
                        </button>
                    </form>
                </div>
            );
        }

        // --- STUDENT LOBBY ---
        function StudentLobby({ db, appId, user, roomData, setView, setRoomData }) {
            const { collection, setDoc, doc, onSnapshot, updateDoc, deleteDoc } = window.FirebaseModules;
            const [players, setPlayers] = useState([]);
            const [matches, setMatches] = useState([]);
            const [selectedGame, setSelectedGame] = useState('satranc');
            const [rulesModalGame, setRulesModalGame] = useState(null); // Which game rules to show

            useEffect(() => {
                if (!user || db.isLocal) {
                    if (db.isLocal) setPlayers([{ id: 'bot-1', name: 'Bot Zeka 1', status: 'idle', roomCode: roomData.code }, { id: 'bot-2', name: 'Bot Zeka 2', status: 'idle', roomCode: roomData.code }]);
                    return;
                }
                const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'zeka_players', user.uid);
                setDoc(playerRef, { roomCode: roomData.code, name: roomData.name, status: 'idle', timestamp: new Date().getTime() });
                return () => { deleteDoc(playerRef).catch(()=>{}); };
            }, [user]);

            useEffect(() => {
                if (!user || db.isLocal) return;
                const unsubP = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'zeka_players'), snap => setPlayers(snap.docs.map(d=>({id:d.id, ...d.data()})).filter(p=>p.roomCode===roomData.code && p.id!==user.uid)));
                const unsubM = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'zeka_matches'), snap => {
                    const allM = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(m=>m.roomCode===roomData.code);
                    setMatches(allM);
                    const myMatch = allM.find(m => (m.p1Id === user.uid || m.p2Id === user.uid) && m.status === 'active');
                    if (myMatch) {
                        setRoomData(prev => ({...prev, matchId: myMatch.id, gameId: myMatch.game}));
                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_players', user.uid), { status: 'playing' });
                        setView('arena');
                    }
                });
                return () => { unsubP(); unsubM(); };
            }, [user]);

            const handleChallenge = async (opponent) => {
                const gameInfo = GAMES.find(g => g.id === selectedGame);
                if (!gameInfo.isReady) { alert(`${gameInfo.name} oyunu yapım aşamasında. Çok Yakında!`); return; }

                let initialState = {};
                if (selectedGame === 'mangala') initialState = { board: [4,4,4,4,4,4, 0, 4,4,4,4,4,4, 0] };
                else if (selectedGame === 'abluka') initialState = { grid: Array(25).fill(null), p1Pos: 2, p2Pos: 22, phase: 'move' };
                else if (selectedGame === 'satranc') initialState = {
                    board: [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']], selectedPos: null
                };

                const matchId = `match_${new Date().getTime()}_${user.uid.slice(0,5)}`;
                
                if (db.isLocal) {
                    setRoomData(prev => ({ ...prev, matchId: matchId, gameId: selectedGame, localMatchData: { id: matchId, roomCode: roomData.code, game: selectedGame, p1Id: user.uid, p1Name: roomData.name, p2Id: opponent.id, p2Name: opponent.name, status: 'active', turn: user.uid, gameState: initialState } }));
                    setView('arena'); return;
                }

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', matchId), { roomCode: roomData.code, game: selectedGame, p1Id: user.uid, p1Name: roomData.name, p2Id: opponent.id, p2Name: opponent.name, status: 'pending', turn: user.uid, gameState: initialState, timestamp: new Date().getTime() });
            };

            const incoming = matches.filter(m => m.p2Id === user.uid && m.status === 'pending');
            const outgoing = matches.filter(m => m.p1Id === user.uid && m.status === 'pending');

            return (
                <div className="w-full h-full max-w-5xl flex flex-col md:flex-row gap-4 p-2">
                    {rulesModalGame && <RulesModal game={rulesModalGame} onClose={() => setRulesModalGame(null)} />}
                    
                    {/* LEFT: Game Selector */}
                    <div className="w-full md:w-1/3 glass-panel p-4 sm:p-6 rounded-3xl flex flex-col h-[40vh] md:h-full shrink-0">
                        <h2 className="text-lg sm:text-xl font-bold mb-4 text-white border-b border-gray-600 pb-2">1. Oyun Seç</h2>
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2">
                            {GAMES.map(g => (
                                <div key={g.id} className={`w-full flex items-center p-2 sm:p-3 rounded-xl border transition-all cursor-pointer ${selectedGame === g.id ? `bg-slate-800 border-${g.color.replace('neon-','')} shadow-[0_0_15px_rgba(255,255,255,0.1)]` : 'bg-slate-900/50 border-transparent hover:bg-slate-800'}`} onClick={() => setSelectedGame(g.id)}>
                                    <div className={`w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center bg-black/50 text-${g.color.replace('neon-','')} shrink-0`}>
                                        <i className={`fa-solid ${g.icon}`}></i>
                                    </div>
                                    <div className="ml-3 text-left flex-1 min-w-0">
                                        <div className="font-bold text-white text-sm sm:text-base truncate">{g.name}</div>
                                        {!g.isReady && <div className="text-[10px] text-rose-400 bg-rose-900/30 inline-block px-2 rounded-full">Yakında</div>}
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); setRulesModalGame(g); }} className="p-2 text-gray-400 hover:text-white transition-colors" title="Kuralları Oku">
                                        <i className="fa-solid fa-circle-info text-lg"></i>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* RIGHT: Players */}
                    <div className="w-full md:w-2/3 flex flex-col gap-4 h-[40vh] md:h-full">
                        {incoming.length > 0 && (
                            <div className="bg-gradient-to-r from-rose-900/80 to-slate-900 p-3 rounded-2xl border border-rose-500 shadow-neon-rose flex flex-col sm:flex-row items-center justify-between gap-3 animate-pulse shrink-0">
                                <div className="text-center sm:text-left">
                                    <h3 className="font-bold text-white"><i className="fa-solid fa-khanda mr-2"></i> Meydan Okuma!</h3>
                                    <p className="text-xs sm:text-sm text-gray-300"><strong className="text-rose-400">{incoming[0].p1Name}</strong> seni maça çağırıyor!</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => !db.isLocal && updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', incoming[0].id), { status: 'active' })} className="bg-emerald-600 px-4 py-2 rounded-lg text-white text-sm"><i className="fa-solid fa-check"></i> Kabul</button>
                                    <button onClick={() => !db.isLocal && deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', incoming[0].id))} className="bg-rose-600 px-4 py-2 rounded-lg text-white text-sm"><i className="fa-solid fa-xmark"></i> Ret</button>
                                </div>
                            </div>
                        )}
                        {outgoing.length > 0 && (
                            <div className="bg-slate-800/80 p-3 rounded-2xl border border-amber-500 text-amber-400 text-sm text-center shrink-0">
                                <i className="fa-solid fa-hourglass-half fa-spin mr-2"></i> {outgoing[0].p2Name} kişisinden yanıt bekleniyor...
                            </div>
                        )}

                        <div className="glass-panel p-4 sm:p-6 rounded-3xl flex-1 flex flex-col min-h-[250px]">
                            <h2 className="text-lg sm:text-xl font-bold mb-4 text-white border-b border-gray-600 pb-2">2. Rakip Seç</h2>
                            <div className="flex-1 overflow-y-auto pr-2 grid grid-cols-1 sm:grid-cols-2 gap-3 content-start">
                                {players.length === 0 ? (
                                    <div className="col-span-full text-center text-gray-500 py-10"><i className="fa-solid fa-radar fa-spin text-3xl mb-2 opacity-50"></i><p className="text-sm">Odada başka oyuncu aranıyor...</p></div>
                                ) : (
                                    players.map(p => (
                                        <div key={p.id} className="bg-slate-800/50 p-3 rounded-xl border border-slate-700 flex justify-between items-center hover:bg-slate-800">
                                            <div className="flex items-center gap-2 overflow-hidden">
                                                <div className="w-8 h-8 rounded-full bg-slate-900 flex items-center justify-center text-gray-400 shrink-0"><i className="fa-solid fa-user text-xs"></i></div>
                                                <div className="min-w-0">
                                                    <div className="font-bold text-white text-sm truncate">{p.name}</div>
                                                    <div className={`text-[10px] ${p.status === 'playing' ? 'text-rose-400' : 'text-emerald-400'}`}>{p.status === 'playing' ? 'Oyunda' : 'Müsait'}</div>
                                                </div>
                                            </div>
                                            <button onClick={() => handleChallenge(p)} disabled={p.status === 'playing' || outgoing.length > 0} className="bg-indigo-600 disabled:opacity-50 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg shrink-0 active:scale-95"><i className="fa-solid fa-swords text-xs"></i></button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ARENA WRAPPER ---
        function Arena({ db, appId, user, roomData, setView }) {
            const { doc, onSnapshot, updateDoc, deleteDoc } = window.FirebaseModules;
            const [matchData, setMatchData] = useState(roomData.localMatchData || null);
            const [showRules, setShowRules] = useState(false);

            useEffect(() => {
                if (!user || !roomData.matchId || db.isLocal) return;
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', roomData.matchId), (docSnap) => {
                    if (docSnap.exists()) setMatchData({ id: docSnap.id, ...docSnap.data() });
                    else leaveArena();
                });
                return () => unsub();
            }, [user, roomData.matchId]);

            const leaveArena = async () => {
                if (user && !db.isLocal) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_players', user.uid), { status: 'idle' }).catch(()=>{});
                setView('lobby');
            };

            const handleSurrender = async () => {
                if (confirm("Oyunu sonlandırmak istediğine emin misin?")) {
                    if (!db.isLocal) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', roomData.matchId));
                    else leaveArena();
                }
            };

            const updateGameState = async (newState, nextTurn) => {
                if (db.isLocal) { setMatchData(prev => ({ ...prev, gameState: newState, turn: user.uid })); return; }
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'zeka_matches', roomData.matchId), { gameState: newState, turn: nextTurn });
            };

            if (!matchData) return <div className="text-white text-xl animate-pulse">Arena Yükleniyor...</div>;

            const amIP1 = matchData.p1Id === user.uid;
            const myTurn = db.isLocal ? true : matchData.turn === user.uid; 
            const opponentName = amIP1 ? matchData.p2Name : matchData.p1Name;
            const gameInfo = GAMES.find(g => g.id === matchData.game);

            return (
                <div className="w-full max-w-5xl flex flex-col h-full max-h-[95vh] p-2">
                    {showRules && <RulesModal game={gameInfo} onClose={() => setShowRules(false)} />}
                    
                    <div className="glass-panel px-4 py-3 sm:px-6 sm:py-4 rounded-t-3xl border-b border-gray-700 flex justify-between items-center bg-black/40 shrink-0">
                        <div className="flex items-center gap-2 sm:gap-4">
                            <span className={`text-${gameInfo.color} text-xl sm:text-2xl drop-shadow-[0_0_8px_currentColor]`}><i className={`fa-solid ${gameInfo.icon}`}></i></span>
                            <span className="text-lg sm:text-xl font-bold uppercase tracking-wider text-gray-200 truncate max-w-[100px] sm:max-w-[200px]">{gameInfo.name}</span>
                            <button onClick={() => setShowRules(true)} className="ml-2 text-gray-400 hover:text-white"><i className="fa-solid fa-circle-info"></i></button>
                        </div>
                        <div className="flex items-center gap-2 sm:gap-6">
                            <div className={`px-2 py-1 sm:px-4 sm:py-1 rounded-full font-bold text-[10px] sm:text-sm ${myTurn ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)] animate-pulse' : 'bg-gray-800 text-gray-500'}`}>
                                {db.isLocal ? 'TEST' : (myTurn ? 'SIRA SENDE' : 'BEKLE')}
                            </div>
                            <button onClick={handleSurrender} className="text-rose-500 hover:text-rose-400 text-[10px] sm:text-sm border border-rose-500/50 px-2 sm:px-3 py-1 rounded-lg">Ayrıl</button>
                        </div>
                    </div>

                    <div className="flex-1 glass-panel rounded-b-3xl relative flex flex-col items-center justify-center p-2 sm:p-4 overflow-y-auto overflow-x-hidden bg-gradient-to-b from-transparent to-black/50">
                        {matchData.winner && (
                            <div className="absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center backdrop-blur-sm p-4 text-center">
                                <h2 className="text-3xl sm:text-5xl font-black text-amber-400 drop-shadow-[0_0_20px_#f59e0b] mb-4">OYUN BİTTİ</h2>
                                <p className="text-xl sm:text-2xl text-white mb-8">Kazanan: {matchData.winner === user.uid ? 'SEN' : opponentName}</p>
                                <button onClick={handleSurrender} className="bg-white text-black px-6 py-2 sm:px-8 sm:py-3 rounded-full font-bold hover:bg-gray-200">Lobilye Dön</button>
                            </div>
                        )}

                        {matchData.game === 'mangala' && <MangalaBoard state={matchData.gameState} updateState={updateGameState} amIP1={amIP1} myTurn={myTurn} p1Id={matchData.p1Id} p2Id={matchData.p2Id} db={db}/>}
                        {matchData.game === 'abluka' && <AblukaBoard state={matchData.gameState} updateState={updateGameState} amIP1={amIP1} myTurn={myTurn} p1Id={matchData.p1Id} p2Id={matchData.p2Id} />}
                        {matchData.game === 'satranc' && <SatrancBoard state={matchData.gameState} updateState={updateGameState} amIP1={amIP1} myTurn={myTurn} p1Id={matchData.p1Id} p2Id={matchData.p2Id} db={db}/>}
                        {matchData.game !== 'mangala' && matchData.game !== 'abluka' && matchData.game !== 'satranc' && <ComingSoonBoard gameInfo={gameInfo} />}
                    </div>
                </div>
            );
        }

        // --- MANGALA ---
        function MangalaBoard({ state, updateState, amIP1, myTurn, p1Id, p2Id, db }) {
            const { board } = state; 
            const handlePitClick = (index) => {
                if (!myTurn) return;
                if (!db?.isLocal) { if (amIP1 && (index < 0 || index > 5)) return; if (!amIP1 && (index < 7 || index > 12)) return; }
                let stones = board[index]; if (stones === 0) return;
                let newBoard = [...board]; newBoard[index] = 0; let currIndex = index;
                if (stones > 1) { newBoard[currIndex] = 1; stones--; }
                while (stones > 0) {
                    currIndex = (currIndex + 1) % 14;
                    const isPlayingP1Side = db?.isLocal ? (index <= 5) : amIP1;
                    if ((isPlayingP1Side && currIndex === 13) || (!isPlayingP1Side && currIndex === 6)) continue;
                    newBoard[currIndex]++; stones--;
                }
                updateState({ board: newBoard }, amIP1 ? p2Id : p1Id);
            };

            const renderPit = (index, isTreasury = false) => {
                const count = board[index];
                const isMine = db?.isLocal ? true : ((amIP1 && (index <= 6)) || (!amIP1 && (index >= 7)));
                const canClick = myTurn && isMine && !isTreasury && count > 0;
                const stonesArr = Array.from({length: Math.min(count, 15)}); 
                return (
                    <div onClick={() => canClick && handlePitClick(index)} className={`relative flex flex-wrap items-center justify-center gap-[2px] sm:gap-1 bg-wood-900 shadow-wood-inset border-2 shrink-0 ${isTreasury ? 'w-12 h-40 sm:w-20 sm:h-56 rounded-[30px]' : 'w-10 h-10 sm:w-16 sm:h-16 rounded-full'} ${canClick ? 'cursor-pointer border-neon-cyan hover:shadow-neon-cyan transform hover:scale-105' : 'border-[#2a170b] opacity-90'}`}>
                        <div className="absolute -top-2 -right-2 sm:-top-3 sm:-right-3 bg-black/80 text-white text-[10px] sm:text-xs font-bold w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center border border-gray-600">{count}</div>
                        {stonesArr.map((_, i) => <div key={i} className="w-2 h-2 sm:w-3 sm:h-3 rounded-full bg-gradient-to-br from-gray-200 to-gray-500 shadow-sm stone-drop" style={{animationDelay: `${i*0.05}s`}}></div>)}
                    </div>
                );
            };

            const topPits = amIP1 ? [12,11,10,9,8,7] : [5,4,3,2,1,0];
            const bottomPits = amIP1 ? [0,1,2,3,4,5] : [7,8,9,10,11,12];
            return (
                <div className="flex flex-col items-center w-full max-w-full overflow-x-auto pb-4 custom-scrollbar">
                    <div className="wood-board p-3 sm:p-8 rounded-[30px] sm:rounded-[50px] shadow-2xl flex items-center justify-center gap-2 sm:gap-6 relative min-w-max mx-auto">
                        <div className="absolute inset-0 bg-gradient-to-tr from-white/5 to-transparent pointer-events-none rounded-[50px]"></div>
                        {renderPit(amIP1 ? 13 : 6, true)}
                        <div className="flex flex-col gap-3 sm:gap-6">
                            <div className="flex gap-2 sm:gap-4">{topPits.map(idx => <div key={idx}>{renderPit(idx)}</div>)}</div>
                            <div className="w-full h-1 bg-[#2a170b] rounded-full opacity-50 shadow-[0_1px_0_rgba(255,255,255,0.1)]"></div>
                            <div className="flex gap-2 sm:gap-4">{bottomPits.map(idx => <div key={idx}>{renderPit(idx)}</div>)}</div>
                        </div>
                        {renderPit(amIP1 ? 6 : 13, true)}
                    </div>
                    <div className="mt-4 sm:mt-6 text-gray-400 font-bold tracking-widest text-[10px] sm:text-sm flex gap-4">
                        <span className="text-neon-cyan"><i className="fa-solid fa-user"></i> BEN</span> <span>vs</span> <span className="text-gray-500">RAKİP <i className="fa-solid fa-user"></i></span>
                    </div>
                </div>
            );
        }

        // --- ABLUKA ---
        function AblukaBoard({ state, updateState, amIP1, myTurn, p1Id, p2Id }) {
            const { grid, p1Pos, p2Pos, phase } = state; 
            const myPos = amIP1 ? p1Pos : p2Pos;
            const handleCellClick = (index) => {
                if (!myTurn) return;
                const isAdjacent = (pos1, pos2) => Math.abs(Math.floor(pos1/5) - Math.floor(pos2/5)) <= 1 && Math.abs((pos1%5) - (pos2%5)) <= 1 && pos1 !== pos2;
                if (phase === 'move' && grid[index] === null && index !== (amIP1 ? p2Pos : p1Pos) && isAdjacent(myPos, index)) {
                    updateState({...state, p1Pos: amIP1 ? index : p1Pos, p2Pos: !amIP1 ? index : p2Pos, phase: 'wall'}, null); 
                } else if (phase === 'wall' && grid[index] === null && index !== p1Pos && index !== p2Pos) {
                    let newGrid = [...grid]; newGrid[index] = 'block';
                    updateState({...state, grid: newGrid, phase: 'move'}, amIP1 ? p2Id : p1Id);
                }
            };
            return (
                <div className="flex flex-col items-center w-full max-w-full overflow-x-auto">
                    <div className="mb-4 text-center">
                        <div className={`inline-block px-4 py-2 rounded-full border border-gray-600 bg-black/50 text-xs sm:text-lg font-black ${myTurn ? 'text-neon-amber shadow-neon-amber' : 'text-gray-500'}`}>
                            {myTurn ? (phase === 'move' ? '1. ADIM: Karakterini Taşı' : '2. ADIM: Duvar Ör (Ablukaya Al)') : 'Rakip Hamle Yapıyor...'}
                        </div>
                    </div>
                    <div className="grid grid-cols-5 gap-1 sm:gap-2 p-2 sm:p-4 bg-slate-900 border-4 border-slate-700 rounded-xl shadow-[0_0_30px_rgba(0,0,0,0.8)] min-w-max mx-auto">
                        {grid.map((cell, idx) => {
                            let isH = false;
                            if (myTurn && phase==='move' && cell!=='block' && idx!==p1Pos && idx!==p2Pos) isH = Math.abs(Math.floor(myPos/5)-Math.floor(idx/5))<=1 && Math.abs((myPos%5)-(idx%5))<=1;
                            else if (myTurn && phase==='wall' && cell!=='block' && idx!==p1Pos && idx!==p2Pos) isH = true;
                            return (
                                <div key={idx} onClick={() => handleCellClick(idx)} className={`w-12 h-12 sm:w-16 sm:h-16 md:w-20 md:h-20 rounded-lg border flex items-center justify-center text-xl sm:text-3xl transition-all ${cell === 'block' ? 'bg-amber-600/20 border-amber-500/50 shadow-[inset_0_0_10px_rgba(245,158,11,0.2)]' : 'bg-slate-800 border-slate-700'} ${isH ? 'hover:bg-slate-700 cursor-pointer hover:border-white' : ''}`}>
                                    {cell === 'block' && <div className="w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-20"></div>}
                                    {idx === p1Pos && <i className={`fa-solid fa-user-ninja ${amIP1 ? 'text-neon-cyan animate-bounce' : 'text-cyan-800'}`}></i>}
                                    {idx === p2Pos && <i className={`fa-solid fa-user-astronaut ${!amIP1 ? 'text-neon-rose animate-bounce' : 'text-rose-900'}`}></i>}
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        }

        // --- SATRANC ---
        function SatrancBoard({ state, updateState, amIP1, myTurn, p1Id, p2Id, db }) {
            const { board, selectedPos } = state;
            const icons = {'r':'fa-chess-rook text-slate-800','n':'fa-chess-knight text-slate-800','b':'fa-chess-bishop text-slate-800','q':'fa-chess-queen text-slate-800','k':'fa-chess-king text-slate-800','p':'fa-chess-pawn text-slate-800','R':'fa-chess-rook text-white drop-shadow-[0_0_5px_#fff]','N':'fa-chess-knight text-white drop-shadow-[0_0_5px_#fff]','B':'fa-chess-bishop text-white drop-shadow-[0_0_5px_#fff]','Q':'fa-chess-queen text-white drop-shadow-[0_0_5px_#fff]','K':'fa-chess-king text-white drop-shadow-[0_0_5px_#fff]','P':'fa-chess-pawn text-white drop-shadow-[0_0_5px_#fff]'};
            
            const handleSquareClick = (r, c) => {
                if (!myTurn) return;
                const piece = board[r][c];
                const isMyPiece = db?.isLocal ? !!piece : (piece && (amIP1 ? piece===piece.toUpperCase() : piece===piece.toLowerCase()));

                if (selectedPos) {
                    const [selR, selC] = selectedPos;
                    if (r === selR && c === selC) { updateState({ ...state, selectedPos: null }, null); return; }
                    if (isMyPiece && !db?.isLocal) { updateState({ ...state, selectedPos: [r, c] }, null); return; }
                    let newBoard = board.map(row => [...row]);
                    newBoard[r][c] = newBoard[selR][selC]; newBoard[selR][selC] = null;
                    updateState({ board: newBoard, selectedPos: null }, amIP1 ? p2Id : p1Id);
                } else if (isMyPiece) updateState({ ...state, selectedPos: [r, c] }, null);
            };

            const displayBoard = (amIP1 || db?.isLocal) ? board : [...board].reverse().map(row => [...row].reverse());

            return (
                <div className="flex flex-col items-center w-full max-w-full overflow-x-auto pb-4 custom-scrollbar">
                    <div className="mb-4 text-center">
                        <div className={`inline-block px-4 py-2 rounded-full border border-gray-600 bg-black/50 text-xs sm:text-lg font-black ${myTurn ? 'text-neon-rose shadow-neon-rose animate-pulse' : 'text-gray-500'}`}>
                            {myTurn ? (selectedPos ? 'HAMLENİ YAP VEYA RAKİBİ YE!' : 'BİR TAŞ SEÇ') : 'Rakip Düşünüyor...'}
                        </div>
                    </div>
                    <div className="wood-board p-2 sm:p-4 rounded-xl shadow-2xl relative bg-wood-800 min-w-max mx-auto">
                        <div className="grid grid-cols-8 border-2 sm:border-4 border-[#2a170b] shadow-wood-inset">
                            {displayBoard.map((row, rowIdx) => row.map((cell, colIdx) => {
                                const actualR = (amIP1 || db?.isLocal) ? rowIdx : 7 - rowIdx;
                                const actualC = (amIP1 || db?.isLocal) ? colIdx : 7 - colIdx;
                                const isSelected = selectedPos && selectedPos[0] === actualR && selectedPos[1] === actualC;
                                return (
                                    <div key={`${actualR}-${actualC}`} onClick={() => handleSquareClick(actualR, actualC)} className={`w-8 h-8 sm:w-12 sm:h-12 md:w-14 md:h-14 lg:w-16 lg:h-16 flex items-center justify-center text-lg sm:text-2xl md:text-4xl cursor-pointer ${(actualR+actualC)%2===0 ? 'bg-[#f0d9b5]' : 'bg-[#b58863]'} ${isSelected ? 'ring-inset ring-2 sm:ring-4 ring-neon-rose bg-rose-400/50' : ''}`}>
                                        {cell && <i className={`fa-solid ${icons[cell]} ${isSelected ? 'animate-bounce' : ''}`}></i>}
                                    </div>
                                );
                            }))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- COMING SOON ---
        function ComingSoonBoard({ gameInfo }) {
            return (
                <div className="text-center p-4">
                    <div className={`w-32 h-32 sm:w-48 sm:h-48 mx-auto rounded-full border-4 border-${gameInfo.color} flex items-center justify-center bg-black/50 shadow-[0_0_30px_currentColor] mb-6 relative`}>
                        <i className={`fa-solid ${gameInfo.icon} text-5xl sm:text-6xl text-${gameInfo.color} opacity-50`}></i>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black text-white font-black text-xl sm:text-3xl px-4 py-1 sm:py-2 rounded border border-white/20 whitespace-nowrap -rotate-12">ÇOK YAKINDA</div>
                    </div>
                    <p className="text-gray-400 max-w-sm sm:max-w-md mx-auto text-sm sm:text-base">Sayın Profesörüm, {gameInfo.name} oyununun tasarımı hazır. Sağ üstteki <i className="fa-solid fa-circle-info mx-1"></i> ikonundan kurallarını okuyabilirsiniz.</p>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
