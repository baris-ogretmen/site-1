
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akıl ve Zeka Oyunları Çok Oyunculu Arenası</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wood: { 800: '#5c3a21', 900: '#3e2514' },
                        neon: { cyan: '#06b6d4', amber: '#f59e0b', rose: '#e11d48', green: '#10b981', purple: '#8b5cf6' }
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 15px rgba(6, 182, 212, 0.6)',
                        'neon-amber': '0 0 15px rgba(245, 158, 11, 0.6)',
                        'neon-rose': '0 0 15px rgba(225, 29, 72, 0.6)',
                        'wood-inset': 'inset 0 4px 10px rgba(0,0,0,0.6)'
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.15), transparent 25%);
            background-attachment: fixed; color: #f8fafc; font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .wood-board { background-color: #5c3a21; background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 8px); border: 4px solid #3e2514; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(6, 182, 212, 0.8); }
        @keyframes drop-stone { 0% { transform: translateY(-20px) scale(1.2); opacity: 0.5; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        .stone-drop { animation: drop-stone 0.3s ease-out forwards; }
        @keyframes modal-fade-in { from { opacity: 0; transform: scale(0.95) translateY(-20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-animate { animation: modal-fade-in 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase Modülleri -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FirebaseModules = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc };
        window.dispatchEvent(new Event('firebase-modules-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, errorMsg: error.message }; }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-panel p-8 rounded-2xl max-w-lg text-center border-rose-500 shadow-neon-rose">
                            <i className="fa-solid fa-triangle-exclamation text-6xl text-rose-500 mb-4 animate-bounce"></i>
                            <h1 className="text-2xl font-bold mb-2">Eyvah, Sistem Arızası!</h1><p className="mb-4">{this.state.errorMsg}</p>
                            <button onClick={() => window.location.reload()} className="bg-rose-600 hover:bg-rose-500 px-6 py-2 rounded-full font-bold transition-colors">Arenayı Yeniden Başlat</button>
                        </div>
                    </div>
                );
                return this.props.children; 
            }
        }

        // --- OYUN VERİLERİ VE KURALLAR ---
        const GAMES = [
            { id: 'satranc', name: 'Satranç', icon: 'fa-chess', color: 'neon-rose', isReady: true, rules: "Stratejinin şahı! Sınıf içi eğitici mod aktif: Taşlarınızı satranç kurallarına göre özgürce hareket ettirebilir ve rakip taşları yiyebilirsiniz." },
            { id: 'mangala', name: 'Mangala', icon: 'fa-seedling', color: 'neon-cyan', isReady: true, rules: "Kendi kuyunuzdan taşları alıp saat yönünün tersine birer birer dağıtırsınız. Son taş hazinenize gelirse sıra yine sizde olur. Klasik Mangala!" },
            { id: 'abluka', name: 'Abluka', icon: 'fa-cubes', color: 'neon-amber', isReady: true, rules: "Rakibi köşeye sıkıştırma sanatı! Önce karakterinizi komşu bir kareye taşıyın, ardından boş bir kareye 'duvar' koyun. Hareket edecek yeri kalmayan kaybeder." },
            { id: 'pentagon', name: 'Pentagon', icon: 'fa-dharmachakra', color: 'neon-rose', isReady: true, rules: "Sırası gelen bir bilye koyar ve 4 tabladan birini döndürme ikonuna basarak 90 derece çevirir. 5 bilyeyi yan yana getiren kazanır." },
            { id: 'kure', name: 'Küre', icon: 'fa-globe', color: 'neon-cyan', isReady: true, rules: "Amacınız kendi kürelerinizi kullanarak rakibin kürelerini dışarı itmektir. (Serbest Mod: Küre eklemek veya silmek için karelere tıklayın)." },
            { id: 'kulami', name: 'Kulami', icon: 'fa-border-none', color: 'neon-amber', isReady: true, rules: "Ahşap karolar üzerinde alan kapmaca. İstediğiniz boş kareye tıklayarak taşınızı yerleştirin ve bölgeleri ele geçirin." },
            { id: 'motif', name: 'Motif', icon: 'fa-shapes', color: 'neon-green', isReady: true, rules: "Ortada beliren 'Hedef Motif' desenini kendi panelinizdeki renklere tıklayarak en hızlı şekilde kopyalamaya çalışın!" },
            { id: 'equilibrio', name: 'Equilibrio', icon: 'fa-scale-balanced', color: 'neon-purple', isReady: true, rules: "Denge ustası! Aşağıdaki şekil butonlarına basarak ekrana bloklar düşürün ve devirmeden bir kule inşa etmeye çalışın." },
        ];

        // --- BARIŞ HOCAM'IN ÖZEL FIREBASE YAPILANDIRMASI ---
        const firebaseConfig = {
            apiKey: "AIzaSyAqeO-yQyQPnLsOqKmSNvVH23WPvneIjaU",
            authDomain: "shaped-totem-481514-c5.firebaseapp.com",
            projectId: "shaped-totem-481514-c5",
            storageBucket: "shaped-totem-481514-c5.firebasestorage.app",
            messagingSenderId: "519295049418",
            appId: "1:519295049418:web:7d04e18c4ea36bc088de33"
        };

        // --- BAŞLANGIÇ DURUMLARI (RESET İÇİN) ---
        const getInitialGameState = (gameId) => {
            if (gameId === 'mangala') return { board: [4,4,4,4,4,4, 0, 4,4,4,4,4,4, 0] };
            if (gameId === 'abluka') return { grid: Array(25).fill(null), p1Pos: 2, p2Pos: 22, phase: 'move' };
            if (gameId === 'satranc') return { board: [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],Array(8).fill(null),Array(8).fill(null),Array(8).fill(null),Array(8).fill(null),['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']], selectedPos: null };
            if (gameId === 'pentagon') return { b: Array(36).fill(0), quads: [0,0,0,0] }; 
            if (gameId === 'kure') return { b: Array(49).fill(0) }; 
            if (gameId === 'kulami') return { b: Array(64).fill(0) }; 
            if (gameId === 'motif') return { p1: Array(9).fill(0), p2: Array(9).fill(0), target: Array.from({length:9}, ()=>Math.floor(Math.random()*4)+1) };
            if (gameId === 'equilibrio') return { b: [] }; 
            return {};
        };

        // --- ANA UYGULAMA ---
        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); 
            const [roomData, setRoomData] = useState({ code: '', role: '', name: '', matchId: null, gameId: null });
            
            useEffect(() => {
                const initFb = async () => {
                    if (!window.FirebaseModules) return;
                    try {
                        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseModules;

                        let app; 
                        try { app = initializeApp(firebaseConfig); } 
                        catch (e) { console.log("Firebase zaten başlatıldı"); }
                        
                        const fbAuth = getAuth(app);
                        const fbDb = getFirestore(app);
                        setDb(fbDb);

                        await signInAnonymously(fbAuth);

                        onAuthStateChanged(fbAuth, (u) => { 
                            if (u) { setUser(u); setFbReady(true); }
                        });
                    } catch (err) { 
                        console.error("Firebase Başlatma Hatası:", err); 
                        alert("Firebase bağlantı hatası. Lütfen Authentication(Anonim) ve Firestore ayarlarınızı kontrol edin.");
                    }
                };

                if (window.FirebaseModules) initFb();
                else window.addEventListener('firebase-modules-ready', initFb);
            }, []);

            if (!fbReady || !user || !db) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center text-neon-cyan">
                        <i className="fa-solid fa-circle-notch fa-spin text-5xl mb-4"></i>
                        <h2 className="text-xl font-semibold tracking-widest uppercase">Arena Kuruluyor...</h2>
                        <p className="text-sm text-gray-400 mt-2">Sunucu ile bağlantı kuruluyor</p>
                    </div>
                );
            }

            const leaveRoomFully = () => {
                setView('home'); 
                setRoomData({code:'', role:'', name:'', matchId: null, gameId: null});
                if (user) {
                    const { doc, updateDoc } = window.FirebaseModules;
                    updateDoc(doc(db, 'zeka_players', user.uid), { status: 'idle' }).catch(()=>{});
                }
            };

            return (
                <div className="min-h-screen w-full font-sans relative flex flex-col">
                    <header className="w-full p-4 flex justify-between items-center z-50 shrink-0 border-b border-white/5 bg-black/20">
                        <div className="flex items-center gap-2 text-neon-cyan drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">
                            <i className="fa-solid fa-brain text-2xl"></i>
                            <h1 className="text-xl font-bold tracking-wider hidden sm:block">ZekaArenası</h1>
                        </div>
                        {view !== 'home' && (
                            <button onClick={leaveRoomFully} className="text-gray-400 hover:text-rose-400 glass-panel px-4 py-2 rounded-full text-sm shadow-md transition-colors border border-transparent hover:border-rose-500/50">
                                <i className="fa-solid fa-arrow-right-from-bracket md:mr-2"></i> <span className="hidden md:inline">Lobiden Ayrıl</span>
                            </button>
                        )}
                    </header>

                    <main className="flex-1 flex items-center justify-center p-2 sm:p-4 h-full w-full overflow-hidden">
                        {view === 'home' && <Home setView={setView} />}
                        {view === 'teacher' && <TeacherDashboard db={db} user={user} setView={setView} setRoomData={setRoomData} roomData={roomData} />}
                        {view === 'student_login' && <StudentLogin setView={setView} setRoomData={setRoomData} />}
                        {view === 'lobby' && <StudentLobby db={db} user={user} roomData={roomData} setView={setView} setRoomData={setRoomData} />}
                        {view === 'arena' && <Arena db={db} user={user} roomData={roomData} setView={setView} setRoomData={setRoomData} />}
                    </main>
                </div>
            );
        }

        // --- BİLEŞENLER ---

        function RulesModal({ game, onClose }) {
            if (!game) return null;
            return (
                <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="glass-panel w-full max-w-md rounded-3xl overflow-hidden modal-animate border border-slate-600 shadow-2xl relative">
                        <div className={`h-2 w-full bg-${game.color}`}></div>
                        <div className="p-6">
                            <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors">
                                <i className="fa-solid fa-xmark text-2xl"></i>
                            </button>
                            <div className="flex items-center gap-4 mb-4">
                                <div className={`w-14 h-14 rounded-full flex items-center justify-center bg-black/50 text-${game.color} shadow-[0_0_15px_currentColor]`}>
                                    <i className={`fa-solid ${game.icon} text-2xl`}></i>
                                </div>
                                <h2 className={`text-2xl font-bold text-${game.color}`}>{game.name} Kuralları</h2>
                            </div>
                            <div className="bg-slate-900/60 p-4 rounded-xl text-gray-300 leading-relaxed border border-slate-700 shadow-inner">
                                {game.rules}
                            </div>
                            <button onClick={onClose} className={`w-full mt-6 py-3 rounded-xl font-bold bg-slate-800 hover:bg-slate-700 text-white border border-${game.color}/50 transition-all active:scale-95`}>
                                Anladım, Kapat
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Home({ setView }) {
            return (
                <div className="glass-panel p-6 sm:p-12 rounded-3xl w-full max-w-2xl text-center shadow-2xl relative overflow-hidden border border-white/10">
                    <div className="absolute -top-10 -right-10 text-9xl text-white opacity-5"><i className="fa-solid fa-chess-knight"></i></div>
                    <div className="absolute -bottom-10 -left-10 text-9xl text-white opacity-5"><i className="fa-solid fa-cubes"></i></div>
                    
                    <h1 className="text-3xl sm:text-5xl font-extrabold mb-2 bg-gradient-to-r from-neon-cyan to-neon-amber text-transparent bg-clip-text drop-shadow-lg">
                        Akıl ve Zeka Oyunları
                    </h1>
                    <p className="text-sm sm:text-xl text-gray-300 mb-8 sm:mb-10 tracking-widest uppercase font-light">Sınıf İçi Dijital Arena</p>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                        <button onClick={() => setView('teacher')} className="group p-6 sm:p-8 rounded-2xl bg-gradient-to-br from-indigo-900/80 to-slate-900 border border-indigo-500/30 hover:border-indigo-400 shadow-lg hover:shadow-[0_0_20px_rgba(99,102,241,0.5)] transition-all">
                            <i className="fa-solid fa-chalkboard-user text-4xl sm:text-5xl text-indigo-400 mb-4 group-hover:scale-110 transition-transform"></i>
                            <h2 className="text-xl sm:text-2xl font-bold text-white mb-2">Öğretmen Tahtası</h2>
                            <p className="text-xs sm:text-sm text-indigo-200">Sınıf odası kur ve 100+ maçı canlı izle.</p>
                        </button>
                        <button onClick={() => setView('student_login')} className="group p-6 sm:p-8 rounded-2xl bg-gradient-to-br from-emerald-900/80 to-slate-900 border border-emerald-500/30 hover:border-emerald-400 shadow-lg hover:shadow-[0_0_20px_rgba(16,185,129,0.5)] transition-all">
                            <i className="fa-solid fa-gamepad text-4xl sm:text-5xl text-emerald-400 mb-4 group-hover:scale-110 transition-transform"></i>
                            <h2 className="text-xl sm:text-2xl font-bold text-white mb-2">Öğrenci Girişi</h2>
                            <p className="text-xs sm:text-sm text-emerald-200">PIN kodu ile katıl ve arkadaşlarınla eşleş.</p>
                        </button>
                    </div>
                </div>
            );
        }

        // --- AKILLI TAHTA EKRANI ---
        function TeacherDashboard({ db, user, roomData, setRoomData }) {
            const { collection, onSnapshot } = window.FirebaseModules;
            const [players, setPlayers] = useState([]);
            const [matches, setMatches] = useState([]);
            
            useEffect(() => {
                if (!roomData.code) {
                    setRoomData({ code: Math.floor(1000 + Math.random() * 9000).toString(), role: 'teacher', name: 'Öğretmen', matchId: null, gameId: null });
                }
            }, []);

            useEffect(() => {
                if (!user || !roomData.code) return;
                
                const playersRef = collection(db, 'zeka_players');
                const matchesRef = collection(db, 'zeka_matches');

                const unsubP = onSnapshot(playersRef, (snap) => setPlayers(snap.docs.map(d=>d.data()).filter(p=>p.roomCode===roomData.code)), (err) => console.error(err));
                const unsubM = onSnapshot(matchesRef, (snap) => setMatches(snap.docs.map(d=>({id:d.id, ...d.data()})).filter(m=>m.roomCode===roomData.code)), (err) => console.error(err));
                
                return () => { unsubP(); unsubM(); };
            }, [user, roomData.code]);

            if (!roomData.code) return <div className="text-white text-xl animate-pulse">Oda Kuruluyor...</div>;
            
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${roomData.code}&color=0f172a&bgcolor=f8fafc`;
            const activeMatches = matches.filter(m => m.status === 'active');

            return (
                <div className="w-full h-full flex flex-col md:flex-row gap-4 p-2 pb-8">
                    <div className="w-full md:w-1/4 lg:w-1/5 flex flex-col gap-4">
                        <div className="glass-panel p-4 rounded-3xl text-center shadow-[0_0_20px_rgba(6,182,212,0.3)] border-t border-neon-cyan shrink-0">
                            <h2 className="text-gray-300 text-xs tracking-widest uppercase mb-1">Katılım PIN'i</h2>
                            <div className="text-5xl md:text-6xl font-black text-neon-cyan tracking-widest mb-4 drop-shadow-[0_0_10px_rgba(6,182,212,0.8)]">
                                {roomData.code}
                            </div>
                            <div className="bg-white p-2 rounded-xl inline-block mx-auto">
                                <img src={qrUrl} alt="QR Code" className="w-24 h-24 md:w-32 md:h-32 object-contain" />
                            </div>
                        </div>
                        
                        <div className="glass-panel p-4 rounded-3xl flex-1 flex flex-col overflow-hidden border-t border-white/10 min-h-[200px]">
                            <h3 className="text-lg font-bold mb-3 flex items-center text-neon-amber shrink-0"><i className="fa-solid fa-users mr-2"></i> Lobi ({players.length})</h3>
                            <ul className="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-1">
                                {players.length === 0 && <p className="text-gray-500 text-xs italic">Öğrenci bekleniyor...</p>}
                                {players.map((p, i) => (
                                    <li key={i} className="flex justify-between items-center bg-white/5 p-2 rounded-lg text-sm">
                                        <span className="font-semibold text-white truncate max-w-[60%]">{p.name}</span>
                                        <span className={`text-[10px] px-2 py-1 rounded-full ${p.status === 'playing' ? 'bg-rose-500/20 text-rose-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                                            {p.status === 'playing' ? 'Oyunda' : 'Hazır'}
                                        </span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    <div className="w-full md:w-3/4 lg:w-4/5 glass-panel p-4 sm:p-6 rounded-3xl border-t border-neon-rose shadow-[0_0_20px_rgba(225,29,72,0.2)] flex flex-col h-full">
                        <div className="flex justify-between items-center mb-4 shrink-0">
                            <h2 className="text-xl sm:text-2xl font-bold flex items-center text-neon-rose">
                                <i className="fa-solid fa-satellite-dish animate-pulse mr-3"></i> Canlı Maç Radarı
                            </h2>
                            <div className="bg-rose-900/50 text-rose-300 px-3 py-1 rounded-full text-xs font-bold border border-rose-500/30">
                                {activeMatches.length} Aktif Maç
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                            {activeMatches.length === 0 ? (
                                <div className="h-full w-full flex flex-col items-center justify-center text-gray-500 border-2 border-dashed border-gray-700 rounded-2xl p-8">
                                    <i className="fa-solid fa-ghost text-5xl mb-4 opacity-50"></i>
                                    <p className="text-lg">Şu an devam eden bir maç yok.</p>
                                    <p className="text-sm mt-2 text-gray-600">Öğrencilerin eşleşmesi bekleniyor...</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
                                    {activeMatches.map(match => {
                                        const gameInfo = GAMES.find(g => g.id === match.game);
                                        return (
                                            <div key={match.id} className="bg-slate-800/80 rounded-xl border border-slate-600 relative overflow-hidden flex flex-col shadow-lg">
                                                <div className={`px-2 py-1 bg-black/40 border-b border-slate-700 flex justify-between items-center`}>
                                                    <span className={`text-[10px] font-bold uppercase text-${gameInfo.color} truncate`}>
                                                        <i className={`fa-solid ${gameInfo.icon} mr-1`}></i>{gameInfo.name}
                                                    </span>
                                                    <div className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></div>
                                                </div>
                                                <div className="p-2 flex-1 flex flex-col justify-center gap-1">
                                                    <div className={`text-xs p-1 rounded ${match.turn === match.p1Id ? 'bg-white/10 text-white font-bold border border-white/20 shadow-sm' : 'text-gray-400'}`}>
                                                        {match.p1Name}
                                                    </div>
                                                    <div className="text-center text-[10px] text-neon-rose font-black italic opacity-50">VS</div>
                                                    <div className={`text-xs p-1 rounded ${match.turn === match.p2Id ? 'bg-white/10 text-white font-bold border border-white/20 shadow-sm' : 'text-gray-400'}`}>
                                                        {match.p2Name}
                                                    </div>
                                                </div>
                                                <div className={`h-1 w-full bg-${gameInfo.color} opacity-50`}></div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // --- ÖĞRENCİ GİRİŞİ ---
        function StudentLogin({ setView, setRoomData }) {
            const [pin, setPin] = useState('');
            const [name, setName] = useState('');

            const handleJoin = (e) => {
                e.preventDefault();
                if(pin.trim() && name.trim()) {
                    setRoomData({ code: pin.trim(), role: 'student', name: name.trim(), matchId: null, gameId: null });
                    setView('lobby');
                }
            };

            return (
                <div className="glass-panel p-6 sm:p-8 rounded-3xl w-full max-w-md shadow-2xl relative border border-white/10">
                    <div className="absolute -top-10 left-1/2 transform -translate-x-1/2 w-20 h-20 bg-neon-cyan rounded-full blur-[40px] opacity-30"></div>
                    <h2 className="text-2xl sm:text-3xl font-bold mb-6 text-center text-white">Arenaya Katıl</h2>
                    <form onSubmit={handleJoin} className="space-y-4 sm:space-y-6">
                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">Tahtadaki PIN Kodu</label>
                            <input type="text" required maxLength="4" className="w-full bg-slate-900/80 border border-slate-600 rounded-xl px-4 py-3 text-white text-2xl tracking-widest text-center focus:ring-2 focus:ring-neon-cyan outline-none transition-all shadow-inner" value={pin} onChange={(e) => setPin(e.target.value.replace(/\D/g, ''))} placeholder="----"/>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">Adın / Takma Adın</label>
                            <input type="text" required maxLength="15" className="w-full bg-slate-900/80 border border-slate-600 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-neon-amber outline-none transition-all shadow-inner" value={name} onChange={(e) => setName(e.target.value)} placeholder="Örn: KralAhmet"/>
                        </div>
                        <button type="submit" className="w-full bg-gradient-to-r from-neon-cyan to-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:scale-[1.02] active:scale-95 transition-all">
                            <i className="fa-solid fa-door-open mr-2"></i> Kapıları Aç
                        </button>
                    </form>
                </div>
            );
        }

        // --- ÖĞRENCİ LOBİSİ ---
        function StudentLobby({ db, user, roomData, setView, setRoomData }) {
            const { collection, setDoc, doc, onSnapshot, updateDoc, deleteDoc } = window.FirebaseModules;
            const [players, setPlayers] = useState([]);
            const [matches, setMatches] = useState([]);
            const [selectedGame, setSelectedGame] = useState('satranc');
            const [rulesModalGame, setRulesModalGame] = useState(null);

            // Sınıf içi antrenman botları
            const botPlayers = [
                { id: 'bot_1', name: '🤖 Zeka Botu (Kolay)', status: 'idle', isBot: true, roomCode: roomData.code },
                { id: 'bot_2', name: '🤖 Zeka Botu (Normal)', status: 'idle', isBot: true, roomCode: roomData.code },
                { id: 'bot_3', name: '🤖 Profesör Bot (Zor)', status: 'idle', isBot: true, roomCode: roomData.code },
                { id: 'bot_4', name: '🤖 Yapay Zeka (Uzman)', status: 'idle', isBot: true, roomCode: roomData.code }
            ];

            useEffect(() => {
                if (!user) return;
                const playerRef = doc(db, 'zeka_players', user.uid);
                // Her lobiye girişte status'ü kesin idle yap (Eski bugda kalmaları önler)
                setDoc(playerRef, { roomCode: roomData.code, name: roomData.name, status: 'idle', timestamp: Date.now() });
                
                return () => { deleteDoc(playerRef).catch(()=>{}); };
            }, [user, roomData.code]);

            useEffect(() => {
                if (!user) return;
                const playersRef = collection(db, 'zeka_players');
                const matchesRef = collection(db, 'zeka_matches');

                const unsubP = onSnapshot(playersRef, snap => {
                    const realPlayers = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(p=>p.roomCode===roomData.code && p.id!==user.uid);
                    setPlayers([...botPlayers, ...realPlayers]); 
                }, err => console.error(err));

                const unsubM = onSnapshot(matchesRef, snap => {
                    const allM = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(m=>m.roomCode===roomData.code);
                    setMatches(allM);
                    
                    const myMatch = allM.find(m => (m.p1Id === user.uid || m.p2Id === user.uid) && m.status === 'active');
                    if (myMatch) {
                        setRoomData(prev => ({...prev, matchId: myMatch.id, gameId: myMatch.game}));
                        updateDoc(doc(db, 'zeka_players', user.uid), { status: 'playing' }).catch(()=>{});
                        setView('arena');
                    }
                }, err => console.error(err));

                return () => { unsubP(); unsubM(); };
            }, [user]);

            const handleChallenge = async (opponent) => {
                const initialState = getInitialGameState(selectedGame);
                const matchId = `match_${Date.now()}_${user.uid.slice(0,5)}`;
                const matchRef = doc(db, 'zeka_matches', matchId);
                
                const status = opponent.isBot ? 'active' : 'pending';

                await setDoc(matchRef, { 
                    roomCode: roomData.code, 
                    game: selectedGame, 
                    p1Id: user.uid, 
                    p1Name: roomData.name, 
                    p2Id: opponent.id, 
                    p2Name: opponent.name, 
                    status: status, 
                    turn: user.uid, 
                    gameState: initialState, 
                    timestamp: Date.now() 
                });
            };

            const cancelOutgoing = async (matchId) => {
                await deleteDoc(doc(db, 'zeka_matches', matchId));
            };

            const incoming = matches.filter(m => m.p2Id === user.uid && m.status === 'pending');
            const outgoing = matches.filter(m => m.p1Id === user.uid && m.status === 'pending');

            return (
                <div className="w-full h-full max-w-6xl flex flex-col md:flex-row gap-4 p-2">
                    {rulesModalGame && <RulesModal game={rulesModalGame} onClose={() => setRulesModalGame(null)} />}
                    
                    <div className="w-full md:w-1/3 glass-panel p-4 sm:p-6 rounded-3xl flex flex-col h-[40vh] md:h-full shrink-0 border border-white/5">
                        <h2 className="text-lg sm:text-xl font-bold mb-4 text-white border-b border-gray-600 pb-2">1. Oyun Seç</h2>
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2">
                            {GAMES.map(g => (
                                <div key={g.id} className={`w-full flex items-center p-2 sm:p-3 rounded-xl border transition-all cursor-pointer ${selectedGame === g.id ? `bg-slate-800 border-${g.color.replace('neon-','')} shadow-[0_0_15px_rgba(255,255,255,0.1)]` : 'bg-slate-900/50 border-transparent hover:bg-slate-800'}`} onClick={() => setSelectedGame(g.id)}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center bg-black/50 text-${g.color.replace('neon-','')} shrink-0`}>
                                        <i className={`fa-solid ${g.icon}`}></i>
                                    </div>
                                    <div className="ml-3 text-left flex-1 min-w-0">
                                        <div className="font-bold text-white text-sm sm:text-base truncate">{g.name}</div>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); setRulesModalGame(g); }} className="p-2 text-gray-400 hover:text-white transition-colors" title="Kuralları Oku">
                                        <i className="fa-solid fa-circle-info text-lg"></i>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="w-full md:w-2/3 flex flex-col gap-4 h-[40vh] md:h-full">
                        {incoming.length > 0 && (
                            <div className="bg-gradient-to-r from-rose-900/80 to-slate-900 p-3 sm:p-4 rounded-2xl border border-rose-500 shadow-neon-rose flex flex-col sm:flex-row items-center justify-between gap-3 animate-pulse shrink-0">
                                <div className="text-center sm:text-left">
                                    <h3 className="font-bold text-white"><i className="fa-solid fa-khanda mr-2"></i> Meydan Okuma!</h3>
                                    <p className="text-xs sm:text-sm text-gray-300"><strong className="text-rose-400">{incoming[0].p1Name}</strong> seni maça çağırıyor!</p>
                                </div>
                                <div className="flex gap-2 justify-center">
                                    <button onClick={() => updateDoc(doc(db, 'zeka_matches', incoming[0].id), { status: 'active' })} className="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-white text-sm shadow-md transition-colors"><i className="fa-solid fa-check"></i> Kabul</button>
                                    <button onClick={() => cancelOutgoing(incoming[0].id)} className="bg-rose-600 hover:bg-rose-500 px-4 py-2 rounded-lg text-white text-sm shadow-md transition-colors"><i className="fa-solid fa-xmark"></i> Ret</button>
                                </div>
                            </div>
                        )}
                        {outgoing.length > 0 && (
                            <div className="bg-slate-800/80 p-3 rounded-2xl border border-amber-500 text-amber-400 text-sm flex justify-between items-center shrink-0">
                                <div><i className="fa-solid fa-hourglass-half fa-spin mr-2"></i> {outgoing[0].p2Name} kişisinden yanıt bekleniyor...</div>
                                <button onClick={() => cancelOutgoing(outgoing[0].id)} className="bg-rose-600 hover:bg-rose-500 text-white px-3 py-1 rounded-lg transition-colors">İptal Et</button>
                            </div>
                        )}

                        <div className="glass-panel p-4 sm:p-6 rounded-3xl flex-1 flex flex-col min-h-[250px] border border-white/5">
                            <h2 className="text-lg sm:text-xl font-bold mb-4 text-white border-b border-gray-600 pb-2">2. Rakip veya Bot Seç</h2>
                            <div className="flex-1 overflow-y-auto pr-2 grid grid-cols-1 sm:grid-cols-2 gap-3 content-start custom-scrollbar">
                                {players.length === 0 ? (
                                    <div className="col-span-full text-center text-gray-500 py-10"><i className="fa-solid fa-radar fa-spin text-3xl mb-2 opacity-50"></i><p className="text-sm">Odada başka oyuncu aranıyor...</p></div>
                                ) : (
                                    players.map(p => (
                                        <div key={p.id} className={`p-3 rounded-xl border flex justify-between items-center transition-colors ${p.isBot ? 'bg-indigo-900/30 border-indigo-700/50 hover:bg-indigo-900/50' : 'bg-slate-800/60 border-slate-700 hover:bg-slate-700'}`}>
                                            <div className="flex items-center gap-3 overflow-hidden">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${p.isBot ? 'bg-indigo-900 text-indigo-400 border border-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.5)]' : 'bg-slate-900 text-gray-400'}`}>
                                                    <i className={`fa-solid ${p.isBot ? 'fa-robot' : 'fa-user'}`}></i>
                                                </div>
                                                <div className="min-w-0">
                                                    <div className="font-bold text-white text-sm truncate">{p.name}</div>
                                                    <div className={`text-[10px] ${p.status === 'playing' ? 'text-rose-400' : 'text-emerald-400'}`}>{p.isBot ? 'Serbest Antrenman' : (p.status === 'playing' ? 'Oyunda' : 'Müsait')}</div>
                                                </div>
                                            </div>
                                            <button onClick={() => handleChallenge(p)} disabled={p.status === 'playing' || outgoing.length > 0} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg shrink-0 active:scale-95 transition-all">
                                                <i className="fa-solid fa-swords text-sm"></i>
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ARENA ---
        function Arena({ db, user, roomData, setView, setRoomData }) {
            const { doc, onSnapshot, updateDoc, deleteDoc } = window.FirebaseModules;
            const [matchData, setMatchData] = useState(null);
            const [showRules, setShowRules] = useState(false);

            useEffect(() => {
                if (!user || !roomData.matchId) return;
                const matchRef = doc(db, 'zeka_matches', roomData.matchId);
                const unsub = onSnapshot(matchRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setMatchData({ id: docSnap.id, ...docSnap.data() });
                    } else {
                        // Maç silinmiş (iptal edilmiş veya ayrılmış). Direkt lobiye dön.
                        leaveArenaFully();
                    }
                }, err => console.error(err));
                return () => unsub();
            }, [user, roomData.matchId]);

            const leaveArenaFully = async () => {
                if (user) await updateDoc(doc(db, 'zeka_players', user.uid), { status: 'idle' }).catch(()=>{});
                setRoomData(prev => ({...prev, matchId: null, gameId: null}));
                setView('lobby');
            };

            const handleSurrender = async () => {
                if (confirm("Oyundan çıkmak istediğinize emin misiniz?")) {
                    await deleteDoc(doc(db, 'zeka_matches', roomData.matchId));
                }
            };

            const handleResetBoard = async () => {
                if (confirm("Tahtayı başlangıç dizilimine sıfırlamak istiyor musunuz?")) {
                    const freshState = getInitialGameState(matchData.game);
                    await updateDoc(doc(db, 'zeka_matches', roomData.matchId), { gameState: freshState });
                }
            };

            const updateGameState = async (newState, nextTurn) => {
                await updateDoc(doc(db, 'zeka_matches', roomData.matchId), { gameState: newState, turn: nextTurn });
            };

            if (!matchData) return <div className="text-white text-xl animate-pulse">Arena Yükleniyor...</div>;

            const amIP1 = matchData.p1Id === user.uid;
            const isOpponentBot = amIP1 ? matchData.p2Id.startsWith('bot_') : matchData.p1Id.startsWith('bot_');
            
            const myTurn = isOpponentBot ? true : matchData.turn === user.uid; 
            const opponentName = amIP1 ? matchData.p2Name : matchData.p1Name;
            const gameInfo = GAMES.find(g => g.id === matchData.game);

            return (
                <div className="w-full max-w-5xl h-full flex flex-col max-h-[95vh] p-2">
                    {showRules && <RulesModal game={gameInfo} onClose={() => setShowRules(false)} />}
                    
                    <div className="glass-panel px-4 py-3 sm:px-6 sm:py-4 rounded-t-3xl border-b border-gray-700 flex flex-col sm:flex-row justify-between items-center bg-black/40 shrink-0 gap-3 sm:gap-0">
                        <div className="flex items-center gap-2 sm:gap-4 w-full sm:w-auto justify-between sm:justify-start">
                            <div className="flex items-center gap-2">
                                <span className={`text-${gameInfo.color} text-xl sm:text-3xl drop-shadow-[0_0_8px_currentColor]`}><i className={`fa-solid ${gameInfo.icon}`}></i></span>
                                <span className="text-lg sm:text-2xl font-bold uppercase tracking-wider text-gray-200 truncate">{gameInfo.name}</span>
                            </div>
                            <button onClick={() => setShowRules(true)} className="ml-2 text-gray-400 hover:text-white transition-colors" title="Kuralları Göster"><i className="fa-solid fa-circle-info text-lg sm:text-xl"></i></button>
                        </div>
                        <div className="flex items-center gap-2 sm:gap-4 w-full sm:w-auto justify-end">
                            <div className={`hidden md:block px-3 py-1 sm:px-6 sm:py-2 rounded-full font-bold text-xs sm:text-sm ${myTurn ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)] animate-pulse' : 'bg-gray-800 text-gray-500 border border-gray-700'}`}>
                                {isOpponentBot ? 'EĞİTİCİ SERBEST MOD' : (myTurn ? 'SIRA SENDE' : 'RAKİBİ BEKLE')}
                            </div>
                            <button onClick={handleResetBoard} className="text-amber-500 hover:text-white hover:bg-amber-600 text-xs sm:text-sm border border-amber-500/50 px-3 sm:px-4 py-1 sm:py-2 rounded-lg transition-colors" title="Tahtayı Temizle/Sıfırla">
                                <i className="fa-solid fa-rotate-left mr-1"></i>Sıfırla
                            </button>
                            <button onClick={handleSurrender} className="text-rose-500 hover:text-white hover:bg-rose-600 text-xs sm:text-sm border border-rose-500/50 px-3 sm:px-4 py-1 sm:py-2 rounded-lg transition-colors">
                                Çıkış Yap
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 glass-panel rounded-b-3xl relative flex flex-col items-center justify-center p-2 sm:p-4 overflow-y-auto overflow-x-hidden bg-gradient-to-b from-transparent to-black/50 custom-scrollbar">
                        {matchData.winner && (
                            <div className="absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center backdrop-blur-sm p-4 text-center rounded-b-3xl">
                                <h2 className="text-4xl sm:text-6xl font-black text-amber-400 drop-shadow-[0_0_20px_#f59e0b] mb-4">OYUN BİTTİ</h2>
                                <p className="text-xl sm:text-2xl text-white mb-8">Kazanan: {matchData.winner === user.uid ? 'SEN' : opponentName}</p>
                                <button onClick={handleSurrender} className="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-gray-200 shadow-lg">Lobilye Dön</button>
                            </div>
                        )}

                        {matchData.game === 'satranc' && <BoardSatranc s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} isBot={isOpponentBot} />}
                        {matchData.game === 'mangala' && <BoardMangala s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} isBot={isOpponentBot} />}
                        {matchData.game === 'abluka' && <BoardAbluka s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'pentagon' && <BoardPentagon s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'kure' && <BoardKure s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'kulami' && <BoardKulami s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'motif' && <BoardMotif s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                        {matchData.game === 'equilibrio' && <BoardEquilibrio s={matchData.gameState} up={updateGameState} p1={amIP1} trn={myTurn} t1={matchData.p1Id} t2={matchData.p2Id} />}
                    </div>
                </div>
            );
        }

        // --- OYUN TAHTALARI ---
        const btnClass = "bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-xl text-white mt-6 font-bold shadow-lg transition-colors border border-slate-500";
        const trnNext = (p1, t1, t2) => p1 ? t2 : t1;

        function BoardSatranc({s, up, p1, trn, t1, t2, isBot}) {
            const icons = {'r':'fa-chess-rook','n':'fa-chess-knight','b':'fa-chess-bishop','q':'fa-chess-queen','k':'fa-chess-king','p':'fa-chess-pawn','R':'fa-chess-rook text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]','N':'fa-chess-knight text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]','B':'fa-chess-bishop text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]','Q':'fa-chess-queen text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]','K':'fa-chess-king text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]','P':'fa-chess-pawn text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]'};
            const clk = (r,c) => {
                if(!trn) return;
                const piece = s.board[r][c];
                const isMyPiece = isBot ? !!piece : (piece && (p1 ? piece===piece.toUpperCase() : piece===piece.toLowerCase()));

                if(s.sel) {
                    if(s.sel[0]===r && s.sel[1]===c) { up({...s, sel:null}, trn?t1:t2); return; } 
                    if(isMyPiece && !isBot) { up({...s, sel:[r,c]}, trn?t1:t2); return; }
                    let nb = s.board.map(x=>[...x]); nb[r][c] = nb[s.sel[0]][s.sel[1]]; nb[s.sel[0]][s.sel[1]] = null;
                    up({board: nb, sel:null}, isBot ? t1 : trnNext(p1, t1, t2));
                } else { if(isMyPiece) up({...s, sel:[r,c]}, trn?t1:t2); } 
            };
            const disp = (p1 || isBot) ? s.board : [...s.board].reverse().map(row=>[...row].reverse());
            return (
                <div className="flex flex-col items-center max-w-full overflow-x-auto pb-4 custom-scrollbar">
                    <div className="wood-board p-2 sm:p-4 rounded-xl shadow-2xl relative bg-wood-800 min-w-max">
                        <div className="grid grid-cols-8 border-4 border-[#2a170b] shadow-wood-inset">
                            {disp.map((row, rowIdx) => row.map((cell, colIdx) => {
                                const r = (p1 || isBot) ? rowIdx : 7 - rowIdx;
                                const c = (p1 || isBot) ? colIdx : 7 - colIdx;
                                const hl = s.sel && s.sel[0]===r && s.sel[1]===c;
                                return <div key={`${r}-${c}`} onClick={()=>clk(r,c)} className={`w-10 h-10 sm:w-14 sm:h-14 md:w-16 md:h-16 flex items-center justify-center text-2xl sm:text-4xl cursor-pointer ${(r+c)%2===0?'bg-[#f0d9b5]':'bg-[#b58863]'} ${hl?'ring-4 ring-inset ring-rose-500 bg-rose-400/50':''} hover:brightness-110 transition-all`}>{cell && <i className={`fa-solid ${icons[cell]} text-slate-900 ${hl?'animate-bounce':''}`}></i>}</div>
                            }))}
                        </div>
                    </div>
                </div>
            )
        }

        function BoardMangala({s, up, p1, trn, t1, t2, isBot}) {
            const clk = (i) => {
                if(!trn || s.board[i]===0) return; 
                if(!isBot) { if(p1 && (i<0 || i>5)) return; if(!p1 && (i<7 || i>12)) return; }
                
                let nb = [...s.board]; let st = nb[i]; nb[i]=0; let curr=i;
                if(st>1) { nb[curr]=1; st--; }
                while(st>0) { 
                    curr=(curr+1)%14; 
                    const isMySide = isBot ? (i<=5) : p1;
                    if((isMySide && curr===13) || (!isMySide && curr===6)) continue; 
                    nb[curr]++; st--; 
                }
                up({board: nb}, isBot ? t1 : trnNext(p1, t1, t2));
            };
            const pit = (i, isT=false) => {
                const count = s.board[i];
                const stones = Array.from({length: Math.min(count, 15)});
                return (
                    <div onClick={()=>clk(i)} className={`relative flex flex-wrap justify-center items-center gap-[2px] bg-wood-900 shadow-wood-inset border-2 cursor-pointer ${isT?'w-16 h-40 sm:w-20 sm:h-56 rounded-full':'w-12 h-12 sm:w-16 sm:h-16 rounded-full'} border-[#2a170b] hover:border-cyan-500 hover:shadow-neon-cyan transition-all`}>
                        <div className="absolute -top-2 -right-2 bg-black/80 text-white text-[10px] sm:text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center border border-gray-600 z-10">{count}</div>
                        {stones.map((_,idx)=><div key={idx} className="w-2 h-2 sm:w-3 sm:h-3 rounded-full bg-gradient-to-br from-gray-200 to-gray-500 shadow-sm stone-drop"></div>)}
                    </div>
                )
            };
            const top = p1 ? [12,11,10,9,8,7] : [5,4,3,2,1,0];
            const bot = p1 ? [0,1,2,3,4,5] : [7,8,9,10,11,12];
            return (
                <div className="flex flex-col items-center w-full max-w-full overflow-x-auto pb-4 custom-scrollbar">
                    <div className="wood-board p-4 sm:p-8 rounded-[50px] flex items-center gap-4 sm:gap-6 relative min-w-max">
                        <div className="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent pointer-events-none rounded-[50px]"></div>
                        {pit(p1?13:6,true)}
                        <div className="flex flex-col gap-4 sm:gap-6 justify-center">
                            <div className="flex gap-2 sm:gap-4">{top.map(i=>pit(i))}</div>
                            <div className="h-1 bg-[#2a170b] rounded w-full opacity-50 shadow-[0_1px_0_rgba(255,255,255,0.1)]"></div>
                            <div className="flex gap-2 sm:gap-4">{bot.map(i=>pit(i))}</div>
                        </div>
                        {pit(p1?6:13,true)}
                    </div>
                </div>
            )
        }

        function BoardAbluka({s, up, p1, trn, t1, t2}) {
            const clk = (i) => {
                if(!trn || s.grid[i]==='block' || i===s.p1Pos || i===s.p2Pos) return;
                const mPos = p1 ? s.p1Pos : s.p2Pos;
                const isAdj = Math.abs(Math.floor(mPos/5)-Math.floor(i/5))<=1 && Math.abs((mPos%5)-(i%5))<=1;
                let nb = [...s.grid];
                if(s.phase==='move' && isAdj) { up({...s, [p1?'p1Pos':'p2Pos']: i, phase:'wall'}, p1?t1:t2); }
                else if(s.phase==='wall') { nb[i]='block'; up({...s, grid: nb, phase:'move'}, trnNext(p1, t1, t2)); }
            };
            return (
                <div className="flex flex-col items-center w-full max-w-full overflow-x-auto">
                    <div className="grid grid-cols-5 gap-1 sm:gap-2 p-2 sm:p-4 bg-slate-900 border-4 border-slate-700 rounded-xl shadow-[0_0_30px_rgba(0,0,0,0.8)] min-w-max">
                        {s.grid.map((c,i) => (
                            <div key={i} onClick={()=>clk(i)} className={`w-14 h-14 sm:w-20 sm:h-20 flex justify-center items-center text-3xl cursor-pointer rounded-lg border transition-all ${c==='block'?'bg-amber-600/30 border-amber-500/50 shadow-[inset_0_0_10px_rgba(245,158,11,0.2)]':'bg-slate-800 border-slate-700 hover:bg-slate-700 hover:border-white'}`}>
                                {c==='block' && <div className="w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-20"></div>}
                                {i===s.p1Pos && <i className="fa-solid fa-user-ninja text-cyan-400 drop-shadow-[0_0_10px_#0ff] animate-bounce"></i>}
                                {i===s.p2Pos && <i className="fa-solid fa-user-astronaut text-rose-400 drop-shadow-[0_0_10px_#e11d48] animate-bounce"></i>}
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function BoardPentagon({s, up, p1, trn, t1, t2}) {
            const place = (i) => {
                if(!trn || s.b[i]!==0) return;
                let nb = [...s.b]; nb[i] = p1 ? 1 : 2;
                up({...s, b: nb}, p1?t1:t2); 
            };
            const rot = (qIdx) => {
                if(!trn) return;
                let nq = [...s.quads]; nq[qIdx] = (nq[qIdx] + 90) % 360;
                up({...s, quads: nq}, trnNext(p1, t1, t2));
            };
            const quadCells = [[0,1,2,6,7,8,12,13,14], [3,4,5,9,10,11,15,16,17], [18,19,20,24,25,26,30,31,32], [21,22,23,27,28,29,33,34,35]];
            return (
                <div className="flex flex-col items-center">
                    <div className="bg-rose-900 p-3 sm:p-5 rounded-2xl border-4 border-rose-700 grid grid-cols-2 gap-3 shadow-neon-rose">
                        {[0,1,2,3].map(qId => (
                            <div key={qId} className="relative p-2 bg-black/30 rounded-xl border border-rose-950">
                                <div className="grid grid-cols-3 gap-2 transition-transform duration-700 ease-in-out" style={{transform:`rotate(${s.quads[qId]}deg)`}}>
                                    {quadCells[qId].map(cId => (
                                        <div key={cId} onClick={()=>place(cId)} className="w-10 h-10 sm:w-14 sm:h-14 bg-rose-800 rounded-full shadow-wood-inset border border-rose-900 flex justify-center items-center cursor-pointer hover:bg-rose-700">
                                            {s.b[cId]===1 && <div className="w-6 h-6 sm:w-8 sm:h-8 bg-cyan-400 rounded-full shadow-[0_0_10px_#0ff] stone-drop"></div>}
                                            {s.b[cId]===2 && <div className="w-6 h-6 sm:w-8 sm:h-8 bg-amber-400 rounded-full shadow-[0_0_10px_#fbbf24] stone-drop"></div>}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>rot(qId)} className="absolute -bottom-4 -right-4 bg-slate-800 text-white rounded-full w-10 h-10 z-10 hover:bg-slate-600 shadow-lg border border-slate-600 transition-transform active:rotate-90"><i className="fa-solid fa-rotate-right"></i></button>
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function BoardKure({s, up, p1, trn, t1, t2}) {
            const clk = (i) => {
                if(!trn) return;
                let nb = [...s.b];
                if(nb[i] === 0) nb[i] = p1 ? 1 : 2;
                else if(nb[i] === (p1?1:2)) nb[i] = 0;
                else nb[i] = p1 ? 1 : 2;
                up({...s, b: nb}, trnNext(p1, t1, t2));
            };
            return (
                <div className="bg-slate-800 p-4 sm:p-8 rounded-full border-8 border-slate-900 shadow-neon-cyan">
                    <div className="grid grid-cols-7 gap-2 sm:gap-3">
                        {s.b.map((c,i) => (
                            <div key={i} onClick={()=>clk(i)} className="w-10 h-10 sm:w-12 sm:h-12 bg-slate-700 rounded-full shadow-inner flex justify-center items-center cursor-pointer hover:bg-slate-600 transition-colors">
                                {c===1 && <div className="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-br from-cyan-300 to-cyan-600 rounded-full shadow-[0_0_10px_#0ff] stone-drop"></div>}
                                {c===2 && <div className="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-br from-rose-300 to-rose-600 rounded-full shadow-[0_0_10px_#e11d48] stone-drop"></div>}
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function BoardKulami({s, up, p1, trn, t1, t2}) {
            const clk = (i) => {
                if(!trn || s.b[i]!==0) return;
                let nb = [...s.b]; nb[i] = p1 ? 1 : 2;
                up({...s, b: nb}, trnNext(p1, t1, t2));
            };
            return (
                <div className="bg-amber-900 p-4 sm:p-6 rounded-2xl shadow-neon-amber border-4 border-amber-950">
                    <div className="grid grid-cols-8 gap-1 bg-black/50 p-2 rounded-xl">
                        {s.b.map((c,i) => (
                            <div key={i} onClick={()=>clk(i)} className="w-8 h-8 sm:w-12 sm:h-12 bg-amber-800 border-b-4 border-r-4 border-amber-950 flex justify-center items-center cursor-pointer hover:bg-amber-700 transition-all active:border-0 active:mt-1 active:ml-1 rounded">
                                {c===1 && <div className="w-5 h-5 sm:w-8 sm:h-8 bg-red-600 rounded-full shadow-md stone-drop"></div>}
                                {c===2 && <div className="w-5 h-5 sm:w-8 sm:h-8 bg-black rounded-full shadow-md stone-drop border border-gray-800"></div>}
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function BoardMotif({s, up, p1, trn, t1, t2}) {
            const colors = ['bg-slate-800', 'bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-400'];
            const clk = (i) => {
                if(!trn) return;
                let key = p1 ? 'p1' : 'p2';
                let ng = [...s[key]]; ng[i] = (ng[i] + 1) % 5;
                up({...s, [key]: ng}, p1?t1:t2); 
            };
            const finish = () => up(s, trnNext(p1, t1, t2)); 
            const Grid3x3 = ({arr, onClick}) => (
                <div className="grid grid-cols-3 gap-2 p-3 bg-white/10 rounded-xl border border-white/20">
                    {arr.map((c,i) => <div key={i} onClick={()=>onClick&&onClick(i)} className={`w-12 h-12 sm:w-16 sm:h-16 ${colors[c]} rounded-lg cursor-pointer border-2 border-white/30 transition-colors shadow-inner`}></div>)}
                </div>
            );
            return (
                <div className="flex flex-col items-center gap-8">
                    <div className="text-center bg-black/40 p-4 rounded-2xl border border-green-500/30 shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                        <h3 className="text-neon-green font-bold mb-3 tracking-widest text-xl">HEDEF MOTİF</h3>
                        <Grid3x3 arr={s.target} />
                    </div>
                    <div className="flex flex-col sm:flex-row gap-8 items-center sm:items-end">
                        <div className={`opacity-${p1?100:50} text-center transition-opacity`}><div className="mb-2 text-sm font-bold text-cyan-400">Senin Panelin</div><Grid3x3 arr={p1?s.p1:s.p2} onClick={clk}/></div>
                        <div className={`opacity-${!p1?100:50} text-center transition-opacity hidden sm:block`}><div className="mb-2 text-sm font-bold text-rose-400">Rakip</div><Grid3x3 arr={!p1?s.p1:s.p2} /></div>
                    </div>
                    <button onClick={finish} className={btnClass}><i className="fa-solid fa-bell mr-2"></i> Hamlemi Tamamladım / Zile Bas</button>
                </div>
            )
        }

        function BoardEquilibrio({s, up, p1, trn, t1, t2}) {
            const shapes = ['w-12 h-12 bg-cyan-500 rounded-sm shadow-md', 'w-0 h-0 border-l-[24px] border-l-transparent border-r-[24px] border-r-transparent border-b-[48px] border-b-rose-500 drop-shadow-md', 'w-12 h-12 rounded-full bg-amber-500 shadow-md'];
            const addShape = (shIdx) => {
                if(!trn) return;
                let nb = [...s.b, { t: shIdx, x: Math.random()*150 - 75, y: Math.random()*-50, rot: Math.random()*60 - 30 }];
                up({...s, b: nb}, trnNext(p1, t1, t2));
            };
            return (
                <div className="flex flex-col items-center w-full">
                    <div className="w-full max-w-lg h-[350px] border-b-[12px] border-slate-600 relative bg-slate-900/60 rounded-t-3xl overflow-hidden flex flex-col-reverse items-center pb-2 shadow-inner border border-slate-700">
                        {s.b.map((bl, i) => (
                            <div key={i} className={`absolute transition-all duration-700 ease-bounce drop-shadow-2xl ${shapes[bl.t]}`} style={{transform: `translate(${bl.x}px, ${bl.y}px) rotate(${bl.rot}deg)`, bottom: `${i*40 + 10}px`}}></div>
                        ))}
                        {s.b.length===0 && <div className="text-slate-500 self-center mb-20 text-lg flex flex-col items-center"><i className="fa-solid fa-scale-balanced text-4xl mb-4 opacity-50"></i>Blokları seçerek kulenizi inşa edin</div>}
                    </div>
                    <div className="flex gap-6 mt-8 p-4 glass-panel rounded-full">
                        <button onClick={()=>addShape(0)} className="w-12 h-12 bg-cyan-500 shadow-[0_0_15px_#06b6d4] hover:scale-110 transition-transform rounded-sm"></button>
                        <button onClick={()=>addShape(1)} className="w-0 h-0 border-l-[24px] border-l-transparent border-r-[24px] border-r-transparent border-b-[48px] border-b-rose-500 drop-shadow-[0_0_15px_#e11d48] hover:scale-110 transition-transform"></button>
                        <button onClick={()=>addShape(2)} className="w-12 h-12 bg-amber-500 rounded-full shadow-[0_0_15px_#f59e0b] hover:scale-110 transition-transform"></button>
                    </div>
                    <button onClick={()=>up({...s, b:[]}, trnNext(p1, t1, t2))} className="mt-6 text-sm text-rose-400 border border-rose-500/50 hover:bg-rose-900/50 px-6 py-2 rounded-full transition-colors"><i className="fa-solid fa-bomb mr-2"></i>Kuleyi Yık (Sıfırla)</button>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
