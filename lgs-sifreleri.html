<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGS Yolunda Geleceğin Mimarı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* === ÖZEL ANİMASYONLAR VE STİLLER === */
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden; 
            touch-action: none; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-shape {
            position: absolute;
            filter: blur(60px);
            z-index: 0;
            opacity: 0.6;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.1); }
        }

        .title-glow { text-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            position: relative;
            z-index: 10;
        }

        .puzzle-board {
            width: 300px;
            height: 300px;
            background-color: rgba(255, 255, 255, 0.4);
            border: 3px dashed #60a5fa;
            border-radius: 12px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .puzzle-slot {
            width: 100px;
            height: 100px;
            position: absolute;
            box-sizing: border-box;
            border: 1px solid rgba(147, 197, 253, 0.4);
        }

        .puzzle-piece {
            width: 100px;
            height: 100px;
            position: absolute;
            cursor: grab;
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
            border-radius: 8px;
            transition: transform 0.1s;
            touch-action: none;
            z-index: 20;
        }

        .puzzle-piece:active {
            cursor: grabbing;
            transform: scale(1.08) rotate(2deg);
            z-index: 50;
            box-shadow: 0 15px 25px rgba(0,0,0,0.25);
        }

        .puzzle-piece.snapped {
            cursor: default;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5 !important;
            box-shadow: none;
            border-radius: 0;
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes sparkle {
            0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: scale(2.5) rotate(90deg); opacity: 0; }
        }
        .sparkle-effect {
            position: absolute;
            width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(250,204,21,0.9) 0%, rgba(250,204,21,0) 60%);
            animation: sparkle 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 25;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake-error {
            animation: shake 0.4s ease-in-out;
            background-color: #fef2f2 !important; 
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        .correct-flash {
            background-color: #f0fdf4 !important; 
            border-color: #22c55e !important;
            color: #166534 !important;
            transform: scale(1.03);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.2);
        }

        .toast-msg {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f59e0b;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
            animation: toastPop 1s ease-in-out forwards;
        }

        @keyframes toastPop {
            0% { opacity: 0; transform: translate(-50%, -20px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -80px) scale(0.9); }
        }

        @keyframes pulse-text {
            0% { transform: scale(1); text-shadow: 0 0 15px rgba(239, 68, 68, 0.8); }
            50% { transform: scale(1.05); text-shadow: 0 0 30px rgba(34, 197, 94, 0.8), 0 0 40px rgba(234, 179, 8, 0.8); }
            100% { transform: scale(1); text-shadow: 0 0 15px rgba(59, 130, 246, 0.8); }
        }
        .finale-text {
            animation: pulse-text 2s infinite;
            background: linear-gradient(135deg, #ef4444, #3b82f6, #22c55e, #eab308);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 900;
        }
        
        /* --- KARNE PANOSU --- */
        .karne-kutu {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
            font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: #fff;
            width: 100%;
            max-width: 450px;
            z-index: 50;
        }
        .karne-satir { margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
        .yildizlar { color: #facc15; font-size: 1.5rem; text-shadow: 0 0 10px rgba(250, 204, 21, 0.8); letter-spacing: 2px;}

        canvas#confetti-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="bg-shape bg-blue-300 w-96 h-96 -top-20 -left-20"></div>
    <div class="bg-shape bg-purple-300 w-80 h-80 bottom-10 -right-10" style="animation-delay: -5s;"></div>

    <div id="game-screen" class="hidden">
        <div class="glass-panel px-8 py-4 rounded-2xl mb-6 text-center z-10">
            <h2 class="text-3xl font-black text-blue-600 drop-shadow-sm" id="game-title">Parçaları Birleştir</h2>
            <p id="puzzle-progress" class="text-slate-500 font-bold mt-1 bg-white/50 inline-block px-4 py-1 rounded-full">0 / 9 Parça</p>
        </div>
        </div>

    <div id="quiz-screen" class="hidden absolute inset-0 flex items-center justify-center bg-slate-900/60 backdrop-blur-md z-40 p-4">
        <div class="glass-panel rounded-3xl w-full max-w-2xl overflow-hidden flex flex-col transform transition-all">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-6 text-center relative shadow-md">
                <h3 class="text-3xl font-black" id="quiz-student-name">Tebrikler!</h3>
                <p class="text-blue-100 mt-1 font-semibold opacity-90">Şimdi LGS Şifrelerini Çözme Vakti</p>
                <div class="absolute bottom-0 left-0 h-1.5 bg-green-400 transition-all duration-500 rounded-r-full" id="progress-bar" style="width: 0%"></div>
            </div>
            
            <div class="p-6 md:p-8 flex-1 bg-white/90">
                <div class="flex justify-between items-center mb-6">
                    <span class="bg-blue-100 text-blue-700 text-sm font-bold px-4 py-1.5 rounded-full uppercase tracking-wider shadow-sm" id="question-counter">Soru 1 / 13</span>
                </div>
                <h4 class="text-xl md:text-2xl font-bold text-slate-800 mb-8 leading-relaxed" id="question-text">Soru metni buraya gelecek...</h4>
                
                <div class="space-y-4" id="options-container">
                    </div>
            </div>
        </div>
    </div>

    <div id="celebration-screen" class="hidden absolute inset-0 flex items-center justify-center bg-slate-900/90 backdrop-blur-sm z-[100] text-center p-4 flex-col">
        <canvas id="confetti-canvas"></canvas>
        <div class="relative z-10 flex flex-col items-center w-full">
            <h1 class="text-6xl md:text-8xl finale-text mb-4 uppercase tracking-tight drop-shadow-2xl" id="finale-message">HARİKASIN!</h1>
            <p class="text-2xl md:text-4xl text-blue-100 font-bold mb-6 drop-shadow-lg">LGS YOLUNDA GELECEĞİN MİMARI SENSİN!</p>
            
            <div id="karne-alani" class="flex justify-center w-full mb-8 px-4"></div>

            <button onclick="location.reload()" class="bg-gradient-to-r from-green-400 to-emerald-500 text-white font-black py-4 px-10 rounded-full shadow-[0_0_30px_rgba(34,197,94,0.5)] hover:scale-110 hover:shadow-[0_0_50px_rgba(34,197,94,0.8)] transition-all duration-300 text-xl border-2 border-white/50">Tekrar Oyna</button>
        </div>
    </div>

    <script>
        // --- SES MOTORU (Dahili Sentezleyici) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'snap') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } 
            else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
            else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
            else if (type === 'win') {
                [400, 500, 600, 800].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.2, now + i*0.15);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i*0.15 + 0.3);
                    o.start(now + i*0.15);
                    o.stop(now + i*0.15 + 0.3);
                });
            }
        }

        // --- GLOBAL DEĞİŞKENLER & ÖĞRENCİ VERİSİ ---
        let currentStudent = {
            ad: "LGS Şampiyonu", 
            resim: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=600&auto=format&fit=crop", 
            sorular: [
                {
                    soru: "Eğik düzlem, kuvvetten kazanç sağlarken yoldan kayba neden olur. Buna göre aşağıdaki basit makinelerden hangisinde *kesinlikle* kuvvet kazancı vardır?",
                    cevaplar: ["A) Sabit makara", "B) Hareketli makara", "C) Eşit kollu terazi", "D) Maşa"],
                    dogruCevap: "B) Hareketli makara"
                },
                {
                    soru: "Ot -> Çekirge -> Kurbağa -> Yılan -> Kartal besin zincirinde, kurbağa sayısının hızla azalması durumunda aşağıdakilerden hangisinin gerçekleşmesi beklenir?",
                    cevaplar: ["A) Çekirge sayısı azalır", "B) Yılan sayısı artar", "C) Ot sayısı azalır", "D) Kartal sayısı artar"],
                    dogruCevap: "C) Ot sayısı azalır"
                },
                {
                    soru: "Lozan Barış Antlaşması'nda kapitülasyonların kesin olarak kaldırılması, Atatürk'ün hangi ilkesiyle doğrudan ilişkilidir?",
                    cevaplar: ["A) Laiklik", "B) Milliyetçilik", "C) Devletçilik", "D) İnkılapçılık"],
                    dogruCevap: "B) Milliyetçilik"
                },
                {
                    soru: "Cumhuriyetin ilk yıllarında bulaşıcı hastalıklarla mücadele etmek ve aşı üretmek amacıyla kurulan kurum aşağıdakilerden hangisidir?",
                    cevaplar: ["A) Kızılay", "B) Yeşilay", "C) Hıfzıssıhha Enstitüsü", "D) Türk Eğitim Vakfı"],
                    dogruCevap: "C) Hıfzıssıhha Enstitüsü"
                }
            ]
        };

        let puzzlePieces = [];
        let snappedCount = 0;
        const GRID_SIZE = 3; 
        const PIECE_SIZE = 100; 
        const BOARD_SIZE = 300;
        let currentQuestionIndex = 0;
        
        // Karne verileri
        let startTime = 0;
        let wrongAttempts = 0;

        const motivations = ["Harika gidiyorsun!", "Süper Zeka!", "Müthiş!", "Aynen Devam!", "LGS Seni Bekler!"];

        // --- DOĞRUDAN OYUNU BAŞLATMA ---
        document.addEventListener('DOMContentLoaded', () => {
            startMission();
        });

        function startMission() {
            startTime = Date.now(); // Kronometre başlar
            const gameScreen = document.getElementById('game-screen');
            gameScreen.classList.remove('hidden');
            updateProgressText();
            createPuzzleBoard();
        }

        function updateProgressText() {
            document.getElementById('puzzle-progress').innerText = `${snappedCount} / ${GRID_SIZE * GRID_SIZE} Parça`;
        }

        function createPuzzleBoard() {
            const gameScreen = document.getElementById('game-screen');
            snappedCount = 0;
            updateProgressText();
            
            const oldBoard = document.querySelector('.puzzle-board');
            if(oldBoard) oldBoard.remove();
            const oldPieces = document.querySelectorAll('.puzzle-piece');
            oldPieces.forEach(p => p.remove());

            const board = document.createElement('div');
            board.className = 'puzzle-board';
            
            let piecesData = [];

            for(let row = 0; row < GRID_SIZE; row++) {
                for(let col = 0; col < GRID_SIZE; col++) {
                    const id = `piece-${row}-${col}`;
                    const targetX = col * PIECE_SIZE;
                    const targetY = row * PIECE_SIZE;

                    const slot = document.createElement('div');
                    slot.className = 'puzzle-slot';
                    slot.style.left = `${targetX}px`;
                    slot.style.top = `${targetY}px`;
                    board.appendChild(slot);

                    piecesData.push({ id, row, col, targetX, targetY });
                }
            }

            gameScreen.appendChild(board);
            
            piecesData.forEach(data => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.id = data.id;
                
                piece.style.backgroundImage = `url(${currentStudent.resim})`;
                piece.style.backgroundSize = `${BOARD_SIZE}px ${BOARD_SIZE}px`;
                piece.style.backgroundPosition = `-${data.targetX}px -${data.targetY}px`;

                const margin = 20;
                const topOffset = 180; 
                const maxX = window.innerWidth - PIECE_SIZE - margin;
                const maxY = window.innerHeight - PIECE_SIZE - margin;
                
                const randomX = Math.max(margin, Math.random() * maxX);
                const randomY = Math.max(topOffset, Math.random() * maxY);

                piece.style.left = `${randomX}px`;
                piece.style.top = `${randomY}px`;
                
                piece.dataset.targetX = data.targetX;
                piece.dataset.targetY = data.targetY;

                gameScreen.appendChild(piece);
                makeDraggable(piece, board);
            });
        }

        function makeDraggable(piece, board) {
            let isDragging = false;
            let startX, startY;
            let initialLeft, initialTop;

            piece.addEventListener('pointerdown', (e) => {
                initAudio(); // Ekrana ilk dokunuşta sesi etkinleştirir
                if (piece.classList.contains('snapped')) return;
                
                isDragging = true;
                piece.setPointerCapture(e.pointerId);
                
                startX = e.clientX;
                startY = e.clientY;
                initialLeft = parseFloat(piece.style.left);
                initialTop = parseFloat(piece.style.top);
            });

            piece.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                piece.style.left = `${initialLeft + dx}px`;
                piece.style.top = `${initialTop + dy}px`;
            });

            piece.addEventListener('pointerup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                piece.releasePointerCapture(e.pointerId);
                
                checkSnap(piece, board);
            });
        }

        function checkSnap(piece, board) {
            const boardRect = board.getBoundingClientRect();
            const pieceRect = piece.getBoundingClientRect();
            
            const relativeX = pieceRect.left - boardRect.left;
            const relativeY = pieceRect.top - boardRect.top;
            
            const targetX = parseFloat(piece.dataset.targetX);
            const targetY = parseFloat(piece.dataset.targetY);

            const tolerance = 40; 
            
            if (Math.abs(relativeX - targetX) < tolerance && Math.abs(relativeY - targetY) < tolerance) {
                piece.style.left = `${targetX}px`;
                piece.style.top = `${targetY}px`;
                board.appendChild(piece);
                
                piece.classList.add('snapped');
                
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle-effect';
                sparkle.style.left = `${targetX}px`;
                sparkle.style.top = `${targetY}px`;
                board.appendChild(sparkle);
                
                playSound('snap'); 
                
                setTimeout(() => sparkle.remove(), 500);

                snappedCount++;
                updateProgressText();

                if (snappedCount === (GRID_SIZE * GRID_SIZE)) {
                    setTimeout(() => startQuiz(), 800);
                }
            }
        }

        // --- QUİZ MOTORU ---
        function startQuiz() {
            currentQuestionIndex = 0;
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('quiz-student-name').innerText = `Tebrikler ${currentStudent.ad}!`;
            loadQuestion();
        }

        function loadQuestion() {
            const totalQuestions = currentStudent.sorular.length;
            const q = currentStudent.sorular[currentQuestionIndex];
            
            setTimeout(() => {
                const progress = ((currentQuestionIndex) / totalQuestions) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
            }, 50);
            
            document.getElementById('question-counter').innerText = `Soru ${currentQuestionIndex + 1} / ${totalQuestions}`;
            document.getElementById('question-text').innerText = q.soru;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; 
            
            q.cevaplar.forEach(cevap => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-6 py-4 border-2 border-slate-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 hover:shadow-md font-bold text-slate-700 transition-all duration-200 focus:outline-none text-lg";
                btn.innerText = cevap;
                btn.onclick = () => checkAnswer(btn, cevap, q.dogruCevap);
                optionsContainer.appendChild(btn);
            });
        }

        function showToast() {
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerText = motivations[Math.floor(Math.random() * motivations.length)];
            document.getElementById('quiz-screen').appendChild(toast);
            setTimeout(() => toast.remove(), 1000);
        }

        function checkAnswer(btn, secilen, dogru) {
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => b.disabled = true);

            if (secilen === dogru) {
                btn.classList.add('correct-flash');
                playSound('correct');
                showToast();

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < currentStudent.sorular.length) {
                        loadQuestion();
                    } else {
                        triggerFinale();
                    }
                }, 1000);
            } else {
                wrongAttempts++; // Hata sayacı artar
                btn.classList.add('shake-error');
                playSound('wrong');
                
                setTimeout(() => {
                    btn.classList.remove('shake-error');
                    allBtns.forEach(b => b.disabled = false); 
                }, 600);
            }
        }

        // --- FİNAL KUTLAMASI VE KARNE HESAPLAMA ---
        function triggerFinale() {
            document.getElementById('quiz-screen').classList.add('hidden');
            const finaleScreen = document.getElementById('celebration-screen');
            finaleScreen.classList.remove('hidden');
            
            const msg = document.getElementById('finale-message');
            msg.innerText = `HARİKASIN ${currentStudent.ad}!`;

            // Karne Hesaplama Motoru
            const sureSaniye = Math.floor((Date.now() - startTime) / 1000);
            let yildiz = "⭐⭐⭐";
            if(wrongAttempts === 1 || wrongAttempts === 2) yildiz = "⭐⭐";
            if(wrongAttempts > 2) yildiz = "⭐";

            const karneHTML = `
                <div class="karne-kutu">
                    <h3 style="color: #93c5fd; text-align: center; margin-top: 0; font-weight: 900; font-size: 1.5rem; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 10px;">📊 LGS GÖREV KARNESİ</h3>
                    <div class="karne-satir">⏱️ Görev Süresi: <b style="float:right;">${sureSaniye} Saniye</b></div>
                    <div class="karne-satir">❌ Hatalı Deneme: <b style="float:right; color: #fca5a5;">${wrongAttempts}</b></div>
                    <div class="karne-satir" style="border:none; text-align: center; margin-top: 15px;">
                        <span style="display:block; font-size: 1rem; color: #cbd5e1; mb-2">Başarı Puanı</span>
                        <span class="yildizlar">${yildiz}</span>
                    </div>
                </div>
            `;
            document.getElementById('karne-alani').innerHTML = karneHTML;

            playSound('win');
            startConfetti();
        }

        // --- GELİŞMİŞ CONFETTI MOTORU ---
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#fde047', '#3b82f6', '#ef4444', '#22c55e', '#a855f7', '#ec4899', '#06b6d4'];

            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 12 + 6,
                    h: Math.random() * 6 + 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedY: Math.random() * 4 + 2,
                    speedX: Math.random() * 3 - 1.5,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 12 - 6
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.save();
                    ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
                    ctx.rotate((p.rotation * Math.PI) / 180);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.roundRect(-p.w / 2, -p.h / 2, p.w, p.h, 2);
                    ctx.fill();
                    ctx.restore();

                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.rotationSpeed;

                    if (p.y > canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(draw);
            }
            draw();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }
    </script>
</body>
