<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konuşma ve Dil Egzersizleri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            -webkit-tap-highlight-color: transparent;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulse-icon {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-green-500 text-white p-4 shadow-md z-10 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="goHome()">
            <div class="bg-white text-green-500 rounded-full w-10 h-10 flex items-center justify-center text-xl shadow-inner">
                <i class="fa-solid fa-comments"></i>
            </div>
            <h1 class="text-xl sm:text-2xl font-bold tracking-wide">Konuşma Atölyesi</h1>
        </div>
        <div class="flex items-center gap-2 bg-green-600 px-3 sm:px-4 py-2 rounded-full font-bold shadow-inner text-sm sm:text-base">
            <i class="fa-solid fa-star text-yellow-300 pulse-icon"></i>
            <span id="scoreDisplay">0</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="mainContainer" class="flex-1 overflow-y-auto p-4 sm:p-8 flex flex-col">
        
        <!-- Dashboard / Categories -->
        <div id="dashboard" class="max-w-4xl w-full mx-auto bounce-in">
            <h2 class="text-2xl sm:text-3xl font-bold text-center mb-8 text-green-800">Hangi çalışmayı yapalım?</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 sm:gap-6" id="categoryGrid">
                <!-- Kategoriler JS ile buraya yüklenecek -->
            </div>
        </div>

        <!-- Activity Screen (Visual First for Non-Readers) -->
        <div id="activityScreen" class="hidden flex-1 flex flex-col items-center justify-center max-w-3xl w-full mx-auto">
            <div class="w-full flex justify-between items-center mb-4">
                <button onclick="goHome()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> Geri
                </button>
                <div class="text-green-600 font-bold text-lg" id="progressIndicator">1 / 5</div>
            </div>

            <!-- Yenilenmiş Görsel Odaklı Kart -->
            <div class="bg-white rounded-[3rem] shadow-2xl p-6 sm:p-12 w-full text-center border-8 border-green-100 bounce-in flex flex-col items-center relative">
                
                <!-- Sadece Hoca İçin Yönerge Metni -->
                <p class="text-gray-400 text-xs sm:text-sm font-semibold mb-2 uppercase tracking-wider">Öğretmen Yönergesi</p>
                <h3 id="activityText" class="text-lg sm:text-xl font-bold text-gray-500 mb-6 w-full px-4 min-h-[3rem]">
                    <!-- Soru metni buraya gelecek -->
                </h3>
                
                <!-- Öğrencinin Odaklanacağı Devasa İkon -->
                <div id="activityIcon" class="text-[8rem] sm:text-[12rem] mb-10 text-green-500 pulse-icon drop-shadow-xl transition-all duration-300">
                    <!-- İkon buraya gelecek -->
                </div>
                
                <!-- Sadece İkonlardan Oluşan Dev Butonlar -->
                <div class="flex gap-6 sm:gap-10 w-full justify-center">
                    <!-- Sesli Okuma / Dinle (Kocaman hoparlör) -->
                    <button onclick="readAloud()" class="bg-blue-500 hover:bg-blue-600 text-white w-20 h-20 sm:w-28 sm:h-28 rounded-full shadow-lg transition transform hover:scale-110 flex items-center justify-center border-4 border-blue-300 active:bg-blue-700">
                        <i class="fa-solid fa-volume-high text-4xl sm:text-5xl"></i>
                    </button>
                    
                    <!-- Geçiş / Başarı (Kocaman yıldız) -->
                    <button onclick="nextActivity()" class="bg-green-500 hover:bg-green-600 text-white w-20 h-20 sm:w-28 sm:h-28 rounded-full shadow-lg transition transform hover:scale-110 flex items-center justify-center border-4 border-green-300 active:bg-green-700">
                        <i class="fa-solid fa-star text-4xl sm:text-5xl text-yellow-300"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Completion Modal -->
        <div id="completionModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center bounce-in relative overflow-hidden">
                <div class="absolute -top-10 -right-10 text-yellow-300 opacity-20 text-9xl">
                    <i class="fa-solid fa-star"></i>
                </div>
                <div class="text-6xl mb-4 text-yellow-400 pulse-icon">
                    <i class="fa-solid fa-trophy"></i>
                </div>
                <h2 class="text-3xl font-bold text-green-600 mb-2">Muhteşem!</h2>
                <p class="text-lg text-gray-600 mb-6">Bu bölümü harika tamamladın!</p>
                <button onclick="goHome()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition transform hover:scale-105">
                    Yeni Oyun Seç
                </button>
            </div>
        </div>

    </main>

    <!-- Ses Efektleri -->
    <audio id="successSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3"></audio>

    <script>
        // Veritabanı / İçerikler
        const db = [
            {
                id: "nefes",
                title: "Nefes Egzersizleri",
                icon: "fa-wind",
                color: "bg-blue-100",
                textColor: "text-blue-500",
                items: [
                    { text: "Derin bir nefes al ve burnundan yavaşça ver.", icon: "fa-lungs" },
                    { text: "Hayali bir mumu oflayarak üfle!", icon: "fa-fire" },
                    { text: "Kocaman bir balon şişirelim!", icon: "fa-golf-ball-tee" },
                    { text: "Çiçek koklar gibi derin nefes al.", icon: "fa-seedling" }
                ]
            },
            {
                id: "agiz_yuz",
                title: "Ağız ve Yüz (Oromotor)",
                icon: "fa-face-smile-beam",
                color: "bg-pink-100",
                textColor: "text-pink-500",
                items: [
                    { text: "Kocaman gülümse ve dişlerini göster!", icon: "fa-teeth" },
                    { text: "Yanaklarını kocaman şişir!", icon: "fa-face-flushed" },
                    { text: "Dilini dışarı çıkarıp aşağı yukarı salla.", icon: "fa-face-grin-tongue" },
                    { text: "Öpücük at! Muck!", icon: "fa-kiss-wink-heart" }
                ]
            },
            {
                id: "vucut",
                title: "Vücut Taklitleri",
                icon: "fa-child-reaching",
                color: "bg-orange-100",
                textColor: "text-orange-500",
                items: [
                    { text: "Ellerini şak şak çırp!", icon: "fa-hands-clapping" },
                    { text: "Kollarını en yükseğe kaldır!", icon: "fa-hand-sparkles" },
                    { text: "Gözlerini kapat ve cee-e yap!", icon: "fa-eye" },
                    { text: "Ayaklarını yere vur. Güm Güm!", icon: "fa-shoe-prints" }
                ]
            },
            {
                id: "ritim_ses",
                title: "Ritim ve Ses Taklidi",
                icon: "fa-music",
                color: "bg-purple-100",
                textColor: "text-purple-500",
                items: [
                    { text: "Kedi gibi miyavla. Mi-yav!", icon: "fa-cat" },
                    { text: "Araba sesi çıkar. Düt düt!", icon: "fa-car" },
                    { text: "Davul çalalım. Güm güm güm!", icon: "fa-drum" },
                    { text: "Hızlıca söyle. Ba-ba-ba-ba", icon: "fa-lips" },
                    { text: "Rüzgar sesi yap. Vuuuuuu", icon: "fa-cloud" }
                ]
            },
            {
                id: "yonerge",
                title: "Yönergeler",
                icon: "fa-list-check",
                color: "bg-yellow-100",
                textColor: "text-yellow-600",
                items: [
                    { text: "Elini başına koy, sonra burnuna dokun.", icon: "fa-hand-pointer" },
                    { text: "Ayağa kalk ve etrafında dön.", icon: "fa-rotate-right" },
                    { text: "Hayali bir elma al ve ısır.", icon: "fa-apple-whole" },
                    { text: "Masaya vur ve el salla.", icon: "fa-hand" }
                ]
            },
            {
                id: "kelime",
                title: "İlk Kelimeler / Eylemler",
                icon: "fa-comment-dots",
                color: "bg-red-100",
                textColor: "text-red-500",
                items: [
                    { text: "Bana ver.", icon: "fa-hand-holding-heart" },
                    { text: "Bunu al.", icon: "fa-handshake" },
                    { text: "Kutuyu aç.", icon: "fa-box-open" },
                    { text: "Oyun bitti.", icon: "fa-circle-check" }
                ]
            }
        ];

        // State variables
        let score = 0;
        let currentCategory = null;
        let currentIndex = 0;

        // Elements
        const dashboard = document.getElementById('dashboard');
        const categoryGrid = document.getElementById('categoryGrid');
        const activityScreen = document.getElementById('activityScreen');
        const activityIcon = document.getElementById('activityIcon');
        const activityText = document.getElementById('activityText');
        const progressIndicator = document.getElementById('progressIndicator');
        const completionModal = document.getElementById('completionModal');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const successSound = document.getElementById('successSound');

        // Initialize Dashboard
        function initDashboard() {
            categoryGrid.innerHTML = '';
            db.forEach(cat => {
                const card = document.createElement('div');
                card.className = `bg-white rounded-[2rem] shadow-md p-6 cursor-pointer card-hover border-b-4 border-transparent hover:border-green-400 transition-all flex flex-col items-center justify-center text-center gap-4`;
                card.onclick = () => startCategory(cat.id);
                card.innerHTML = `
                    <div class="${cat.color} ${cat.textColor} w-24 h-24 rounded-full flex items-center justify-center text-4xl shadow-inner">
                        <i class="fa-solid ${cat.icon}"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-700">${cat.title}</h3>
                `;
                categoryGrid.appendChild(card);
            });
        }

        function startCategory(id) {
            currentCategory = db.find(c => c.id === id);
            currentIndex = 0;
            dashboard.classList.add('hidden');
            activityScreen.classList.remove('hidden');
            activityScreen.classList.add('flex');
            loadActivity();
        }

        function loadActivity() {
            const item = currentCategory.items[currentIndex];
            
            // Animasyon için sınıfları sıfırla
            activityIcon.parentElement.classList.remove('bounce-in');
            void activityIcon.parentElement.offsetWidth; // Reflow tetikleme
            activityIcon.parentElement.classList.add('bounce-in');

            activityIcon.innerHTML = `<i class="fa-solid ${item.icon} ${currentCategory.textColor}"></i>`;
            activityText.innerText = item.text;
            progressIndicator.innerText = `${currentIndex + 1} / ${currentCategory.items.length}`;
        }

        function nextActivity() {
            currentIndex++;
            if (currentIndex < currentCategory.items.length) {
                loadActivity();
            } else {
                finishCategory();
            }
        }

        function finishCategory() {
            score += 1;
            scoreDisplay.innerText = score;
            
            // Ses efekti çal
            try {
                successSound.volume = 0.5;
                successSound.currentTime = 0;
                successSound.play().catch(e => console.log("Ses oynatılamadı"));
            } catch(e){}

            activityScreen.classList.add('hidden');
            activityScreen.classList.remove('flex');
            completionModal.classList.remove('hidden');
            
            createConfetti();
        }

        function goHome() {
            completionModal.classList.add('hidden');
            activityScreen.classList.add('hidden');
            activityScreen.classList.remove('flex');
            dashboard.classList.remove('hidden');
            window.speechSynthesis.cancel();
        }

        // Text to Speech
        function readAloud() {
            const text = document.getElementById('activityText').innerText;
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'tr-TR';
                msg.rate = 0.85; // Çocuklar için daha yavaş
                msg.pitch = 1.3; // Biraz tiz ve sevecen
                window.speechSynthesis.speak(msg);
                
                // Okunurken ikonu hoplat
                activityIcon.classList.remove('pulse-icon');
                activityIcon.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    activityIcon.style.transform = 'scale(1)';
                    activityIcon.classList.add('pulse-icon');
                }, 500);

            } else {
                console.log("Tarayıcı sesli okumayı desteklemiyor.");
            }
        }

        // Basit Konfeti Efekti
        function createConfetti() {
            for(let i=0; i<50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'absolute w-4 h-4 rounded-full z-50';
                
                const colors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-400', 'bg-green-500', 'bg-pink-500', 'bg-purple-500'];
                confetti.classList.add(colors[Math.floor(Math.random() * colors.length)]);
                
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-20px';
                
                const duration = Math.random() * 3 + 2;
                confetti.style.transition = `top ${duration}s ease-in, left ${duration}s ease-in-out`;
                
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.style.top = '100vh';
                    confetti.style.left = (Math.random() * 100) + 'vw';
                }, 50);

                setTimeout(() => {
                    confetti.remove();
                }, duration * 1000);
            }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
