        // --- COMPONENTS ---

        const PresentationViewer = ({ onClose }) => {

                    default: return null;
                }

            return (

                    <div className="slide-container">

                        <div className="slide-controls">
                            <div className="text-slate-500 font-bold">{currentSlide + 1} / {PRESENTATION_SLIDES.length}</div>

                                <button onClick={nextSlide} disabled={currentSlide === PRESENTATION_SLIDES.length - 1} className="w-12 h-12 rounded-full bg-teal-500 hover:bg-teal-600 disabled:opacity-30 flex items-center justify-center text-white transition-colors shadow-lg"><i className="fa-solid fa-chevron-right"></i></button>
                            </div>

                        </div>
                        <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-100">
                            <div className="h-full bg-teal-500 transition-all duration-300" style={{width: `${((currentSlide + 1) / PRESENTATION_SLIDES.length) * 100}%`}}></div>
                        </div>
                    </div>
                </div>

        };

        const ResourceViewer = () => {
            return (
                <div className="max-w-4xl mx-auto fade-in pb-20 mt-10">
                    <h2 className="text-4xl font-black text-slate-900 mb-8 leading-tight border-b-4 border-indigo-200 w-fit pb-2"><i className="fa-solid fa-book-open-reader text-indigo-500"></i> Klinik Kütüphane</h2>
                    <p className="text-slate-600 text-lg mb-10">Floortime alanında kendinizi geliştirmek için özenle seçilmiş dökümanlar, videolar ve iletişim adresleri.</p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">

                            <ul className="space-y-4">
                                {RESOURCES_DATA.articles.map((res, i) => (

                                        </div>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    <div className="bg-gradient-to-r from-teal-500 to-sky-500 rounded-2xl shadow-lg p-8 text-white">
                        <h3 className="text-2xl font-bold mb-6 flex items-center gap-2"><i className="fa-solid fa-address-book"></i> Resmi Kurumlar & İletişim</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {RESOURCES_DATA.contacts.map((res, i) => (
                                <div key={i} className="bg-white/10 backdrop-blur-sm rounded-xl p-4 border border-white/20">
                                    <div className="text-xl mb-2"><i className={`fa-solid ${res.icon}`}></i></div>
                                    <h4 className="font-bold text-lg mb-1">{res.title}</h4>
                                    <p className="text-sm opacity-90 font-mono">{res.info}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [isFirebaseReady, setIsFirebaseReady] = useState(false);
            
            // Core States
            const [activeModuleId, setActiveModuleId] = useState(0);
            const [unlockedModules, setUnlockedModules] = useState([0]); 
            const [completedModules, setCompletedModules] = useState([]); 
            const [xp, setXp] = useState(0);
            const [quizAnswers, setQuizAnswers] = useState({}); 
            const [quizResult, setQuizResult] = useState(null); 
            
            // Views: 'course', 'presentation', 'certificate', 'resources'
            const [viewMode, setViewMode] = useState('course'); 
            
            // Config & AI
            const [aiConfig, setAiConfig] = useState({ key: localStorage.getItem('gemini_api_key') || '', model: localStorage.getItem('gemini_model') || 'gemini-1.5-flash' });
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [toast, setToast] = useState({ message: '', type: 'success', isVisible: false });
            const [isRoleplayActive, setIsRoleplayActive] = useState(false);
            const [roleplayMessages, setRoleplayMessages] = useState([]);
            const [roleplayInput, setRoleplayInput] = useState('');
            const [isRoleplayLoading, setIsRoleplayLoading] = useState(false);
            
            // TTS & PDF
            const [isSpeaking, setIsSpeaking] = useState(false);
            const synth = window.speechSynthesis || null;
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);

            const roleplayEndRef = useRef(null);
            const contentRef = useRef(null);
            const canvasRef = useRef(null);
            const [userName, setUserName] = useState('');

            const activeModule = COURSE_DATA.find(m => m.id === activeModuleId) || COURSE_DATA[0];
            const progressPercentage = Math.round((completedModules.length / COURSE_DATA.length) * 100);

            const showToast = (message, type = 'error') => {
                setToast({ message, type, isVisible: true });
                setTimeout(() => setToast(prev => ({ ...prev, isVisible: false })), 3000);
            };

            const addXp = async (amount) => {
                const newXp = xp + amount; setXp(newXp);
                showToast(`+${amount} XP Kazandınız!`, 'success');
                if (user && db) {
                    try { await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid), { xp: newXp }, { merge: true }); } catch(e) { console.error(e) }
                }
            };

            // Failsafe Firebase Init
            useEffect(() => {
                if (!auth) {
                    setIsFirebaseReady(true);
                    return;
                }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth Error", err);
                        setIsFirebaseReady(true);
                    }
                };
                initAuth();

                const unsub = onAuthStateChanged(auth, u => {
                    setUser(u);
                    setIsFirebaseReady(true);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const unsub = onSnapshot(doc(db, 'artifacts', APP_ID, 'users', user.uid), docSnap => {
                    if (docSnap.exists()) {
                        const d = docSnap.data();
                        if (d.unlockedModules) setUnlockedModules(d.unlockedModules);
                        if (d.completedModules) setCompletedModules(d.completedModules);
                        if (d.xp) setXp(d.xp);
                    }
                }, (error) => {
                    console.error("Firestore read err", error);
                });
                return () => unsub();
            }, [user]);

            useEffect(() => {
                setQuizAnswers({}); setQuizResult(null); setIsRoleplayActive(false); setRoleplayMessages([]);
                stopReading(); 
                if(contentRef.current) {
                    try { contentRef.current.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) { contentRef.current.scrollTop = 0; }
                }
            }, [activeModuleId, viewMode]);

            useEffect(() => { if(roleplayEndRef.current) { try { roleplayEndRef.current.scrollIntoView({ behavior: 'smooth' }); } catch(e) {} } }, [roleplayMessages]);

            const saveProgress = async (unlocked, completed) => {
                if (!user || !db) return;
                try {
                    await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid), { unlockedModules: unlocked, completedModules: completed }, { merge: true });
                } catch(e) { console.error(e) }
            };

            // --- 1. YERLEŞİK ÜCRETSİZ SESLENDİRME ---
            const toggleReading = () => {
                if (!synth) { showToast("Tarayıcınız seslendirmeyi desteklemiyor.", "error"); return; }
                if (isSpeaking) { synth.cancel(); setIsSpeaking(false); } 
                else {
                    const tempDiv = document.createElement("div"); tempDiv.innerHTML = activeModule.content;
                    const textToRead = activeModule.title + ". " + (tempDiv.textContent || tempDiv.innerText || "");
                    const utterance = new SpeechSynthesisUtterance(textToRead);
                    utterance.lang = 'tr-TR'; utterance.rate = 0.95;
                    utterance.onend = () => setIsSpeaking(false); utterance.onerror = () => setIsSpeaking(false);
                    synth.speak(utterance); setIsSpeaking(true);
                }
            };
            const stopReading = () => { if (synth && synth.speaking) { synth.cancel(); setIsSpeaking(false); } };

            // --- 2. MODÜLÜ PDF OLARAK İNDİR ---
            const downloadModuleAsPDF = () => {
                if (typeof window.html2pdf === 'undefined') { showToast('PDF motoru yüklenemedi. İnternetinizi kontrol edin.'); return; }
                setIsGeneratingPDF(true);
                const element = document.getElementById('module-content-to-pdf');
                const opt = {
                    margin: 0.5, filename: `Floortime_Modul_${activeModule.level}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                
                const terms = element.querySelectorAll('.term');
                terms.forEach(t => t.style.borderBottom = 'none'); // Tooltip çizgisini PDF'de gizle

                window.html2pdf().set(opt).from(element).save().then(() => {
                    terms.forEach(t => t.style.borderBottom = '2px dashed #14b8a6');
                    setIsGeneratingPDF(false);
                }).catch(e => { console.error(e); setIsGeneratingPDF(false); });
            };

            // --- 3. CANLI VAKA (ROLEPLAY) ---
            const startRoleplay = () => {
                if (!aiConfig.key) { showToast('Ayarlar menüsünden API Anahtarınızı girin.'); setIsSettingsOpen(true); return; }
                setIsRoleplayActive(true); setRoleplayMessages([{ role: 'ai', text: "*Odanın köşesinde oturuyor, ellerini kulaklarına kapatmış. Size bakmıyor.* (Terapist stratejinizi yazın)" }]);
            };
            const handleRoleplaySubmit = async (e) => {
                e.preventDefault(); if(!roleplayInput.trim() || !aiConfig.key) return;
                const userText = roleplayInput; setRoleplayMessages(prev => [...prev, { role: 'user', text: userText }]);
                setRoleplayInput(''); setIsRoleplayLoading(true);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${aiConfig.model}:generateContent?key=${aiConfig.key}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: `Terapist: "${userText}"` }] }], systemInstruction: { parts: [{ text: `Sen DIR Floortime alan 4 yaşında bir çocuksun. Modül: ${activeModule.title}. İyi hamlede regüle ol, kötüde krize gir. SADECE *eylem* ve 1-2 çocuk kelimesi yaz.` }] } }) });
                    const data = await res.json();
                    if(data.error) throw new Error();
                    setRoleplayMessages(prev => [...prev, { role: 'ai', text: data.candidates[0].content.parts[0].text }]);
                    if(roleplayMessages.length === 3) addXp(50);
                } catch (err) { setRoleplayMessages(prev => [...prev, { role: 'ai', text: "*Bağlantı koptu.*" }]); } finally { setIsRoleplayLoading(false); }
            };

            // --- 4. QUIZ ---
            const handleQuizOptionSelect = (qIndex, optionIndex) => setQuizAnswers(prev => ({ ...prev, [qIndex]: optionIndex }));
            const submitQuiz = () => {
                let correctCount = 0;
                activeModule.quiz.forEach((q, idx) => { if (quizAnswers[idx] === q.answer) correctCount++; });
                if (correctCount === activeModule.quiz.length) {
                    setQuizResult('success'); addXp(100);
                    let newCompleted = [...completedModules]; if (!completedModules.includes(activeModuleId)) newCompleted.push(activeModuleId);
                    let newUnlocked = [...unlockedModules]; if (activeModuleId + 1 < COURSE_DATA.length && !unlockedModules.includes(activeModuleId + 1)) newUnlocked.push(activeModuleId + 1);
                    setCompletedModules(newCompleted); setUnlockedModules(newUnlocked); saveProgress(newUnlocked, newCompleted);
                } else { setQuizResult('fail'); }
            };

            // --- 5. SERTİFİKA ---
            const finishCourse = (e) => {
                e.preventDefault(); if (!userName.trim()) return;
                setViewMode('certificate');
                if (typeof window.confetti === 'function') {
                    setTimeout(() => window.confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 } }), 100);
                }
                setTimeout(() => renderUltraPremiumCertificate(), 300);
            };

            const renderUltraPremiumCertificate = () => {
                const canvas = canvasRef.current; if (!canvas) return;
                const ctx = canvas.getContext('2d'); const width = 1200; const height = 850;
                canvas.width = width; canvas.height = height;

                const bgGradient = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, width);
                bgGradient.addColorStop(0, '#ffffff'); bgGradient.addColorStop(1, '#fdfbf7');
                ctx.fillStyle = bgGradient; ctx.fillRect(0, 0, width, height);

                ctx.lineWidth = 20; ctx.strokeStyle = '#0f172a'; ctx.strokeRect(30, 30, width - 60, height - 60);
                ctx.lineWidth = 4; ctx.strokeStyle = '#b45309'; ctx.strokeRect(55, 55, width - 110, height - 110);
                ctx.lineWidth = 2; ctx.strokeStyle = '#0f172a'; ctx.strokeRect(65, 65, width - 130, height - 130);

                const drawCorner = (x, y) => { ctx.beginPath(); ctx.arc(x, y, 60, 0, Math.PI * 2); ctx.fillStyle = '#0f172a'; ctx.fill(); ctx.beginPath(); ctx.arc(x, y, 45, 0, Math.PI * 2); ctx.strokeStyle = '#b45309'; ctx.lineWidth = 3; ctx.stroke(); };
                drawCorner(65, 65); drawCorner(width-65, 65); drawCorner(65, height-65); drawCorner(width-65, height-65);

                ctx.fillStyle = '#0f172a'; ctx.font = 'bold 24px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.fillText('ULUSLARARASI DİJİTAL ONAYLI', width / 2, 160);
                ctx.fillStyle = '#0f766e'; ctx.font = '900 56px Georgia, serif'; ctx.fillText('KLİNİK UYGULAYICI SERTİFİKASI', width / 2, 230);
                ctx.fillStyle = '#475569'; ctx.font = 'italic 26px Georgia, serif'; ctx.fillText('Bu belge, DIR Floortime 101 ve 201 klinik uzmanlık eğitimini başarıyla tamamlayan', width / 2, 310);
                ctx.fillStyle = '#b45309'; ctx.font = 'bold 72px Georgia, serif'; ctx.fillText(userName.toUpperCase(), width / 2, 410);

                ctx.fillStyle = '#334155'; ctx.font = '22px Inter, sans-serif';
                ctx.fillText('FEDC 1-6 Basamakları, Nöro-Gelişimsel Profil Analizi (Duyu-Motor Bütünleme),', width / 2, 490);
                ctx.fillText('İlişki Temelli Müdahale Stratejileri ve Playful Obstruction (Oyuncu Tıkanıklık)', width / 2, 530);
                ctx.fillText('tekniklerinde üstün akademik ve klinik yetkinlik göstermiştir.', width / 2, 570);

                const today = new Date().toLocaleDateString('tr-TR'); const verifyCode = `FLRT-${Math.random().toString(36).substr(2,8).toUpperCase()}`;
                ctx.font = '20px Inter, sans-serif'; ctx.fillStyle = '#0f172a';
                ctx.fillText('Veriliş Tarihi', 250, 680); ctx.font = 'bold 22px Inter'; ctx.fillText(today, 250, 715);
                ctx.beginPath(); ctx.moveTo(150, 730); ctx.lineTo(350, 730); ctx.strokeStyle = '#94a3b8'; ctx.lineWidth=2; ctx.stroke();
                ctx.font = '20px Inter, sans-serif'; ctx.fillText('Eğitim Direktörü', width - 250, 680);
                ctx.fillStyle = '#0369a1'; ctx.font = 'italic 40px "Brush Script MT", cursive, Georgia'; ctx.fillText('DIR Academy', width - 250, 720);
                ctx.beginPath(); ctx.moveTo(width - 350, 730); ctx.lineTo(width - 150, 730); ctx.strokeStyle = '#94a3b8'; ctx.lineWidth=2; ctx.stroke();

                ctx.beginPath(); ctx.arc(width/2, 690, 75, 0, Math.PI*2);
                const sealGrad = ctx.createLinearGradient(width/2-75, 615, width/2+75, 765);
                sealGrad.addColorStop(0, '#fef08a'); sealGrad.addColorStop(0.5, '#d97706'); sealGrad.addColorStop(1, '#78350f');
                ctx.fillStyle = sealGrad; ctx.fill();
                ctx.beginPath(); ctx.arc(width/2, 690, 60, 0, Math.PI*2); ctx.strokeStyle = '#fef9c3'; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px Inter'; ctx.textAlign = 'center'; ctx.fillText('CLINICAL', width/2, 680); ctx.font = '900 26px Inter'; ctx.fillText('MASTER', width/2, 710);
                ctx.fillStyle = '#64748b'; ctx.font = '16px Inter'; ctx.fillText(`Global Doğrulama Kodu: ${verifyCode}`, width/2, 810);
            };

            const downloadCertificatePDF = () => {
                if (typeof window.jspdf === 'undefined' || !window.jspdf.jsPDF) { showToast('PDF motoru yüklenemedi.', 'error'); return; }
                const canvas = canvasRef.current;
                const imgData = canvas.toDataURL('image/png');
                const pdf = new window.jspdf.jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
                pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
                pdf.save(`${userName.replace(/\s+/g, '_')}_Sertifika.pdf`);
            };

            const printCertificate = () => {
                const dataUrl = canvasRef.current.toDataURL('image/png');
                const printWin = window.open('', '', 'width=1200,height=900');
                printWin.document.open();
                printWin.document.write(`<html><head><title>Sertifika Yazdır</title></head><body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;"><img src="${dataUrl}" style="width:100%;max-width:1123px;"></body></html>`);
                printWin.document.close();
                printWin.focus();
                setTimeout(() => { printWin.print(); printWin.close(); }, 500);
            };

            if (!isFirebaseReady) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><div className="w-12 h-12 border-4 border-floortime-teal border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="flex flex-col lg:flex-row min-h-screen bg-slate-50 font-sans relative">
                    <Toast message={toast.message} type={toast.type} isVisible={toast.isVisible} />
                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} setAiConfig={setAiConfig} />

                    {viewMode === 'presentation' && <PresentationViewer onClose={() => setViewMode('course')} />}

                    {/* SIDEBAR */}
                    <aside className="w-full lg:w-[340px] lg:min-h-screen lg:sticky lg:top-0 bg-white border-r border-slate-200 flex flex-col shadow-lg z-10 print:hidden">
                        <div className="p-6 border-b border-slate-100 bg-slate-900 text-white">
                            <h1 className="text-2xl font-black tracking-tight">Floortime <span className="text-floortime-teal">Master</span></h1>
                            <div className="flex items-center gap-1 mt-2 text-amber-400 text-sm"><i className="fa-solid fa-star"></i> <span className="font-bold">{xp} Deneyim Puanı</span></div>
                            <div className="mt-4 w-full bg-slate-700 h-1.5 rounded-full overflow-hidden"><div className="bg-floortime-teal h-full transition-all duration-1000" style={{ width: `${progressPercentage}%` }}></div></div>
                            
                            <div className="grid grid-cols-2 gap-2 mt-5">
                                <button onClick={() => setViewMode('presentation')} className="bg-gradient-to-r from-teal-500 to-sky-500 hover:from-teal-400 hover:to-sky-400 text-white py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 shadow-md transform transition-transform hover:-translate-y-0.5">
                                    <i className="fa-solid fa-play"></i> Sunum
                                </button>
                                <button onClick={() => setViewMode('resources')} className="bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 shadow-md transform transition-transform hover:-translate-y-0.5">
                                    <i className="fa-solid fa-book"></i> Kütüphane
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-2 max-h-[300px] lg:max-h-none">
                            <div className="text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Eğitim Modülleri</div>
                            {COURSE_DATA.map((mod) => {
                                const isUnlocked = unlockedModules.includes(mod.id);
                                const isCompleted = completedModules.includes(mod.id);
                                const isActive = activeModuleId === mod.id && viewMode === 'course';
                                return (
                                    <button key={mod.id} onClick={() => { setViewMode('course'); setActiveModuleId(mod.id); }} disabled={!isUnlocked}
                                        className={`w-full text-left p-3 rounded-xl flex items-center gap-3 transition-colors ${isActive ? 'bg-teal-50 border border-floortime-teal shadow-sm' : isUnlocked ? 'bg-white hover:bg-slate-50 border border-slate-100' : 'opacity-40 bg-slate-50'}`}
                                    >
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 text-sm shadow-sm ${isCompleted ? 'bg-emerald-500 text-white' : isActive ? 'bg-floortime-teal text-white' : 'bg-slate-200 text-slate-500'}`}>
                                            {isCompleted ? '✓' : isUnlocked ? '▶' : '🔒'}
                                        </div>
                                        <div className="text-xs font-bold text-slate-800 leading-tight">{mod.title}</div>
                                    </button>
                                );
                            })}
                        </div>
                        <div className="p-4 border-t border-slate-100">
                            <button onClick={() => setIsSettingsOpen(true)} className="w-full bg-slate-100 hover:bg-slate-200 py-2.5 rounded-lg text-xs font-bold flex items-center justify-center gap-2 text-slate-600 transition-colors">
                                <i className="fa-solid fa-gear"></i> AI Ayarları (Opsiyonel)
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main ref={contentRef} className="flex-1 p-4 md:p-12 w-full overflow-x-hidden bg-slate-50">
                        
                        {viewMode === 'resources' ? (
                            <ResourceViewer />
                        ) : viewMode === 'certificate' ? (
                            <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl text-center max-w-4xl mx-auto fade-in mt-10 print:shadow-none print:m-0 print:p-0">
                                {!isCertificateGenerated ? (
                                    <form onSubmit={finishCourse} className="space-y-6 max-w-md mx-auto py-10 print:hidden">
                                        <h2 className="text-4xl font-black text-slate-900 mb-2">Mükemmel! 🎓</h2>
                                        <p className="text-slate-600 font-medium">Tüm klinik eğitimi bitirdiniz. Resmi sertifikanız için tam adınızı girin.</p>
                                        <input type="text" required placeholder="Adınız Soyadınız" value={userName} onChange={e=>setUserName(e.target.value)} className="w-full border-2 border-slate-300 rounded-xl px-5 py-4 text-center text-xl font-bold focus:border-floortime-teal outline-none" />
                                        <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white font-black py-4 rounded-xl text-lg shadow-lg hover:shadow-xl transform transition-all hover:-translate-y-1">Sertifikamı Hazırla</button>
                                    </form>
                                ) : (
                                    <div className="fade-in">
                                        <h2 className="text-3xl font-black text-slate-900 mb-8 print:hidden">İşte Muhteşem Sertifikanız!</h2>
                                        
                                        {/* Canvas Wrapper */}
                                        <div className="border border-slate-200 rounded-xl overflow-hidden shadow-[0_20px_50px_-12px_rgba(0,0,0,0.25)] mb-8 bg-slate-100 p-2 print:border-none print:shadow-none print:p-0">
                                            <canvas ref={canvasRef} className="w-full h-auto rounded-lg shadow-inner print:shadow-none"></canvas>
                                        </div>
                                        
                                        {/* Certificate Action Buttons */}
                                        <div className="flex flex-col sm:flex-row gap-4 justify-center print:hidden">
                                            <button onClick={downloadCertificatePDF} className="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-3 rounded-xl shadow-lg flex justify-center items-center gap-2">
                                                <i className="fa-solid fa-file-pdf"></i> PDF İndir
                                            </button>
                                            <button onClick={printCertificate} className="bg-slate-900 hover:bg-slate-800 text-white font-bold px-6 py-3 rounded-xl shadow-lg flex justify-center items-center gap-2">
                                                <i className="fa-solid fa-print"></i> Yazdır
                                            </button>
                                            <button onClick={() => setViewMode('course')} className="bg-white border border-slate-300 text-slate-700 font-bold px-6 py-3 rounded-xl shadow-sm hover:bg-slate-50">Eğitime Dön</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : viewMode === 'course' ? (
                            <div className="max-w-3xl mx-auto fade-in pb-20">
                                
                                {/* Üst Action Bar */}
                                <div className="flex flex-wrap justify-between items-center mb-6 gap-4">
                                    <span className="bg-blue-100 text-blue-800 text-[10px] font-black px-3 py-1.5 rounded-lg uppercase tracking-wider">Bölüm {activeModule.level}</span>
                                    
                                    <div className="flex gap-2">
                                        {/* PDF Olarak İndir Butonu */}
                                        <button onClick={downloadModuleAsPDF} disabled={isGeneratingPDF} className="flex items-center gap-2 px-4 py-2 rounded-full font-bold text-xs md:text-sm transition-all shadow-md bg-white text-slate-800 border border-slate-200 hover:bg-slate-50">
                                            {isGeneratingPDF ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-file-pdf text-red-500"></i>} PDF İndir
                                        </button>
                                        {/* Seslendirme Butonu */}
                                        <button onClick={toggleReading} className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold text-xs md:text-sm transition-all shadow-md ${isSpeaking ? 'bg-red-50 text-red-600 border border-red-200 animate-pulse' : 'bg-white text-slate-800 border border-slate-200 hover:bg-slate-50'}`}>
                                            {isSpeaking ? <><span className="w-2 h-2 bg-red-600 rounded-full"></span> Durdur</> : <><i className="fa-solid fa-volume-high text-indigo-500"></i> Dinle</>}
                                        </button>
                                    </div>
                                </div>

                                {/* EĞİTİM İÇERİĞİ (PDF alınacak alan) */}
                                <div id="module-content-to-pdf" className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200 mb-12">
                                    <h2 className="text-3xl md:text-4xl font-black text-slate-900 mb-8 leading-tight">{activeModule.title}</h2>
                                    <div className="prose max-w-none" dangerouslySetInnerHTML={{ __html: activeModule.content }}></div>
                                </div>

                                {/* CANLI VAKA PRATİĞİ */}
                                <div className="bg-gradient-to-br from-indigo-900 to-slate-900 rounded-3xl p-6 md:p-8 shadow-xl mb-12 text-white relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-indigo-500/20 rounded-full blur-[60px] -z-10"></div>
                                    <div className="flex justify-between items-start md:items-center mb-6 flex-col md:flex-row gap-4">
                                        <div>
                                            <h3 className="text-2xl font-black flex items-center gap-2"><i className="fa-solid fa-robot text-indigo-400"></i> Canlı Vaka Simülatörü</h3>
                                            <p className="text-sm text-indigo-200 mt-1 font-medium">Yapay zeka bu modüle uygun bir çocuk olacak. Terapist sizsiniz.</p>
                                        </div>
                                    </div>

                                    {!isRoleplayActive ? (
                                        <button onClick={startRoleplay} className="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-4 rounded-xl transition-colors shadow-lg">Simülasyonu Başlat</button>
                                    ) : (
                                        <div className="bg-slate-800/80 rounded-2xl flex flex-col h-[350px] border border-indigo-500/30">
                                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                                {roleplayMessages.map((msg, idx) => (
                                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                        <div className={`max-w-[85%] p-3 text-sm md:text-base rounded-xl shadow-sm ${msg.role === 'user' ? 'bg-indigo-500 text-white rounded-br-none' : 'bg-yellow-100 text-yellow-900 font-serif rounded-bl-none'}`}>{msg.text}</div>
                                                    </div>
                                                ))}
                                                {isRoleplayLoading && <div className="p-3 text-sm text-indigo-300 italic">Çocuk tepki veriyor...</div>}
                                                <div ref={roleplayEndRef} />
                                            </div>
                                            <form onSubmit={handleRoleplaySubmit} className="p-3 bg-slate-900 flex gap-2 rounded-b-2xl border-t border-indigo-500/30">
                                                <input type="text" value={roleplayInput} onChange={e => setRoleplayInput(e.target.value)} placeholder="Terapist olarak ne yaparsınız?..." className="flex-1 bg-slate-800 text-white rounded-xl px-4 py-3 text-sm outline-none focus:border-indigo-400 border border-slate-700" />
                                                <button type="submit" disabled={isRoleplayLoading} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-5 rounded-xl text-sm transition-colors"><i className="fa-solid fa-paper-plane"></i></button>
                                            </form>
                                        </div>
                                    )}
                                </div>

                                {/* SINAV ALANI */}
                                <div className="bg-white rounded-3xl p-6 md:p-10 shadow-md border border-slate-200">
                                    <h3 className="text-2xl font-black text-slate-800 mb-8 border-b border-slate-100 pb-4">Klinik Değerlendirme Testi</h3>
                                    {activeModule.quiz.map((q, qIndex) => (
                                        <div key={qIndex} className="mb-6">
                                            <p className="font-bold text-slate-800 mb-4 text-lg">{q.q}</p>
                                            <div className="space-y-3">
                                                {q.options.map((opt, optIndex) => {
                                                    const isSelected = quizAnswers[qIndex] === optIndex;
                                                    return (
                                                        <label key={optIndex} className={`flex items-start p-4 rounded-2xl border-2 cursor-pointer transition-all ${isSelected ? 'border-floortime-teal bg-teal-50 shadow-sm' : 'border-slate-100 bg-white hover:border-slate-200 hover:bg-slate-50'}`}>
                                                            <input type="radio" name={`q-${activeModuleId}`} className="hidden" checked={isSelected} onChange={() => handleQuizOptionSelect(qIndex, optIndex)} />
                                                            <div className={`w-6 h-6 rounded-full border-2 mr-4 flex-shrink-0 flex items-center justify-center mt-0.5 ${isSelected ? 'border-floortime-teal' : 'border-slate-300'}`}>
                                                                {isSelected && <div className="w-3 h-3 bg-floortime-teal rounded-full"></div>}
                                                            </div>
                                                            <span className={`text-base leading-relaxed ${isSelected ? 'font-bold text-teal-900' : 'text-slate-600 font-medium'}`}>{opt}</span>
                                                        </label>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    ))}

                                    <div className="mt-8 pt-6 border-t border-slate-100">
                                        {quizResult === 'success' && <div className="mb-6 p-4 bg-emerald-50 text-emerald-800 border border-emerald-200 rounded-xl font-bold flex items-center gap-2"><CheckCircle/> Mükemmel Analiz! Doğru.</div>}
                                        {quizResult === 'fail' && <div className="mb-6 p-4 bg-red-50 text-red-800 border border-red-200 rounded-xl font-bold flex items-center gap-2">⚠️ Hatalı. Lütfen içeriği tekrar okuyun.</div>}
                                        
                                        {progressPercentage === 100 && activeModuleId === COURSE_DATA.length - 1 && quizResult === 'success' ? (
                                            <button onClick={() => setViewMode('certificate')} className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white font-black py-4 rounded-xl text-lg shadow-lg hover:shadow-xl transform transition-all hover:-translate-y-1">🏆 Uzmanlık Sertifikasını Al</button>
                                        ) : (
                                            <button onClick={submitQuiz} disabled={Object.keys(quizAnswers).length < activeModule.quiz.length} className="w-full bg-slate-900 hover:bg-slate-800 disabled:opacity-40 disabled:hover:bg-slate-900 text-white font-bold py-4 rounded-xl transition-all text-lg shadow-md">Yanıtı Onayla ve İlerle</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : null}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
