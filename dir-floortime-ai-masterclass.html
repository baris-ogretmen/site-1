        const pcmToWav = (pcmData, sampleRate) => {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcmData.byteLength, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmData.byteLength, true);

            const wavBuffer = new Uint8Array(44 + pcmData.byteLength);
            wavBuffer.set(new Uint8Array(wavHeader), 0);
            wavBuffer.set(new Uint8Array(pcmData), 44);
            return wavBuffer;
        };

            useEffect(() => {
                if (!user || !db) return;
                const unsub = onSnapshot(doc(db, 'artifacts', APP_ID, 'users', user.uid), docSnap => {
                    if (docSnap.exists()) {
                        const d = docSnap.data();
                        if (d.unlockedModules) setUnlockedModules(d.unlockedModules);
                        if (d.completedModules) setCompletedModules(d.completedModules);
                        if (d.notes) setUserNotes(d.notes);
                    }
                });
                return () => unsub();
            }, [user]);

            // Reset specific states on module change
            useEffect(() => {
                setQuizAnswers({});
                setQuizResult(null);
                setNoteAnalysisResult('');
                setDynamicQuiz(null);
                setCurrentNote(userNotes[activeModuleId] || '');
                setAiMessages([{ role: 'ai', text: `Merhaba! "${activeModule.title}" modülündeyiz. Klinik gözlemlerle ilgili sorularınızı bana (Gemini) yöneltebilirsiniz.` }]);
                if(audioRef.current) { audioRef.current.pause(); setIsPlayingTTS(false); }
            }, [activeModuleId, userNotes]);

            useEffect(() => {
                if(chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [aiMessages, isAiOpen]);

            const saveProgress = async (unlocked, completed) => {
                if (user && db) await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid), { unlockedModules: unlocked, completedModules: completed }, { merge: true });
            };

            const saveNote = async () => {
                const updatedNotes = { ...userNotes, [activeModuleId]: currentNote };
                if (user && db) await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid), { notes: updatedNotes }, { merge: true });
            };

            // ---- GEMINI AI FEATURES ----

            // 1. Text To Speech Feature
            const playAudioSummary = async () => {
                if(isPlayingTTS && audioRef.current) {
                    audioRef.current.pause();
                    setIsPlayingTTS(false);
                    return;
                }
                setIsPlayingTTS(true);
                try {
                    const cleanText = activeModule.content.replace(/<[^>]*>?/gm, '');
                    const promptText = `Lütfen şu klinik eğitim metnini, motive edici ve akıcı bir tonda oku: ${cleanText.substring(0, 600)}`;
                    const payload = {
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } },
                        model: "gemini-2.5-flash-preview-tts"
                    };

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    if(!data.candidates) throw new Error("TTS failed");
                    
                    const inlineData = data.candidates[0].content.parts[0].inlineData;
                    const mimeType = inlineData.mimeType;
                    const rateMatch = mimeType.match(/rate=(\d+)/);
                    const sampleRate = rateMatch ? parseInt(rateMatch[1]) : 24000;

                    const binaryString = atob(inlineData.data);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                    
                    const wavData = pcmToWav(bytes.buffer, sampleRate);
                    const blob = new Blob([wavData], { type: 'audio/wav' });
                    const url = URL.createObjectURL(blob);
                    
                    audioRef.current = new Audio(url);
                    audioRef.current.onended = () => setIsPlayingTTS(false);
                    audioRef.current.play();
                } catch (err) {
                    console.error("TTS Error:", err);
                    setIsPlayingTTS(false);
                }
            };

            // 2. Clinical Notes Analyzer
            const analyzeNotesWithAI = async () => {
                if (!currentNote.trim()) return;
                setIsAnalyzingNote(true);
                setNoteAnalysisResult('');
                try {
                    const prompt = `Aşağıdaki klinik gözlem notlarını DIR Floortime teorisine göre profesyonelce analiz et. Kısaca güçlü yanları vurgula ve yapıcı, nokta atışı 1-2 strateji önerisi ver:\n\nNot: "${currentNote}"`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Sen şefkatli ve uzman bir DIR Floortime klinik süpervizörüsün." }] } })
                    });
                    const data = await res.json();
                    setNoteAnalysisResult(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    setNoteAnalysisResult('Analiz sırasında bir hata oluştu. Lütfen tekrar deneyin.');
                } finally {
                    setIsAnalyzingNote(false);
                }
            };

            // 3. Dynamic Quiz Generator (Structured JSON)
            const generateAiQuiz = async () => {
                setIsGeneratingQuiz(true);
                setDynamicQuiz(null);
                setQuizAnswers({});
                setQuizResult(null);
                try {
                    const prompt = `DIR Floortime "${activeModule.title}" konusuyla ilgili klinisyenleri test edecek, pratik bir klinik vaka senaryosu içeren 1 adet zorlayıcı çoktan seçmeli soru üret.`;
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    q: { type: "STRING" },
                                    options: { type: "ARRAY", items: { type: "STRING" } },
                                    answer: { type: "INTEGER" }
                                }
                            }
                        }
                    };
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    const quizData = JSON.parse(data.candidates[0].content.parts[0].text);
                    setDynamicQuiz([quizData]); // Wrap in array to match existing map logic
                } catch (err) {
                    console.error("Quiz generation failed", err);
                } finally {
                    setIsGeneratingQuiz(false);
                }
            };

            // 4. Chat Supervisor
            const handleAiSubmit = async (e) => {
                e.preventDefault();
                if(!aiInput.trim()) return;
                const newUserMsg = { role: 'user', text: aiInput };
                setAiMessages(prev => [...prev, newUserMsg]);
                setAiInput('');
                setIsAiLoading(true);

                try {
                    const systemInstruction = `Sen Gemini tabanlı uzman bir DIR Floortime süpervizörüsün. Kullanıcı "${activeModule.title}" modülünde. Yanıtlarını Türkçe, kısa, bilimsel ve yol gösterici olarak ver.`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: newUserMsg.text }] }], systemInstruction: { parts: [{ text: systemInstruction }] } })
                    });
                    const data = await res.json();
                    setAiMessages(prev => [...prev, { role: 'ai', text: data.candidates[0].content.parts[0].text }]);
                } catch (err) {
                    setAiMessages(prev => [...prev, { role: 'ai', text: "Yapay zeka sistemine şu an ulaşılamıyor." }]);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const submitQuiz = () => {
                const targetQuiz = dynamicQuiz || activeModule.quiz;
                let correctCount = 0;
                targetQuiz.forEach((q, idx) => { if (quizAnswers[idx] === q.answer) correctCount++; });

                if (correctCount === targetQuiz.length) {
                    setQuizResult('success');
                    let newCompleted = [...completedModules];
                    if (!completedModules.includes(activeModuleId)) newCompleted.push(activeModuleId);
                    
                    const nextModuleId = activeModuleId + 1;
                    let newUnlocked = [...unlockedModules];
                    if (nextModuleId < COURSE_DATA.length && !unlockedModules.includes(nextModuleId)) newUnlocked.push(nextModuleId);
                    
                    setCompletedModules(newCompleted);
                    setUnlockedModules(newUnlocked);
                    saveProgress(newUnlocked, newCompleted);
                } else {
                    setQuizResult('fail');
                }
            };

            if (!isFirebaseReady) return <div className="min-h-screen bg-floortime-bg flex items-center justify-center"><div className="w-16 h-16 border-4 border-floortime-teal border-t-transparent rounded-full animate-spin"></div></div>;

            const targetQuiz = dynamicQuiz || activeModule.quiz;

            return (
                <div className="h-screen flex flex-col lg:flex-row font-sans relative">
                    {/* SIDEBAR */}
                    <aside className="w-full lg:w-[350px] glass-panel flex flex-col z-20 shadow-xl border-r border-slate-200 bg-white/90">
                        <div className="p-8 border-b border-slate-200">
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter">Floortime<span className="ai-gradient-text">AI</span></h1>
                            <p className="text-xs text-slate-500 font-bold uppercase mt-2">Gemini Masterclass</p>
                            
                            <div className="mt-8">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="text-xs font-black text-slate-400 uppercase">Akademik İlerleme</span>
                                    <span className="text-2xl font-black text-floortime-tealDark">%{progressPercentage}</span>
                                </div>
                                <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                                    <div className="bg-gradient-to-r from-floortime-teal to-blue-500 h-full transition-all duration-1000" style={{ width: `${progressPercentage}%` }}></div>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {COURSE_DATA.map((mod) => {
                                const isUnlocked = unlockedModules.includes(mod.id);
                                const isCompleted = completedModules.includes(mod.id);
                                const isActive = activeModuleId === mod.id;

                                return (
                                    <button key={mod.id} onClick={() => isUnlocked && setActiveModuleId(mod.id)} disabled={!isUnlocked}
                                        className={`w-full text-left p-4 rounded-xl flex items-center gap-3 transition-all ${isActive ? 'bg-floortime-teal/10 border-2 border-floortime-teal shadow-sm' : isUnlocked ? 'bg-white border-2 border-transparent hover:border-slate-200' : 'opacity-50 grayscale'}`}
                                    >
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center ${isCompleted ? 'bg-emerald-500 text-white' : isActive ? 'bg-floortime-teal text-white' : 'bg-slate-200 text-slate-400'}`}>
                                            {isCompleted ? <CheckCircle /> : isUnlocked ? <PlayCircle /> : <Lock />}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase truncate">{mod.title}</div>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 h-full overflow-y-auto bg-transparent p-6 md:p-12 relative scroll-smooth">
                        <div className="max-w-4xl mx-auto pb-40 fade-in">
                            
                            {/* Feature 1: TTS AI Button */}
                            <div className="flex items-center justify-between mb-8">
                                <span className="bg-floortime-blue/20 text-floortime-blueDark text-xs font-black px-4 py-2 rounded-xl uppercase border border-floortime-blue/30">
                                    {activeModule.level} SEVİYESİ
                                </span>
                                <button 
                                    onClick={playAudioSummary}
                                    className={`flex items-center gap-2 px-5 py-2.5 rounded-full font-bold text-sm transition-all shadow-md ai-border-glow ${isPlayingTTS ? 'bg-red-50 text-red-600 border-red-200 animate-pulse' : 'bg-white text-slate-800 border-slate-200 hover:bg-slate-50'}`}
                                >
                                    {isPlayingTTS ? (
                                        <><svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clipRule="evenodd" /></svg> Durdur</>
                                    ) : (
                                        <><Sparkles /> Modül Özetini Dinle (Gemini TTS)</>
                                    )}
                                </button>
                            </div>

                            <h2 className="text-4xl md:text-5xl font-black text-slate-900 mb-8">{activeModule.title}</h2>
                            <div className="prose prose-lg max-w-none mb-12 bg-white/80 p-8 rounded-3xl shadow-sm border border-slate-100" dangerouslySetInnerHTML={{ __html: activeModule.content }}></div>

                            {/* Feature 2: Clinical Notes Analyzer */}
                            <div className="bg-gradient-to-br from-slate-50 to-white rounded-3xl p-8 shadow-sm border border-slate-200 mb-12 relative">
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-800 flex items-center gap-2">Klinik Not Defterim</h3>
                                        <p className="text-sm text-slate-500 mt-1">Gözlemlerinizi yazın ve Gemini AI'dan süpervizyon alın.</p>
                                    </div>
                                    <button 
                                        onClick={analyzeNotesWithAI}
                                        disabled={!currentNote.trim() || isAnalyzingNote}
                                        className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 disabled:opacity-50 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition-all ai-border-glow shadow-lg"
                                    >
                                        <Sparkles /> {isAnalyzingNote ? 'Analiz Ediliyor...' : 'Yapay Zeka ile Analiz Et'}
                                    </button>
                                </div>
                                <textarea 
                                    value={currentNote} onChange={(e) => setCurrentNote(e.target.value)} onBlur={saveNote}
                                    placeholder="Bu vakada çocuğun regülasyon düzeyi nasıldı? Hangi stratejileri denediniz?..."
                                    className="w-full h-32 p-4 rounded-xl border border-slate-300 focus:border-floortime-teal focus:ring-2 focus:ring-floortime-teal/20 outline-none resize-none text-slate-700 bg-white"
                                />
                                
                                {noteAnalysisResult && (
                                    <div className="mt-6 p-6 bg-indigo-50/50 border border-indigo-100 rounded-2xl fade-in relative">
                                        <div className="absolute -top-3 left-6 bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1"><Sparkles/> Gemini Süpervizör Yanıtı</div>
                                        <div className="text-slate-700 prose prose-sm max-w-none pt-2 font-medium" dangerouslySetInnerHTML={{ __html: noteAnalysisResult.replace(/\n/g, '<br/>') }}></div>
                                    </div>
                                )}
                            </div>

                            {/* Feature 3: Dynamic AI Quiz */}
                            <div className="bg-slate-900 rounded-3xl p-8 md:p-12 shadow-2xl text-white relative">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10 border-b border-slate-700 pb-6">
                                    <div>
                                        <h3 className="text-2xl font-black tracking-tight">Klinik Değerlendirme</h3>
                                        <p className="text-slate-400 text-sm mt-1">Bu modülü geçmek için doğru analizi yapmalısınız.</p>
                                    </div>
                                    <button 
                                        onClick={generateAiQuiz} disabled={isGeneratingQuiz}
                                        className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition-all shadow-glow"
                                    >
                                        <Sparkles /> {isGeneratingQuiz ? 'Üretiliyor...' : 'Yapay Zekadan Yeni Vaka İste'}
                                    </button>
                                </div>
                                
                                {targetQuiz.map((q, qIndex) => (
                                    <div key={qIndex} className="mb-10 fade-in">
                                        <p className="font-bold text-lg text-slate-100 mb-5">{qIndex + 1}. {q.q}</p>
                                        <div className="space-y-3">
                                            {q.options.map((opt, optIndex) => {
                                                const isSelected = quizAnswers[qIndex] === optIndex;
                                                return (
                                                    <label key={optIndex} className={`flex items-start p-5 rounded-2xl border-2 cursor-pointer transition-all ${isSelected ? 'border-floortime-teal bg-floortime-teal/10' : 'border-slate-700 bg-slate-800/50 hover:border-slate-500'}`}>
                                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center mr-4 mt-0.5 flex-shrink-0 ${isSelected ? 'border-floortime-teal' : 'border-slate-500'}`}>
                                                            {isSelected && <div className="w-2.5 h-2.5 bg-floortime-teal rounded-full"></div>}
                                                        </div>
                                                        <input type="radio" name={`q-${activeModuleId}-${qIndex}`} className="hidden" checked={isSelected} onChange={() => handleQuizOptionSelect(qIndex, optIndex)} />
                                                        <span className={`text-base font-medium ${isSelected ? 'text-white' : 'text-slate-300'}`}>{opt}</span>
                                                    </label>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}

                                <div className="pt-6 border-t border-slate-700">
                                    {quizResult === 'success' && (
                                        <div className="mb-6 p-4 bg-emerald-500/10 text-emerald-300 rounded-xl border border-emerald-500/30 flex items-center gap-3 fade-in">
                                            <CheckCircle /> <span className="font-bold">Analiz Doğru! İlerleme kaydedildi.</span>
                                        </div>
                                    )}
                                    {quizResult === 'fail' && (
                                        <div className="mb-6 p-4 bg-red-500/10 text-red-300 rounded-xl border border-red-500/30 flex items-center gap-3 fade-in">
                                            <span className="font-bold">Analiz Hatası. Lütfen tekrar değerlendirin.</span>
                                        </div>
                                    )}
                                    <button onClick={submitQuiz} disabled={Object.keys(quizAnswers).length < targetQuiz.length} className="w-full bg-floortime-teal hover:bg-teal-400 disabled:opacity-30 text-slate-900 font-black py-4 rounded-xl transition-all text-lg shadow-glow">
                                        Yanıtları Onayla
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* AI SUPERVISOR (Floating Chat) */}
                    <div className={`fixed bottom-6 right-6 z-50 flex flex-col items-end transition-all duration-300 ${isAiOpen ? 'w-80 md:w-96' : 'w-auto'}`}>
                        <div className={`bg-white rounded-2xl shadow-2xl overflow-hidden mb-4 border border-slate-200 transition-all duration-300 origin-bottom-right w-full ${isAiOpen ? 'opacity-100 scale-100 h-96 flex flex-col' : 'opacity-0 scale-50 h-0 pointer-events-none'}`}>
                            <div className="bg-slate-900 p-4 flex justify-between items-center text-white">
                                <div className="flex items-center gap-2 font-bold"><Sparkles /> AI Süpervizör</div>
                                <button onClick={() => setIsAiOpen(false)} className="text-white/80 hover:text-white">&times;</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 text-sm">
                                {aiMessages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-3 ${msg.role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'} shadow-sm`} dangerouslySetInnerHTML={{ __html: msg.text.replace(/\n/g, '<br/>') }}></div>
                                    </div>
                                ))}
                                {isAiLoading && <div className="chat-bubble-ai p-3 w-16 typing-indicator"><span></span><span></span><span></span></div>}
                                <div ref={chatEndRef} />
                            </div>
                            <form onSubmit={handleAiSubmit} className="p-3 bg-white border-t border-slate-100 flex gap-2">
                                <input type="text" value={aiInput} onChange={(e) => setAiInput(e.target.value)} placeholder="Sorunuzu yazın..." className="flex-1 bg-slate-100 rounded-full px-4 py-2 outline-none focus:ring-2 focus:ring-floortime-teal" />
                                <button type="submit" disabled={!aiInput.trim() || isAiLoading} className="bg-floortime-teal text-white p-2 w-10 h-10 flex items-center justify-center rounded-full hover:bg-floortime-tealDark disabled:opacity-50">➔</button>
                            </form>
                        </div>
                        <button onClick={() => setIsAiOpen(!isAiOpen)} className={`w-14 h-14 rounded-full shadow-glow flex items-center justify-center transition-transform hover:scale-110 text-white ${isAiOpen ? 'bg-slate-800' : 'bg-gradient-to-r from-indigo-500 to-floortime-teal bounce'}`}>
                            {isAiOpen ? '✕' : <Sparkles />}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
