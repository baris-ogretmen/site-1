                                            <select value={playbackRate} onChange={e => setPlaybackRate(Number(e.target.value))} className="bg-transparent text-xs font-bold text-slate-700 outline-none cursor-pointer"><option value="0.75">0.75x</option><option value="1">1x</option><option value="1.5">1.5x</option><option value="2">2x</option></select>
                                            <div className="w-px h-4 bg-slate-300 mx-2"></div>
                                            <select value={selectedVoice} onChange={e => setSelectedVoice(e.target.value)} className="bg-transparent text-xs font-medium text-slate-600 outline-none cursor-pointer max-w-[80px] truncate">{availableVoices.map((v, i) => <option key={i} value={v.name}>{v.name}</option>)}</select>
                                        </div>
                                        <button onClick={downloadModuleAsPDF} disabled={isGeneratingPDF} className="flex items-center gap-2 px-4 py-2 rounded-full font-bold text-xs transition-all shadow-md bg-white text-slate-800 border border-slate-200 hover:bg-slate-50">
                                            {isGeneratingPDF ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-file-pdf text-red-500"></i>} <span className="hidden md:inline">PDF</span>
                                        </button>
                                        <button onClick={toggleReading} className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold text-xs transition-all shadow-md ${isSpeaking ? 'bg-red-50 text-red-600 border border-red-200 animate-pulse' : 'bg-indigo-600 text-white hover:bg-indigo-500'}`}>
                                            {isSpeaking ? <><span className="w-2 h-2 bg-red-600 rounded-full"></span> Durdur</> : <><i className="fa-solid fa-volume-high"></i> Dinle</>}
                                        </button>
                                    </div>
                                </div>

                                <div id="module-content-to-pdf" onMouseUp={handleContentMouseUp} onTouchEnd={handleContentMouseUp} className="bg-white p-6 md:p-12 rounded-[2rem] shadow-md border border-slate-200 mb-12">
                                    <h2 className="text-3xl md:text-5xl font-black text-slate-900 mb-8 leading-tight">{activeModule.title}</h2>
                                    <div className="prose max-w-none text-slate-700" dangerouslySetInnerHTML={{ __html: activeModule.content }}></div>
                                </div>

                                <div className="mb-12">
                                    <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-pen-nib text-teal-600"></i> Dijital Not Defterim</h3>
                                    <RichNotepad value={currentNote} onChange={saveNoteToDb} />
                                </div>

                                <div className="bg-gradient-to-br from-slate-900 to-indigo-950 rounded-[2rem] p-6 md:p-10 shadow-xl mb-12 text-white relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-indigo-500/20 rounded-full blur-[60px] -z-10"></div>
                                    <div className="flex justify-between items-start md:items-center mb-6 flex-col md:flex-row gap-4">
                                        <div>
                                            <h3 className="text-2xl font-black flex items-center gap-2"><i className="fa-solid fa-robot text-indigo-400"></i> Canlı Vaka Simülatörü</h3>
                                            <p className="text-sm text-indigo-200 mt-1 font-medium">Yapay zeka bu modüle özel bir çocuk olacak. Siz terapistsiniz.</p>
                                        </div>
                                    </div>

                                    {!isRoleplayActive ? (
    <div className="space-y-4">
        <textarea 
            value={customCaseProfile} 
            onChange={(e) => setCustomCaseProfile(e.target.value)} 
            placeholder="Modülün varsayılan vakasını oynamak için burayı BOŞ BIRAKIN. Kendi vakanızı yaratmak isterseniz buraya yazın... (Örn: 6 yaşında, sürekli dönen nesnelere bakıyor, konuşmuyor...)" 
            className="w-full bg-slate-800/60 text-indigo-100 placeholder-indigo-300/50 p-4 rounded-xl border border-indigo-500/30 text-sm outline-none focus:ring-2 focus:ring-indigo-400 resize-y" 
            rows="3"
        ></textarea>
        <button onClick={startRoleplay} className="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-4 rounded-xl transition-colors shadow-lg">
            {customCaseProfile.trim().length > 0 ? "Özel Vakamla Simülasyonu Başlat" : "Simülasyonu Başlat"}
        </button>
    </div>
) : (
                                        <div className="bg-slate-800/80 rounded-2xl flex flex-col h-[350px] border border-indigo-500/30 shadow-inner">
                                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                                {roleplayMessages.map((msg, idx) => (
                                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                        <div className={`max-w-[85%] p-3 text-sm md:text-base rounded-xl shadow-sm whitespace-pre-wrap ${msg.role === 'user' ? 'bg-indigo-500 text-white rounded-br-none' : 'bg-yellow-100 text-yellow-900 font-serif rounded-bl-none'}`}>{msg.text}</div>
                                                    </div>
                                                ))}
                                                {isRoleplayLoading && <div className="p-3 text-sm text-indigo-300 italic typing-indicator"><span></span><span></span><span></span></div>}
                                                <div ref={roleplayEndRef} />
                                            </div>
                                            <form onSubmit={handleRoleplaySubmit} className="p-3 bg-slate-900 flex gap-2 rounded-b-2xl border-t border-indigo-500/30">
                                                <input type="text" value={roleplayInput} onChange={e => setRoleplayInput(e.target.value)} placeholder="Terapist olarak hamleniz?..." className="flex-1 bg-slate-800 text-white rounded-xl px-4 py-3 text-sm outline-none focus:border-indigo-400 border border-slate-700" />
                                                <button type="submit" disabled={isRoleplayLoading} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-5 rounded-xl text-sm transition-colors"><i className="fa-solid fa-paper-plane"></i></button>
                                            </form>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-[2rem] p-6 md:p-10 shadow-md border border-slate-200">
                                    <h3 className="text-2xl font-black text-slate-800 mb-8 border-b border-slate-100 pb-4">Klinik Değerlendirme Testi</h3>
                                    {activeModule.quiz.map((q, qIndex) => (
                                        <div key={qIndex} className="mb-6">
                                            <p className="font-bold text-slate-800 mb-4 text-lg">{q.q}</p>
                                            <div className="space-y-3">
                                                {q.options.map((opt, optIndex) => {
                                                    const isSelected = quizAnswers[qIndex] === optIndex;
                                                    return (
                                                        <label key={optIndex} className={`flex items-start p-4 rounded-2xl border-2 cursor-pointer transition-all ${isSelected ? 'border-floortime-teal bg-teal-50 shadow-sm' : 'border-slate-100 bg-white hover:border-slate-200 hover:bg-slate-50'}`}>
                                                            <input type="radio" name={`q-${activeModuleId}`} className="hidden" checked={isSelected} onChange={() => handleQuizOptionSelect(qIndex, optIndex)} />
                                                            <div className={`w-6 h-6 rounded-full border-2 mr-4 flex-shrink-0 flex items-center justify-center mt-0.5 ${isSelected ? 'border-floortime-teal' : 'border-slate-300'}`}>
                                                                {isSelected && <div className="w-3 h-3 bg-floortime-teal rounded-full"></div>}
                                                            </div>
                                                            <span className={`text-base leading-relaxed ${isSelected ? 'font-bold text-teal-900' : 'text-slate-600 font-medium'}`}>{opt}</span>
                                                        </label>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    ))}

                                    <div className="mt-8 pt-6 border-t border-slate-100">
                                        {quizResult === 'success' && <div className="mb-6 p-4 bg-emerald-50 text-emerald-800 border border-emerald-200 rounded-xl font-bold flex items-center gap-2"><CheckCircle/> Doğru!</div>}
                                        {quizResult === 'fail' && <div className="mb-6 p-4 bg-red-50 text-red-800 border border-red-200 rounded-xl font-bold flex items-center gap-2">⚠️ Hatalı. Tekrar okuyun.</div>}
                                        
                                        {progressPercentage === 100 && activeModuleId === COURSE_DATA.length - 1 && quizResult === 'success' ? (
                                            <button onClick={() => setViewMode('certificate')} className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white font-black py-4 rounded-xl text-lg shadow-lg hover:shadow-xl transform transition-all hover:-translate-y-1 bounce">🏆 Sertifikayı Al</button>
                                        ) : (
                                            <button onClick={submitQuiz} disabled={Object.keys(quizAnswers).length < activeModule.quiz.length} className="w-full bg-slate-900 hover:bg-slate-800 disabled:opacity-40 text-white font-bold py-4 rounded-xl transition-all text-lg shadow-md">Yanıtı Onayla ve İlerle</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : null}
                        </div> 
                        
                        {/* FOOTER WITH DYNAMIC LINK */}
                        <footer className="mt-auto text-center border-t border-slate-200 pt-6 pb-2 print:hidden">
                            <a href="https://baris-ogretmen.github.io/site-1/" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                                <i className="fa-solid fa-graduation-cap text-sky-400"></i> Barış İlkan
                            </a>
                            <p className="text-slate-400 text-xs mt-3 font-medium">Bu eğitim platformu Barış İlkan tarafından geliştirilmiş olup tüm hakları saklıdır.</p>
                        </footer>
                    </main>

                    {/* GLOBAL AI WIDGET */}
                    <div className={`fixed bottom-6 right-6 z-50 flex flex-col items-end transition-all duration-300 print:hidden ${isAssistantOpen ? 'w-[90vw] md:w-96' : 'w-auto'}`}>
                        <div className={`bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] overflow-hidden mb-4 border border-slate-200 transition-all duration-300 origin-bottom-right w-full ${isAssistantOpen ? 'opacity-100 scale-100 h-[450px] flex flex-col' : 'opacity-0 scale-50 h-0 pointer-events-none'}`}>
                            <div className="bg-gradient-to-r from-indigo-600 to-teal-500 p-4 flex justify-between items-center text-white shadow-md z-10">
                                <div className="flex items-center gap-2 font-bold"><i className="fa-solid fa-robot text-xl"></i> Klinik AI Asistanı</div>
                                <button onClick={() => setIsAssistantOpen(false)} className="text-white/80 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-white/10">&times;</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 text-sm">
                                {assistantMessages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-3 rounded-xl shadow-sm ${msg.role === 'user' ? 'bg-indigo-500 text-white rounded-br-none' : 'bg-white border border-slate-200 rounded-bl-none text-slate-700'}`} dangerouslySetInnerHTML={{ __html: msg.text.replace(/\n/g, '<br/>') }}></div>
                                    </div>
                                ))}
                                {isAssistantLoading && <div className="flex justify-start"><div className="bg-white border border-slate-200 p-3 rounded-xl rounded-bl-none shadow-sm typing-indicator"><span></span><span></span><span></span></div></div>}
                                <div ref={assistantEndRef} />
                            </div>
                            <form onSubmit={handleAssistantSubmit} className="p-3 bg-white border-t border-slate-100 flex gap-2">
                                <input type="text" value={assistantInput} onChange={(e) => setAssistantInput(e.target.value)} placeholder="Bir terim sorun..." className="flex-1 bg-slate-100 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-400 text-sm" />
                                <button type="submit" disabled={!assistantInput.trim() || isAssistantLoading} className="bg-indigo-500 text-white p-2 w-10 h-10 flex items-center justify-center rounded-xl hover:bg-indigo-600 disabled:opacity-50"><i className="fa-solid fa-paper-plane"></i></button>
                            </form>
                        </div>
                        <button onClick={() => setIsAssistantOpen(!isAssistantOpen)} className={`w-14 h-14 rounded-full shadow-[0_10px_25px_rgba(79,70,229,0.5)] flex items-center justify-center transition-transform hover:scale-110 text-white ${isAssistantOpen ? 'bg-slate-800' : 'bg-indigo-600 bounce'}`}>
                            {isAssistantOpen ? <i className="fa-solid fa-times text-xl"></i> : <i className="fa-solid fa-message text-xl"></i>}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
