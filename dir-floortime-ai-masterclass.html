            const numChannels = 1; const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const wavHeader = new ArrayBuffer(44); const view = new DataView(wavHeader);

            const wavBuffer = new Uint8Array(44 + pcmData.byteLength);

        const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const StarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>;

        // --- COMPONENTS ---
        const Toast = ({ message, type, isVisible }) => (
            <div className={`toast ${isVisible ? 'show' : ''}`}>
                <div className={`px-6 py-4 rounded-2xl shadow-2xl font-bold flex items-center gap-3 text-white ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`}>
                    {type === 'error' ? '⚠️' : '✅'} {message}
                </div>
            </div>
        );

        const SettingsModal = ({ isOpen, onClose, setAiConfig }) => {
            const [localKey, setLocalKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [localModel, setLocalModel] = useState(localStorage.getItem('gemini_model') || 'gemini-2.5-flash-preview-09-2025');

            if (!isOpen) return null;

            const handleSave = (e) => {
                e.preventDefault();
                localStorage.setItem('gemini_api_key', localKey);
                localStorage.setItem('gemini_model', localModel);
                setAiConfig({ key: localKey, model: localModel });
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                    <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden slide-up border border-slate-200">
                        <div className="bg-gradient-to-r from-slate-800 to-slate-900 p-6 text-white flex justify-between items-center">
                            <h3 className="text-xl font-bold flex items-center gap-2"><SettingsIcon /> Gelişmiş AI Ayarları</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-white">&times;</button>
                        </div>
                        <form onSubmit={handleSave} className="p-6 space-y-6">
                            <p className="text-sm text-slate-500 font-medium">Modeli ve API anahtarınızı manuel olarak serbest metin şeklinde girebilirsiniz.</p>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Gemini API Anahtarı (Opsiyonel)</label>
                                <input type="password" value={localKey} onChange={(e) => setLocalKey(e.target.value)} placeholder="AIzaSy... (Boş bırakılırsa sistem key'i kullanılır)" className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-floortime-teal outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Manuel Model Girişi</label>
                                <input 
                                    type="text" 
                                    list="ai-models" 
                                    value={localModel} 
                                    onChange={(e) => setLocalModel(e.target.value)} 
                                    placeholder="Model adını yazın (örn: gemini-1.5-pro)" 
                                    className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-floortime-teal outline-none bg-white font-mono text-sm"
                                    required
                                />
                                <datalist id="ai-models">
                                    <option value="gemini-2.5-flash-preview-09-2025" />
                                    <option value="gemini-1.5-pro" />
                                    <option value="gemini-1.5-flash" />
                                    <option value="gpt-4o" />
                                </datalist>
                            </div>
                            <button type="submit" className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-md transition-all">Kaydet ve Uygula</button>
                        </form>
                    </div>
                </div>
            );
        };

        const Flashcard = ({ front, back }) => {
            const [flipped, setFlipped] = useState(false);
            return (
                <div className={`flashcard relative w-full h-40 cursor-pointer perspective-1000 ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(!flipped)}>
                    <div className="flashcard-inner w-full h-full absolute">
                        <div className="flashcard-front bg-gradient-to-br from-indigo-50 to-white border-2 border-indigo-100 rounded-2xl flex items-center justify-center p-6 text-center shadow-sm">
                            <h4 className="font-black text-indigo-900 text-lg">{front}</h4>
                            <div className="absolute bottom-2 text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Cevabı Görmek İçin Tıkla</div>
                        </div>
                        <div className="flashcard-back bg-indigo-600 rounded-2xl flex items-center justify-center p-6 text-center shadow-lg text-white">
                            <p className="font-medium text-sm leading-relaxed">{back}</p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [isFirebaseReady, setIsFirebaseReady] = useState(false);
            
            // Core & XP
            const [activeModuleId, setActiveModuleId] = useState(0);
            const [unlockedModules, setUnlockedModules] = useState([0]); 
            const [completedModules, setCompletedModules] = useState([]); 
            const [xp, setXp] = useState(0);
            
            const [quizAnswers, setQuizAnswers] = useState({}); 
            const [quizResult, setQuizResult] = useState(null); 
            const [userNotes, setUserNotes] = useState({}); 
            const [currentNote, setCurrentNote] = useState('');
            
            // AI Config
            const [aiConfig, setAiConfig] = useState({ 
                key: localStorage.getItem('gemini_api_key') || '', 
                model: localStorage.getItem('gemini_model') || 'gemini-2.5-flash-preview-09-2025' 
            });
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [toast, setToast] = useState({ message: '', type: 'success', isVisible: false });
            
            // Note AI
            const [isAnalyzingNote, setIsAnalyzingNote] = useState(false);
            const [noteAnalysisResult, setNoteAnalysisResult] = useState('');
            
            // Quiz AI
            const [dynamicQuiz, setDynamicQuiz] = useState(null);
            const [isGeneratingQuiz, setIsGeneratingQuiz] = useState(false);

            // Flashcards AI
            const [flashcards, setFlashcards] = useState([]);
            const [isGeneratingCards, setIsGeneratingCards] = useState(false);

            // Roleplay AI (Vaka Canlandırma)
            const [isRoleplayActive, setIsRoleplayActive] = useState(false);
            const [roleplayMessages, setRoleplayMessages] = useState([]);
            const [roleplayInput, setRoleplayInput] = useState('');
            const [isRoleplayLoading, setIsRoleplayLoading] = useState(false);
            const roleplayEndRef = useRef(null);
            
            // Cert
            const [showCertificateMode, setShowCertificateMode] = useState(false);
            const [userName, setUserName] = useState('');
            const [isCertificateGenerated, setIsCertificateGenerated] = useState(false);
            
            const canvasRef = useRef(null);
            const contentRef = useRef(null);

            const activeModule = COURSE_DATA.find(m => m.id === activeModuleId);
            const progressPercentage = Math.round((completedModules.length / COURSE_DATA.length) * 100);

            // Helpers
            const showToast = (message, type = 'error') => {
                setToast({ message, type, isVisible: true });
                setTimeout(() => setToast(prev => ({ ...prev, isVisible: false })), 4000);
            };

            const getApiKey = () => aiConfig.key || envApiKey;

            const addXp = async (amount, reason) => {
                const newXp = xp + amount;
                setXp(newXp);
                showToast(`+${amount} XP Kazanıldı! (${reason})`, 'success');
                if (user && db) await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid), { xp: newXp }, { merge: true });
            };

            // Init Firebase
            useEffect(() => {
                const init = async () => { try { await signInAnonymously(auth); } catch (e) { setIsFirebaseReady(true); } };
                init();
                const unsub = onAuthStateChanged(auth, u => { setUser(u); setIsFirebaseReady(true); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const unsub = onSnapshot(doc(db, 'artifacts', APP_ID, 'users', user.uid), docSnap => {
                    if (docSnap.exists()) {
                        const d = docSnap.data();
                        if (d.unlockedModules) setUnlockedModules(d.unlockedModules);
                        if (d.completedModules) setCompletedModules(d.completedModules);
                        if (d.notes) setUserNotes(d.notes);
                        if (d.xp) setXp(d.xp);
                    }
                });
                return () => unsub();
            }, [user]);

            // Reset specific states on module change
            useEffect(() => {
                setQuizAnswers({}); setQuizResult(null); setNoteAnalysisResult('');
                setDynamicQuiz(null); setFlashcards([]); setIsRoleplayActive(false); setRoleplayMessages([]);
                setCurrentNote(userNotes[activeModuleId] || '');
                if(contentRef.current) contentRef.current.scrollTo({ top: 0, behavior: 'smooth' });
            }, [activeModuleId, userNotes]);

            useEffect(() => { if(roleplayEndRef.current) roleplayEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [roleplayMessages]);

            const saveProgress = async (unlocked, completed) => {
                if (user && db) await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid), { unlockedModules: unlocked, completedModules: completed }, { merge: true });
            };

            const saveNote = async () => {
                const updatedNotes = { ...userNotes, [activeModuleId]: currentNote };
                if (user && db) await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid), { notes: updatedNotes }, { merge: true });
            };

            // ---- AI FEATURES ----

            // 1. Generate Flashcards
            const generateFlashcards = async () => {
                if (!getApiKey()) { showToast('API Anahtarı gerekli.'); return; }
                setIsGeneratingCards(true); setFlashcards([]);
                try {
                    const payload = {
                        contents: [{ parts: [{ text: `DIR Floortime "${activeModule.title}" konusundan en kritik 3 adet kavramı seç. Her biri için ön yüz (kısa kavram adı) ve arka yüz (klinik açıklama) oluştur.` }] }],
                        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "ARRAY", items: { type: "OBJECT", properties: { front: { type: "STRING" }, back: { type: "STRING" } } } } }
                    };
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${aiConfig.model}:generateContent?key=${getApiKey()}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                    const data = await res.json();
                    setFlashcards(JSON.parse(data.candidates[0].content.parts[0].text));
                    addXp(20, 'Akıllı Kart Üretimi');
                } catch (err) { showToast('Kartlar üretilemedi.'); } finally { setIsGeneratingCards(false); }
            };

            // 2. Roleplay (Canlı Vaka)
            const startRoleplay = () => {
                setIsRoleplayActive(true);
                setRoleplayMessages([{ role: 'ai', text: "*Odanın köşesinde oturuyor, ellerini kulaklarına kapatmış ve sürekli sallanıyor. Size bakmıyor.* (Bu bir canlı vaka simülasyonudur. Floortime stratejinizi terapist olarak aşağıya yazın.)" }]);
            };

            const handleRoleplaySubmit = async (e) => {
                e.preventDefault();
                if(!roleplayInput.trim() || !getApiKey()) return;
                
                const userText = roleplayInput;
                setRoleplayMessages(prev => [...prev, { role: 'user', text: userText }]);
                setRoleplayInput(''); setIsRoleplayLoading(true);

                try {
                    const systemInstruction = `Sen DIR Floortime terapisi alan 4 yaşında bir çocuksun. Modül Konusu: ${activeModule.title}. Terapist (Kullanıcı) seninle etkileşime girmeye çalışıyor. Terapist Floortime kurallarına uyuyorsa (örn: regüle etme, liderliğini takip etme, oyuncu tıkanıklık) yavaşça bağ kur veya etkileşim halkasını genişlet. Kötü davranırsa (örn: komut verme, ceza, test etme) ağlama krizine gir veya regülasyonun bozulsun. SADECE çocuğun yapacağı fiziksel eylemi *yıldız* içinde yaz ve çocuk diliyle 1-2 kelime söyle. Açıklama yapma.`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${aiConfig.model}:generateContent?key=${getApiKey()}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Terapist hamlesi: "${userText}"` }] }], systemInstruction: { parts: [{ text: systemInstruction }] } })
                    });
                    const data = await res.json();
                    setRoleplayMessages(prev => [...prev, { role: 'ai', text: data.candidates[0].content.parts[0].text }]);
                    
                    if(roleplayMessages.length === 3) addXp(50, 'Klinik Roleplay Katılımı');
                } catch (err) { setRoleplayMessages(prev => [...prev, { role: 'ai', text: "*Sistem Hatası: Bağlantı koptu.*" }]); } finally { setIsRoleplayLoading(false); }
            };

            // 3. Quiz 
            const submitQuiz = () => {
                const targetQuiz = dynamicQuiz || activeModule.quiz;
                let correctCount = 0;
                targetQuiz.forEach((q, idx) => { if (quizAnswers[idx] === q.answer) correctCount++; });

                if (correctCount === targetQuiz.length) {
                    setQuizResult('success');
                    addXp(100, 'Sınav Başarısı');
                    let newCompleted = [...completedModules];
                    if (!completedModules.includes(activeModuleId)) newCompleted.push(activeModuleId);
                    const nextModuleId = activeModuleId + 1;
                    let newUnlocked = [...unlockedModules];
                    if (nextModuleId < COURSE_DATA.length && !unlockedModules.includes(nextModuleId)) newUnlocked.push(nextModuleId);
                    setCompletedModules(newCompleted); setUnlockedModules(newUnlocked); saveProgress(newUnlocked, newCompleted);
                } else { setQuizResult('fail'); }
            };

            // Cert
            const generateCertificate = (e) => {
                e.preventDefault(); if (!userName.trim()) return;
                setIsCertificateGenerated(true); 
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => {
                    const canvas = canvasRef.current; if (!canvas) return;
                    const ctx = canvas.getContext('2d'); const width = canvas.width; const height = canvas.height;
                    const bgGradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
                    bgGradient.addColorStop(0, '#ffffff'); bgGradient.addColorStop(1, '#f8fafc');
                    ctx.fillStyle = bgGradient; ctx.fillRect(0, 0, width, height);
                    ctx.strokeStyle = '#0f766e'; ctx.lineWidth = 16; ctx.strokeRect(25, 25, width - 50, height - 50);
                    ctx.fillStyle = '#0f766e'; ctx.font = '900 48px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.fillText('MASTERCLASS SERTİFİKASI', width / 2, 140);
                    ctx.fillStyle = '#64748b'; ctx.font = 'italic 24px Georgia, serif'; ctx.fillText('Yapay zeka destekli DIR Floortime eğitimini başarıyla tamamlayan:', width / 2, 200);
                    ctx.fillStyle = '#b45309'; ctx.font = 'bold 64px Georgia, serif'; ctx.fillText(userName.toUpperCase(), width / 2, 330);
                    ctx.fillStyle = '#94a3b8'; ctx.font = '16px Inter'; ctx.fillText(`Doğrulama: TR-ULTIMATE-${Math.random().toString(36).substring(2, 8).toUpperCase()}`, width / 2, 600);
                }, 250); 
            };

            if (!isFirebaseReady) return <div className="min-h-screen bg-floortime-bg flex items-center justify-center"><div className="w-16 h-16 border-4 border-floortime-teal border-t-transparent rounded-full animate-spin"></div></div>;
            const targetQuiz = dynamicQuiz || activeModule.quiz;

            return (
                <div className="h-screen flex flex-col lg:flex-row font-sans relative">
                    <Toast message={toast.message} type={toast.type} isVisible={toast.isVisible} />
                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} setAiConfig={setAiConfig} />

                    {/* SIDEBAR */}
                    <aside className="w-full lg:w-[350px] glass-panel flex flex-col z-20 shadow-xl border-r border-slate-200 bg-white/90">
                        <div className="p-8 border-b border-slate-200">
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter">Floortime<span className="ai-gradient-text">AI</span></h1>
                            <div className="flex items-center gap-2 mt-3 bg-amber-100/50 border border-amber-200 text-amber-700 px-3 py-1.5 rounded-full w-fit shadow-sm">
                                <StarIcon /> <span className="font-bold text-sm">{xp} Uzmanlık XP</span>
                            </div>
                            <div className="mt-6">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="text-xs font-black text-slate-400 uppercase">İlerleme</span>
                                    <span className="text-2xl font-black text-floortime-tealDark">%{progressPercentage}</span>
                                </div>
                                <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                                    <div className="bg-gradient-to-r from-floortime-teal to-blue-500 h-full transition-all duration-1000" style={{ width: `${progressPercentage}%` }}></div>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {COURSE_DATA.map((mod) => {
                                const isUnlocked = unlockedModules.includes(mod.id);
                                const isCompleted = completedModules.includes(mod.id);
                                const isActive = activeModuleId === mod.id;
                                return (
                                    <button key={mod.id} onClick={() => isUnlocked && setActiveModuleId(mod.id)} disabled={!isUnlocked}
                                        className={`w-full text-left p-4 rounded-xl flex items-center gap-3 transition-all ${isActive ? 'bg-floortime-teal/10 border-2 border-floortime-teal shadow-sm' : isUnlocked ? 'bg-white border-2 border-transparent hover:border-slate-200' : 'opacity-50 grayscale'}`}
                                    >
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center ${isCompleted ? 'bg-emerald-500 text-white' : isActive ? 'bg-floortime-teal text-white' : 'bg-slate-200 text-slate-400'}`}>
                                            {isCompleted ? <CheckCircle /> : isUnlocked ? <PlayCircle /> : <Lock />}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase truncate">{mod.title}</div>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                        <div className="p-4 border-t border-slate-200 flex gap-2">
                            <button onClick={() => setIsSettingsOpen(true)} className="flex-shrink-0 w-14 h-14 rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-600 flex items-center justify-center transition-colors shadow-sm" title="Ayarlar">
                                <SettingsIcon />
                            </button>
                            {progressPercentage === 100 ? (
                                <button onClick={() => setShowCertificateMode(true)} className="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-black rounded-2xl shadow-md transition-all">Sertifika Al</button>
                            ) : (
                                <div className="flex-1 bg-slate-100 rounded-2xl flex items-center justify-center text-xs font-bold text-slate-400 uppercase px-4 text-center">Eğitimi Tamamlayın</div>
                            )}
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    {showCertificateMode ? (
                        <div className="flex-1 flex items-center justify-center p-8 animated-bg overflow-y-auto">
                            <div className="bg-white p-14 rounded-[2.5rem] shadow-2xl max-w-4xl w-full text-center">
                                {!isCertificateGenerated ? (
                                    <form onSubmit={generateCertificate} className="space-y-6">
                                        <h1 className="text-4xl font-black text-slate-900">Tebrikler!</h1>
                                        <p>Sertifikanızı üretmek için adınızı girin.</p>
                                        <input type="text" required value={userName} onChange={(e) => setUserName(e.target.value)} className="w-full px-6 py-4 rounded-xl border-2 border-slate-200 text-center text-xl" placeholder="Adınız Soyadınız" />
                                        <button type="submit" className="w-full bg-floortime-teal text-white font-black py-4 rounded-xl">Sertifika Üret</button>
                                    </form>
                                ) : (
                                    <div>
                                        <canvas ref={canvasRef} width="800" height="600" className="max-w-full h-auto rounded-xl shadow-lg mx-auto mb-6"></canvas>
                                        <button onClick={() => setShowCertificateMode(false)} className="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold">Eğitime Dön</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : (
                        <main ref={contentRef} className="flex-1 h-full overflow-y-auto bg-transparent p-6 md:p-12 relative scroll-smooth">
                            <div className="max-w-4xl mx-auto pb-40 fade-in">
                                
                                <div className="flex items-center gap-3 mb-8">
                                    <span className="bg-floortime-blue/20 text-floortime-blueDark text-xs font-black px-4 py-2 rounded-xl uppercase tracking-widest border border-floortime-blue/30 backdrop-blur-sm">
                                        {activeModule.level} SEVİYESİ
                                    </span>
                                </div>

                                <h2 className="text-4xl md:text-5xl font-black text-slate-900 mb-8">{activeModule.title}</h2>
                                <div className="prose prose-lg max-w-none mb-12 bg-white/80 p-8 rounded-3xl shadow-sm border border-slate-100" dangerouslySetInnerHTML={{ __html: activeModule.content }}></div>

                                {/* Flashcards Feature */}
                                <div className="mb-16">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-2xl font-black text-slate-800">Akıllı Bilgi Kartları</h3>
                                        <button onClick={generateFlashcards} disabled={isGeneratingCards} className="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-200 font-bold px-4 py-2 rounded-full text-sm flex items-center gap-2 transition-all">
                                            <Sparkles /> {isGeneratingCards ? 'Üretiliyor...' : 'Yapay Zeka ile Kart Üret'}
                                        </button>
                                    </div>
                                    {flashcards.length > 0 && (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">
                                            {flashcards.map((card, idx) => <Flashcard key={idx} front={card.front} back={card.back} />)}
                                        </div>
                                    )}
                                    {flashcards.length === 0 && !isGeneratingCards && (
                                        <div className="p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl text-center text-slate-400 font-medium">Bu modülün özetini kavram kartları (Flashcard) olarak görmek için butona tıklayın.</div>
                                    )}
                                </div>

                                {/* Roleplay Feature (Vaka Canlandırma) */}
                                <div className="bg-gradient-to-br from-indigo-900 to-slate-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-indigo-900/20 mb-16 text-white relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-500/20 rounded-full blur-[80px] -z-10"></div>
                                    <div className="flex justify-between items-center mb-8 border-b border-indigo-500/30 pb-6">
                                        <div>
                                            <h3 className="text-3xl font-black tracking-tight flex items-center gap-3"><Sparkles className="w-8 h-8 text-indigo-400"/> Canlı Vaka Simülatörü</h3>
                                            <p className="text-indigo-200 mt-2 font-medium">Sadece teoriyi okumayın. Gerçek zamanlı olarak yapay zeka bir vaka ile pratik yapın.</p>
                                        </div>
                                    </div>

                                    {!isRoleplayActive ? (
                                        <div className="text-center py-10">
                                            <div className="text-6xl mb-6">🧸</div>
                                            <h4 className="text-2xl font-bold mb-4">Kliniğe Girmeye Hazır mısınız?</h4>
                                            <p className="text-indigo-200 max-w-md mx-auto mb-8">Yapay zeka bu modülün konusuna göre regülasyonu bozuk bir çocuk veya kaygılı bir ebeveyn rolüne girecek. Sizin göreviniz terapist olarak süreci yönetmek.</p>
                                            <button onClick={startRoleplay} className="bg-indigo-500 hover:bg-indigo-400 text-white font-black py-4 px-10 rounded-2xl shadow-glow-indigo transition-all text-lg transform hover:scale-105">Simülasyonu Başlat</button>
                                        </div>
                                    ) : (
                                        <div className="bg-slate-800/50 rounded-2xl border border-indigo-500/20 flex flex-col h-[400px]">
                                            <div className="flex-1 overflow-y-auto p-6 space-y-6">
                                                {roleplayMessages.map((msg, idx) => (
                                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                        {msg.role === 'ai' && <div className="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center text-xl mr-3 shadow-md flex-shrink-0">🧸</div>}
                                                        <div className={`max-w-[80%] p-4 shadow-md ${msg.role === 'user' ? 'chat-bubble-roleplay-therapist text-base' : 'chat-bubble-roleplay-child'}`}>
                                                            {msg.text}
                                                        </div>
                                                        {msg.role === 'user' && <div className="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white ml-3 shadow-md flex-shrink-0 font-bold text-xs">SİZ</div>}
                                                    </div>
                                                ))}
                                                {isRoleplayLoading && <div className="flex justify-start"><div className="w-10 h-10 rounded-full bg-yellow-100 mr-3"></div><div className="chat-bubble-roleplay-child p-4 typing-indicator"><span></span><span></span><span></span></div></div>}
                                                <div ref={roleplayEndRef} />
                                            </div>
                                            <form onSubmit={handleRoleplaySubmit} className="p-4 bg-slate-800/80 border-t border-indigo-500/20 flex gap-3 rounded-b-2xl">
                                                <input type="text" value={roleplayInput} onChange={(e) => setRoleplayInput(e.target.value)} placeholder="Terapist olarak ne yaparsınız/söylersiniz?..." className="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-5 py-3 text-white focus:outline-none focus:border-indigo-500" />
                                                <button type="submit" disabled={!roleplayInput.trim() || isRoleplayLoading} className="bg-indigo-500 hover:bg-indigo-400 text-white font-bold px-8 rounded-xl disabled:opacity-50 transition-colors shadow-lg">Uygula</button>
                                            </form>
                                        </div>
                                    )}
                                </div>

                                {/* Dynamic AI Quiz */}
                                <div className="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-slate-200">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10 border-b border-slate-100 pb-6">
                                        <div><h3 className="text-2xl font-black text-slate-800 tracking-tight">Klinik Değerlendirme Testi</h3></div>
                                    </div>
                                    
                                    {targetQuiz.map((q, qIndex) => (
                                        <div key={qIndex} className="mb-10 fade-in">
                                            <p className="font-bold text-xl text-slate-800 mb-5">{qIndex + 1}. {q.q}</p>
                                            <div className="space-y-3">
                                                {q.options.map((opt, optIndex) => {
                                                    const isSelected = quizAnswers[qIndex] === optIndex;
                                                    return (
                                                        <label key={optIndex} className={`flex items-start p-5 rounded-2xl border-2 cursor-pointer transition-all ${isSelected ? 'border-floortime-teal bg-floortime-teal/5 shadow-md transform scale-[1.01]' : 'border-slate-200 bg-white hover:border-floortime-teal/50'}`}>
                                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mr-4 mt-0.5 flex-shrink-0 ${isSelected ? 'border-floortime-teal' : 'border-slate-300'}`}>
                                                                {isSelected && <div className="w-3 h-3 bg-floortime-teal rounded-full"></div>}
                                                            </div>
                                                            <input type="radio" name={`q-${activeModuleId}-${qIndex}`} className="hidden" checked={isSelected} onChange={() => handleQuizOptionSelect(qIndex, optIndex)} />
                                                            <span className={`text-lg font-medium ${isSelected ? 'text-teal-900' : 'text-slate-600'}`}>{opt}</span>
                                                        </label>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    ))}

                                    <div className="pt-6 border-t border-slate-100">
                                        {quizResult === 'success' && <div className="mb-6 p-5 bg-emerald-50 text-emerald-800 rounded-2xl border border-emerald-200 flex items-center gap-3 fade-in"><CheckCircle /> <span className="font-bold text-lg">Analiz Doğru! 100 XP Kazandınız.</span></div>}
                                        {quizResult === 'fail' && <div className="mb-6 p-5 bg-red-50 text-red-800 rounded-2xl border border-red-200 flex items-center gap-3 fade-in"><span className="font-bold text-lg">Analiz Hatası. Lütfen tekrar değerlendirin.</span></div>}
                                        <button onClick={submitQuiz} disabled={Object.keys(quizAnswers).length < targetQuiz.length} className="w-full bg-slate-900 hover:bg-slate-800 disabled:opacity-30 text-white font-black py-5 rounded-2xl transition-all text-xl shadow-xl hover:shadow-2xl">Yanıtları Onayla ve İlerle</button>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
