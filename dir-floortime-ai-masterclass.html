        const pcmToWav = (pcmData, sampleRate) => {
            const numChannels = 1; const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const wavHeader = new ArrayBuffer(44); const view = new DataView(wavHeader);
            const writeString = (view, offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + pcmData.byteLength, true);
            writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true); view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data'); view.setUint32(40, pcmData.byteLength, true);
            const wavBuffer = new Uint8Array(44 + pcmData.byteLength);
            wavBuffer.set(new Uint8Array(wavHeader), 0); wavBuffer.set(new Uint8Array(pcmData), 44);
            return wavBuffer;
        };

                                    type="text" 
                                    value={localModel} 
                                    onChange={(e) => setLocalModel(e.target.value)} 
                                    placeholder="Örn: gemini-1.5-pro, gpt-4o vs." 
                                    className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-floortime-teal outline-none font-mono text-sm"
                                    required
                                />
                                <p className="text-[10px] text-slate-400 mt-1">Buraya yazdığınız model adı doğrudan API isteğine gönderilir.</p>
                            </div>
                            
                            <button type="submit" className="w-full bg-floortime-teal hover:bg-floortime-tealDark text-white font-bold py-3 rounded-lg transition-colors">Kaydet ve Uygula</button>
                        </form>
                    </div>
                </div>
            );
        };

        const Flashcard = ({ front, back }) => {
            const [flipped, setFlipped] = useState(false);
            return (
                <div className={`flashcard relative w-full h-40 cursor-pointer perspective-1000 ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(!flipped)}>
                    <div className="flashcard-inner w-full h-full absolute">
                        <div className="flashcard-front bg-white border-2 border-indigo-100 rounded-xl flex items-center justify-center p-4 text-center shadow-sm">
                            <h4 className="font-bold text-indigo-900">{front}</h4>
                            <div className="absolute bottom-2 text-[10px] text-indigo-400 uppercase">Çevir</div>
                        </div>
                        <div className="flashcard-back bg-indigo-500 rounded-xl flex items-center justify-center p-4 text-center shadow-lg text-white">
                            <p className="font-medium text-xs leading-relaxed">{back}</p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [isFirebaseReady, setIsFirebaseReady] = useState(false);
            
            // Core
            const [activeModuleId, setActiveModuleId] = useState(0);
            const [unlockedModules, setUnlockedModules] = useState([0]); 
            const [completedModules, setCompletedModules] = useState([]); 
            const [xp, setXp] = useState(0);
            const [quizAnswers, setQuizAnswers] = useState({}); 
            const [quizResult, setQuizResult] = useState(null); 
            
            // AI Config (Boş başlar)
            const [aiConfig, setAiConfig] = useState({ 
                key: localStorage.getItem('gemini_api_key') || '', 
                model: localStorage.getItem('gemini_model') || '' 
            });
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [toast, setToast] = useState({ message: '', type: 'success', isVisible: false });
            
            // Quiz AI
            const [dynamicQuiz, setDynamicQuiz] = useState(null);
            const [isGeneratingQuiz, setIsGeneratingQuiz] = useState(false);

            // Flashcards
            const [flashcards, setFlashcards] = useState([]);
            const [isGeneratingCards, setIsGeneratingCards] = useState(false);

            // Roleplay
            const [isRoleplayActive, setIsRoleplayActive] = useState(false);
            const [roleplayMessages, setRoleplayMessages] = useState([]);
            const [roleplayInput, setRoleplayInput] = useState('');
            const [isRoleplayLoading, setIsRoleplayLoading] = useState(false);
            
            const roleplayEndRef = useRef(null);
            const contentRef = useRef(null);
            const canvasRef = useRef(null);

            const [showCertificateMode, setShowCertificateMode] = useState(false);
            const [userName, setUserName] = useState('');

            const activeModule = COURSE_DATA.find(m => m.id === activeModuleId);
            const progressPercentage = Math.round((completedModules.length / COURSE_DATA.length) * 100);

            const showToast = (message, type = 'error') => {
                setToast({ message, type, isVisible: true });
                setTimeout(() => setToast(prev => ({ ...prev, isVisible: false })), 3000);
            };

            const requireAiConfig = () => {
                if (!aiConfig.key || !aiConfig.model) {
                    showToast('API Anahtarı ve Model Adı boş olamaz. Lütfen Ayarlar\'dan doldurun.');
                    setIsSettingsOpen(true);
                    return false;
                }
                return true;
            };

            const addXp = async (amount) => {
                const newXp = xp + amount;
                setXp(newXp);
                showToast(`+${amount} XP Kazandınız!`, 'success');
                if (user && db) db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).set({ xp: newXp }, { merge: true });
            };

            // Init Firebase (Compat Method for Mobile)
            useEffect(() => {
                auth.signInAnonymously().catch(e => setIsFirebaseReady(true));
                const unsub = auth.onAuthStateChanged(u => { setUser(u); setIsFirebaseReady(true); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const unsub = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).onSnapshot(docSnap => {
                    if (docSnap.exists) {
                        const d = docSnap.data();
                        if (d.unlockedModules) setUnlockedModules(d.unlockedModules);
                        if (d.completedModules) setCompletedModules(d.completedModules);
                        if (d.xp) setXp(d.xp);
                    }
                });
                return () => unsub();
            }, [user]);

            useEffect(() => {
                setQuizAnswers({}); setQuizResult(null); 
                setDynamicQuiz(null); setFlashcards([]); setIsRoleplayActive(false); setRoleplayMessages([]);
                window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll to top naturally
            }, [activeModuleId]);

            useEffect(() => { if(roleplayEndRef.current) roleplayEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [roleplayMessages]);

            const saveProgress = async (unlocked, completed) => {
                if (user && db) await db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).set({ unlockedModules: unlocked, completedModules: completed }, { merge: true });
            };

            // ---- AI YETENEKLERI ----

            // 1. Flashcards (LLM Request)
            const generateFlashcards = async () => {
                if (!requireAiConfig()) return;
                setIsGeneratingCards(true); setFlashcards([]);
                try {
                    const payload = {
                        contents: [{ parts: [{ text: `DIR Floortime "${activeModule.title}" konusundan 3 kavram seç. Ön yüz (kısa ad) ve arka yüz (açıklama) içeren JSON array üret.` }] }],
                        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "ARRAY", items: { type: "OBJECT", properties: { front: { type: "STRING" }, back: { type: "STRING" } } } } }
                    };
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${aiConfig.model}:generateContent?key=${aiConfig.key}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error.message);
                    setFlashcards(JSON.parse(data.candidates[0].content.parts[0].text));
                    addXp(20);
                } catch (err) { showToast('Model veya API hatası: Kartlar üretilemedi.'); } finally { setIsGeneratingCards(false); }
            };

            // 2. Roleplay (Canlı Vaka Simülatörü)
            const startRoleplay = () => {
                setIsRoleplayActive(true);
                setRoleplayMessages([{ role: 'ai', text: "*Odanın köşesinde oturuyor, ellerini kapatmış. Size bakmıyor.* (Terapist olarak stratejinizi yazın)" }]);
            };

            const handleRoleplaySubmit = async (e) => {
                e.preventDefault();
                if(!roleplayInput.trim() || !requireAiConfig()) return;
                
                const userText = roleplayInput;
                setRoleplayMessages(prev => [...prev, { role: 'user', text: userText }]);
                setRoleplayInput(''); setIsRoleplayLoading(true);

                try {
                    const systemInstruction = `Sen DIR Floortime alan 4 yaşında bir çocuksun. Modül: ${activeModule.title}. Terapist (Kullanıcı) sana yaklaşıyor. İyi bir hamleyse regüle ol, kötüyse krize gir. SADECE *eylem* ve 1-2 kelime yaz.`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${aiConfig.model}:generateContent?key=${aiConfig.key}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Terapist: "${userText}"` }] }], systemInstruction: { parts: [{ text: systemInstruction }] } })
                    });
                    const data = await res.json();
                    if(data.error) throw new Error();
                    setRoleplayMessages(prev => [...prev, { role: 'ai', text: data.candidates[0].content.parts[0].text }]);
                    if(roleplayMessages.length === 3) addXp(50);
                } catch (err) { setRoleplayMessages(prev => [...prev, { role: 'ai', text: "*Bağlantı koptu veya model adı hatalı.*" }]); } finally { setIsRoleplayLoading(false); }
            };

            // 3. Quiz 
            const submitQuiz = () => {
                const targetQuiz = dynamicQuiz || activeModule.quiz;
                let correctCount = 0;
                targetQuiz.forEach((q, idx) => { if (quizAnswers[idx] === q.answer) correctCount++; });

                if (correctCount === targetQuiz.length) {
                    setQuizResult('success');
                    addXp(100);
                    let newCompleted = [...completedModules];
                    if (!completedModules.includes(activeModuleId)) newCompleted.push(activeModuleId);
                    const nextModuleId = activeModuleId + 1;
                    let newUnlocked = [...unlockedModules];
                    if (nextModuleId < COURSE_DATA.length && !unlockedModules.includes(nextModuleId)) newUnlocked.push(nextModuleId);
                    setCompletedModules(newCompleted); setUnlockedModules(newUnlocked); saveProgress(newUnlocked, newCompleted);
                } else { setQuizResult('fail'); }
            };

            // Sertifika
            const finishCourse = (e) => {
                e.preventDefault(); if (!userName.trim()) return;
                setShowCertificateMode(true);
                setTimeout(() => confetti({ particleCount: 150, spread: 100 }), 100);
            };

            if (!isFirebaseReady) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><div className="w-12 h-12 border-4 border-floortime-teal border-t-transparent rounded-full animate-spin"></div></div>;

            const targetQuiz = dynamicQuiz || activeModule.quiz;

            // KİLİT NOKTA: Mobil için `min-h-screen`, body'de overflow serbest.
            return (
                <div className="flex flex-col lg:flex-row min-h-screen bg-slate-50 font-sans">
                    <Toast message={toast.message} type={toast.type} isVisible={toast.isVisible} />
                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} setAiConfig={setAiConfig} />

                    {/* SIDEBAR (Mobilde üste yerleşir, masaüstünde sola sabitlenir) */}
                    <aside className="w-full lg:w-[320px] lg:min-h-screen lg:sticky lg:top-0 bg-white border-r border-slate-200 flex flex-col shadow-lg z-10">
                        <div className="p-6 border-b border-slate-100 bg-slate-900 text-white">
                            <h1 className="text-2xl font-black tracking-tight">Floortime <span className="text-floortime-teal">AI</span></h1>
                            <div className="flex items-center gap-1 mt-2 text-amber-400 text-sm">
                                <span>⭐</span> <span className="font-bold">{xp} XP Puanı</span>
                            </div>
                            <div className="mt-4">
                                <div className="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                    <div className="bg-floortime-teal h-full" style={{ width: `${progressPercentage}%` }}></div>
                                </div>
                            </div>
                            {/* Mobilde Ayarlar Butonu Üstte Kalsın Diye */}
                            <button onClick={() => setIsSettingsOpen(true)} className="mt-4 w-full bg-slate-800 hover:bg-slate-700 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2">
                                <SettingsIcon /> Model / API Ayarları
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-3 space-y-2 max-h-[300px] lg:max-h-none">
                            {COURSE_DATA.map((mod) => {
                                const isUnlocked = unlockedModules.includes(mod.id);
                                const isCompleted = completedModules.includes(mod.id);
                                const isActive = activeModuleId === mod.id;
                                return (
                                    <button key={mod.id} onClick={() => isUnlocked && setActiveModuleId(mod.id)} disabled={!isUnlocked}
                                        className={`w-full text-left p-3 rounded-xl flex items-center gap-3 transition-colors ${isActive ? 'bg-teal-50 border border-floortime-teal' : isUnlocked ? 'bg-white hover:bg-slate-50 border border-transparent' : 'opacity-40'}`}
                                    >
                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 text-xs ${isCompleted ? 'bg-emerald-500 text-white' : isActive ? 'bg-floortime-teal text-white' : 'bg-slate-200 text-slate-500'}`}>
                                            {isCompleted ? '✓' : isUnlocked ? '▶' : '🔒'}
                                        </div>
                                        <div className="text-xs font-bold text-slate-700 truncate">{mod.title}</div>
                                    </button>
                                );
                            })}
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main ref={contentRef} className="flex-1 p-5 md:p-10 w-full overflow-x-hidden">
                        {showCertificateMode ? (
                            <div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-2xl mx-auto fade-in">
                                <h2 className="text-3xl font-black text-slate-900 mb-4">🏆 Tebrikler, {userName}!</h2>
                                <p className="text-slate-600 mb-6">Tüm eğitimleri tamamladınız. Artık DIR Floortime alanında bir uzmansınız.</p>
                                <div className="p-10 border-8 border-floortime-teal rounded-lg bg-slate-50 mb-6">
                                    <h3 className="text-2xl font-bold text-floortime-tealDark">BAŞARI SERTİFİKASI</h3>
                                    <p className="mt-4 text-lg">Sayın <strong>{userName.toUpperCase()}</strong></p>
                                    <p className="mt-2">DIR Floortime AI Masterclass Programını Tamamlamıştır.</p>
                                    <p className="mt-6 text-sm text-slate-400">Lisans No: TR-{Math.random().toString(36).substr(2,6).toUpperCase()}</p>
                                </div>
                                <button onClick={() => setShowCertificateMode(false)} className="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold">Geri Dön</button>
                            </div>
                        ) : (
                            <div className="max-w-3xl mx-auto fade-in pb-20">
                                
                                <span className="bg-blue-100 text-blue-800 text-[10px] font-black px-3 py-1 rounded-md uppercase tracking-wider mb-4 inline-block">Bölüm {activeModule.level}</span>
                                <h2 className="text-3xl md:text-4xl font-black text-slate-900 mb-6 leading-tight">{activeModule.title}</h2>
                                
                                {/* İçerik */}
                                <div className="prose max-w-none mb-10 bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100" dangerouslySetInnerHTML={{ __html: activeModule.content }}></div>

                                {/* AI Bilgi Kartları */}
                                <div className="mb-10">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-black text-slate-800">Akıllı Kartlar</h3>
                                        <button onClick={generateFlashcards} disabled={isGeneratingCards} className="bg-indigo-100 text-indigo-700 font-bold px-3 py-1.5 rounded-lg text-xs flex items-center gap-1">
                                            <Sparkles /> {isGeneratingCards ? 'Üretiliyor...' : 'Yapay Zekadan İste'}
                                        </button>
                                    </div>
                                    {flashcards.length > 0 ? (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            {flashcards.map((c, i) => <Flashcard key={i} front={c.front} back={c.back} />)}
                                        </div>
                                    ) : (
                                        <div className="p-6 bg-white border border-slate-200 rounded-xl text-center text-sm text-slate-500">Özeti kavram kartları olarak görmek için butona basın.</div>
                                    )}
                                </div>

                                {/* Canlı Vaka (Roleplay) */}
                                <div className="bg-slate-900 rounded-2xl p-6 md:p-8 shadow-xl mb-10 text-white relative">
                                    <h3 className="text-xl font-black mb-2 flex items-center gap-2"><Sparkles /> Canlı Vaka Pratiği</h3>
                                    <p className="text-sm text-slate-400 mb-6">Yapay zeka bu modüle uygun bir vaka olacak. Terapist rolünü alın.</p>

                                    {!isRoleplayActive ? (
                                        <button onClick={startRoleplay} className="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-3 rounded-xl transition-colors">Simülasyonu Başlat</button>
                                    ) : (
                                        <div className="bg-slate-800 rounded-xl flex flex-col h-[300px]">
                                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                                {roleplayMessages.map((msg, idx) => (
                                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                        <div className={`max-w-[85%] p-3 text-sm rounded-xl ${msg.role === 'user' ? 'bg-indigo-500 text-white' : 'bg-yellow-100 text-yellow-900 font-serif'}`}>
                                                            {msg.text}
                                                        </div>
                                                    </div>
                                                ))}
                                                {isRoleplayLoading && <div className="p-3 text-sm text-slate-400">Çocuk tepki veriyor...</div>}
                                                <div ref={roleplayEndRef} />
                                            </div>
                                            <form onSubmit={handleRoleplaySubmit} className="p-2 bg-slate-900 flex gap-2">
                                                <input type="text" value={roleplayInput} onChange={e => setRoleplayInput(e.target.value)} placeholder="Ne yaparsınız?..." className="flex-1 bg-slate-700 text-white rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-500" />
                                                <button type="submit" disabled={isRoleplayLoading} className="bg-indigo-500 text-white font-bold px-4 rounded-lg text-sm">Gönder</button>
                                            </form>
                                        </div>
                                    )}
                                </div>

                                {/* Sınav Alanı */}
                                <div className="bg-white rounded-2xl p-6 md:p-8 shadow-md border border-slate-200">
                                    <h3 className="text-xl font-black text-slate-800 mb-6">Modül Testi</h3>
                                    {targetQuiz.map((q, qIndex) => (
                                        <div key={qIndex} className="mb-6">
                                            <p className="font-bold text-slate-800 mb-3">{q.q}</p>
                                            <div className="space-y-2">
                                                {q.options.map((opt, optIndex) => {
                                                    const isSelected = quizAnswers[qIndex] === optIndex;
                                                    return (
                                                        <label key={optIndex} className={`flex items-start p-3 rounded-xl border-2 cursor-pointer ${isSelected ? 'border-floortime-teal bg-teal-50' : 'border-slate-100 bg-white hover:border-slate-200'}`}>
                                                            <input type="radio" name={`q-${activeModuleId}`} className="hidden" checked={isSelected} onChange={() => handleQuizOptionSelect(qIndex, optIndex)} />
                                                            <div className={`w-5 h-5 rounded-full border-2 mr-3 flex-shrink-0 flex items-center justify-center ${isSelected ? 'border-floortime-teal' : 'border-slate-300'}`}>
                                                                {isSelected && <div className="w-2.5 h-2.5 bg-floortime-teal rounded-full"></div>}
                                                            </div>
                                                            <span className={`text-sm md:text-base ${isSelected ? 'font-bold text-teal-900' : 'text-slate-600'}`}>{opt}</span>
                                                        </label>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    ))}

                                    <div className="mt-6 pt-6 border-t border-slate-100">
                                        {quizResult === 'success' && <div className="mb-4 text-emerald-600 font-bold">✅ Doğru!</div>}
                                        {quizResult === 'fail' && <div className="mb-4 text-red-600 font-bold">❌ Yanlış. Tekrar deneyin.</div>}
                                        
                                        {progressPercentage === 100 && activeModuleId === COURSE_DATA.length - 1 && quizResult === 'success' ? (
                                            <form onSubmit={finishCourse} className="flex gap-2">
                                                <input type="text" required placeholder="Adınız Soyadınız" value={userName} onChange={e=>setUserName(e.target.value)} className="flex-1 border-2 border-slate-200 rounded-xl px-4 py-2" />
                                                <button type="submit" className="bg-amber-500 text-white font-bold px-6 py-2 rounded-xl">Sertifika Al</button>
                                            </form>
                                        ) : (
                                            <button onClick={submitQuiz} disabled={Object.keys(quizAnswers).length < targetQuiz.length} className="w-full bg-slate-900 disabled:opacity-50 text-white font-bold py-3 rounded-xl">Yanıtı Gönder</button>
                                        )}
                                    </div>
                                </div>

                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
